.minimap-section{flex:0 0 auto;position:sticky;top:48px;z-index:25;background:rgba(245,247,251,.96);border-bottom:1px solid var(--line);padding:4px 8px 6px}

.minimap-bars{height:100%;display:flex;align-items:flex-end;padding:4px 5px 3px;gap:1px}.mbar{flex:1;min-width:4px;min-height:2px;border-radius:2px 2px 0 0;background:#6fa3ff;opacity:.72;cursor:pointer;transition:opacity .12s,background .12s}.mbar:hover{opacity:1;background:var(--blue)}.mbar.empty{opacity:.22;background:#aebbd0}.mbar.year-start{border-left:1px solid #8da2bd}.mbar.active-year{background:#e64980;opacity:.86}.minimap-window{position:absolute;top:3px;bottom:3px;left:0;width:40px;border:2px solid #17233a;background:rgba(37,99,235,.10);border-radius:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.55),0 0 12px rgba(37,99,235,.16);pointer-events:none;transition:left .08s linear,width .08s linear}.minimap-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#66758f;pointer-events:none}
.content{display:grid;grid-template-columns:minmax(0,1fr) 380px;min-height:0;flex:1;background:var(--bg)}.content.no-side{grid-template-columns:minmax(0,1fr)}.content.no-side .side{display:none}
.timeline-wrap{overflow:auto;position:relative;border-right:1px solid var(--line);background:var(--bg)}.timeline{display:grid;grid-auto-rows:auto;min-width:max-content;background:var(--bg)}
.month-header{display:grid;grid-template-columns:180px repeat(var(--months),230px);position:sticky;top:0;z-index:10;background:#f8fbff;border-bottom:1px solid var(--line)}.corner{position:sticky;left:0;z-index:11;background:#f8fbff;padding:14px;font-weight:900;border-right:1px solid var(--line);color:#26374f}.month{padding:12px 8px;text-align:center;color:#7f8ea3;font-weight:900;border-right:1px dashed var(--line-soft);min-height:46px}.year-sep{background:#17233a;color:#fff;border-radius:5px;padding:3px 7px;font-weight:900;margin-right:4px}
.game-row{display:grid;grid-template-columns:180px repeat(var(--months),230px);border-bottom:1px solid var(--line);min-height:122px;background:var(--bg)}.game-label{position:sticky;left:0;z-index:6;background:#fff;padding:16px 12px;border-right:1px solid var(--line)}.game-name{font-weight:900;margin-bottom:8px;color:#142033}.release{font-size:12px;color:#657189}.cell{border-right:1px dashed var(--line-soft);padding:8px;display:flex;flex-direction:column;gap:8px}.event-card{background:#fff;border:1px solid #dce5f2;border-radius:12px;box-shadow:var(--shadow);padding:10px;min-width:190px;cursor:pointer;transition:.12s transform,.12s border-color,.12s box-shadow;color:#142033}.event-card:hover{transform:translateY(-1px);border-color:#9db7df;box-shadow:var(--shadow-strong)}.event-card.selected{border-color:var(--blue);box-shadow:var(--glow)}.event-card.major{border-left:4px solid var(--major)}.event-card.release-card{border-left:4px solid #111827}.event-card.has-body .summary:after{content:none;display:none}.title-line{display:flex;gap:7px;align-items:center;font-weight:900}.dot{width:10px;height:10px;border-radius:50%;background:#d75e94;display:inline-block;flex:none}.date-title{white-space:nowrap;color:#142033}.summary{margin-top:7px;line-height:1.35;color:#53627a;font-size:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.summary.major-text{color:#25324a;font-weight:700}.major-badge{background:#ffe4ef;color:#c2185b;border:1px solid #f8b6cf;border-radius:999px;padding:2px 6px;font-weight:900;font-size:11px}.major-badge.in-summary{display:inline-block;margin-right:7px;vertical-align:1px}
.side{overflow:auto;background:#fff;padding:16px;border-left:1px solid var(--line);color:#142033}.empty-msg{padding:40px;color:#7a879b}.side-title{font-size:20px;font-weight:900;margin:8px 0;color:#142033}.side-sub{font-size:13px;color:var(--accent);font-weight:900;margin-bottom:4px}.tag{display:inline-block;border-radius:999px;background:#ffe4ef;color:#c2185b;border:1px solid #f8b6cf;padding:4px 8px;font-weight:900;margin-right:4px;margin-bottom:4px}.tag.neutral{background:#eef4ff;color:#34435c;border-color:#dce5f2}.box{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:14px;margin:14px 0}.box.primary{background:#fff;border-color:#c7d8f2;box-shadow:var(--glow)}.box h3{font-size:14px;margin:0 0 10px;font-weight:900;color:#142033}.box ul{margin:0;padding-left:18px}.box li{margin:6px 0;line-height:1.48;color:#25324a}.source-btn{display:inline-block;margin-top:8px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:#26374f;text-decoration:none;font-weight:800}.source-btn:hover{border-color:#9db7df;background:#f8fbff}.meta{font-size:12px;color:#64748b}.no-results{padding:60px;text-align:center;color:#6b7890;font-weight:800}.review-meta{font-size:11px;color:#64748b;line-height:1.5}.filter-note{font-size:12px;color:#64748b}.floating-year{position:fixed;z-index:60;display:none;background:#17233a;color:#fff;border:1px solid #17233a;border-radius:6px;padding:3px 8px;font-weight:900;font-size:13px;pointer-events:none;box-shadow:0 8px 20px rgba(24,39,75,.18)}

</style></head><body><div class="app"><div class="toolbar" id="controls"></div><div class="minimap-section"><div class="minimap-wrap" id="minimapWrap"><div class="minimap-bars" id="minimapBars"></div><div class="minimap-window" id="minimapWindow"></div><div class="minimap-empty" id="minimapEmpty" style="display:none">표시할 패치노트가 없습니다</div></div></div><div class="content no-side" id="content"><div class="timeline-wrap" id="viewport"><div class="timeline" id="timeline"></div></div><aside class="side" id="side"></aside></div></div><div class="floating-year" id="floatingYear"></div><script>let DATA = [];
let TOTAL_EVENTS = 0;
const GAME_NAME_MAP = {
  'NightCrows_KR':'나크',
  'NightCrows_Global':'나크글로벌',
  'Odin_KR':'오딘',
  'MIR4_Global':'미르4글로벌',
  'MIR4_KR':'미르4'
};
const GAME_RELEASE_MAP = {
  '나크글로벌':'2024-03-12',
  '나크':'2023-04-27',
  '오딘':'2021-06-29',
  '미르4글로벌':'2021-08-26',
  '미르4':'2020-11-25'
};
const GAME_ORDER = ['나크글로벌','나크','오딘','미르4글로벌','미르4'];
function normalizeSummaryLines(v){
  if(v == null) return [];
  if(Array.isArray(v)) return v.map(x => typeof x === 'string' ? x : textOf(x)).filter(Boolean);
  if(typeof v === 'string') return String(v).replaceAll(String.fromCharCode(13),'').split(String.fromCharCode(10)).map(s=>s.trim()).filter(Boolean);
  return [textOf(v)].filter(Boolean);
}
function toTimelineGroups(items){
  const map = new Map();
  for(const item of (items||[])){
    const rawGame = item.game_name || item.game || item.gameName || 'Unknown';
    const name = GAME_NAME_MAP[rawGame] || rawGame;
    if(!map.has(name)){
      const release = GAME_RELEASE_MAP[name] || '';
      map.set(name, {name, release, release_display: formatShortDate(release), events: []});
    }
    const date = item.date_key || item.actual_date || item.date || '';
    const year = Number(String(date).slice(0,4)) || item.year || 0;
    const month = Number(String(date).slice(5,7)) || 1;
    const event = {
      date_key: date,
      title: item.title || item.page_title || `${formatShortDate(date)} | 패치노트`,
      type: item.type || 'update',
      year,
      quarter: item.quarter || Math.floor((month-1)/3)+1,
      impact: item.impact || '패치노트',
      source_url: item.source_url || item.url || '',
      html_visible: item.html_visible !== false,
      view_model_page_id: item.view_model_page_id || item.page_id || '',
      representative_signals: normalizeSummaryLines(item.representative_signals || item.signals),
      major_update_summary: normalizeSummaryLines(item.major_update_summary),
      general_patch_summary: normalizeSummaryLines(item.general_patch_summary),
      body_summary: normalizeSummaryLines(item.body_summary),
      card_summary: item.card_summary || normalizeSummaryLines(item.body_summary)[0] || '',
      game: name,
      review_status: item.review_status || ''
    };
    map.get(name).events.push(event);
  }
  const groups = Array.from(map.values());
  groups.forEach(g => g.events.sort((a,b)=>String(a.date_key).localeCompare(String(b.date_key)) || String(a.title).localeCompare(String(b.title))));
  groups.sort((a,b)=>{
    const ia = GAME_ORDER.indexOf(a.name), ib = GAME_ORDER.indexOf(b.name);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib) || a.name.localeCompare(b.name);
  });
  return groups;
}
function normalizeTimelinePayload(payload){
  if(Array.isArray(payload)){
    if(payload.length === 0) return [];
    if(payload[0] && Array.isArray(payload[0].events)) return payload;
    return toTimelineGroups(payload);
  }
  if(payload && Array.isArray(payload.data)) return normalizeTimelinePayload(payload.data);
  if(payload && Array.isArray(payload.items)) return normalizeTimelinePayload(payload.items);
  if(payload && Array.isArray(payload.games)) return normalizeTimelinePayload(payload.games);
  throw new Error('Unsupported data.json schema');
}
async function loadDataJson(){
  const response = await fetch('data.json', {cache: 'no-store'});
  if(!response.ok) throw new Error('data.json load failed: '+response.status);
  const payload = await response.json();
  DATA = normalizeTimelinePayload(payload).filter(g => Array.isArray(g.events));
  TOTAL_EVENTS = DATA.reduce((n,g)=>n + g.events.length, 0);
  if(!DATA.length || !TOTAL_EVENTS) throw new Error('data.json contains no timeline events');
}

/* TOTAL_EVENTS is calculated after data.json fetch. */
const $ = id => document.getElementById(id);

const ALL_GAMES='전체 게임';
const ALL_YEARS='전체';
const ALL_CATEGORIES='전체';
const state = {q:'', games:new Set([ALL_GAMES]), year:ALL_YEARS, categories:new Set([ALL_CATEGORIES])};
function ym(date){return String(date||'').slice(0,7)}
function y(date){return String(date||'').slice(0,4)}
function formatShortDate(dateKey){const s=String(dateKey||''); if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s.slice(2,4)+'.'+s.slice(5,7)+'.'+s.slice(8,10); return s;}
function asArray(v){ if(!v) return []; if(Array.isArray(v)) return v; return [v]; }
function textOf(v){ if(v==null) return ''; if(typeof v==='string') return v; if(typeof v==='object') return v.source_line || v.source || v.line || v.item_name || v.name || JSON.stringify(v); return String(v); }
function cleanBullet(s){return String(s||'').replace(/^\s*[-•]\s*/,'').replace(/^\s*\d+[.)]\s*/,'').trim();}
function isMajor(e){return asArray(e.major_update_summary).length>0 || !!e.card_summary || asArray(e.representative_signals).length>0;}
function cardSummary(e){ if(isMajor(e)) return e.card_summary || asArray(e.major_update_summary).map(x=>cleanBullet(textOf(x)).split(':')[0]).join(' · '); return asArray(e.general_patch_summary).map(textOf).filter(Boolean).join(' · '); }
function hasAll(set, allValue){return set.has(allValue)}
function selectedContains(set, value){return set.has(value)}
function categoryMatch(e){return hasAll(state.categories,ALL_CATEGORIES) || asArray(e.representative_signals).some(s=>state.categories.has(s));}
function gameMatch(g){return hasAll(state.games,ALL_GAMES) || state.games.has(g.name);}
function matchEvent(e,g){
  if(e.html_visible===false) return false;
  if(!gameMatch(g)) return false;
  if(state.year!==ALL_YEARS && y(e.date_key)!==state.year) return false;
  if(!categoryMatch(e)) return false;
  const q=state.q.trim().toLowerCase();
  if(q){
    const hay=[g.name,e.title,formatShortDate(e.date_key),e.card_summary,...asArray(e.major_update_summary),...asArray(e.general_patch_summary),...asArray(e.body_summary),...asArray(e.representative_signals),e.note].map(textOf).join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}
function allMonths(){let dates=[]; DATA.forEach(g=>(g.events||[]).forEach(e=>{if(e.date_key) dates.push(e.date_key)})); if(!dates.length) return []; let min=new Date(Math.min(...dates.map(d=>new Date(d+'T00:00:00')))); let max=new Date(Math.max(...dates.map(d=>new Date(d+'T00:00:00')))); let cur=new Date(min.getFullYear(),min.getMonth(),1); let end=new Date(max.getFullYear(),max.getMonth(),1); let months=[]; while(cur<=end){months.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`); cur.setMonth(cur.getMonth()+1);} return months;}
let MONTHS = [];
let GAME_BY_NAME = {};
function refreshDerivedData(){
  MONTHS = allMonths();
  document.documentElement.style.setProperty('--months', MONTHS.length);
  GAME_BY_NAME = Object.fromEntries(DATA.map(g=>[g.name,g]));
}

const SIGNAL_ORDER=['신규 대형 PvE','신규 대형 PvP','신규 클래스/직업','신규 서버/월드','신규 성장축','성장 시스템 확장','대형 BM 변경','최대 레벨 확장','경제/거래 구조 변화'];
function availableCategories(){const set=new Set(); DATA.forEach(g=>(g.events||[]).forEach(e=>asArray(e.representative_signals).forEach(s=>{if(s) set.add(s)}))); return [ALL_CATEGORIES,...SIGNAL_ORDER.filter(s=>set.has(s)),...Array.from(set).filter(s=>!SIGNAL_ORDER.includes(s)).sort()];}
function renderControls(){
  const games=[ALL_GAMES,...DATA.map(g=>g.name)];
  const years=[ALL_YEARS,...new Set(MONTHS.map(m=>m.slice(0,4)))];
  const categories=availableCategories();
  const ctl=$('controls');
  ctl.innerHTML=`<input class="search" id="search" placeholder="출시일·패치노트·본문 요약 검색..." value="${state.q.replaceAll('"','&quot;')}">`+ group(games,'games','game')+ group(years,'year','')+ `<span class="group-label">패치 카테고리</span>`+group(categories,'categories','');
  $('search').addEventListener('input',e=>{state.q=e.target.value; clearDetail(); renderTimeline();});
  ctl.querySelectorAll('[data-kind]').forEach(b=>b.onclick=()=>{handleFilterClick(b.dataset.kind,b.dataset.value); updateControlsActive(); clearDetail(); renderTimeline();});
}
function handleFilterClick(kind,value){
  if(kind==='games') return toggleMulti(state.games,value,ALL_GAMES);
  if(kind==='categories') return toggleMulti(state.categories,value,ALL_CATEGORIES);
  state[kind]=value;
}
function toggleMulti(set,value,allValue){
  if(value===allValue){set.clear(); set.add(allValue); return;}
  if(set.has(allValue)) set.clear();
  if(set.has(value)) set.delete(value); else set.add(value);
  if(set.size===0) set.add(allValue);
}
function isFilterActive(kind,value){
  if(kind==='games') return selectedContains(state.games,value);
  if(kind==='categories') return selectedContains(state.categories,value);
  return state[kind]===value;
}
function updateControlsActive(){document.querySelectorAll('[data-kind]').forEach(b=>{b.classList.toggle('active', isFilterActive(b.dataset.kind,b.dataset.value));});}
function clearDetail(){const side=$('side'); if(side) side.innerHTML=''; const content=$('content'); if(content) content.classList.add('no-side'); document.querySelectorAll('.event-card.selected').forEach(c=>c.classList.remove('selected'));}
function openDetail(){const content=$('content'); if(content) content.classList.remove('no-side');}
function group(values,kind,extra){return `<span class="group">${values.map(v=>`<button class="pill ${extra} ${isFilterActive(kind,v)?'active':''}" data-kind="${kind}" data-value="${v}">${v}</button>`).join('')}</span>`}
function render(){ renderControls(); renderTimeline(); attachViewportListeners(); }
function filteredEvents(){const out=[]; DATA.forEach(g=>(g.events||[]).forEach(e=>{if(matchEvent(e,g)) out.push({g,e});})); return out;}
function renderTimeline(){
  const root=$('timeline');
  let html=`<div class="month-header"><div class="corner">게임명</div>${MONTHS.map((m,i)=>`<div class="month">${Number(m.slice(5))}월</div>`).join('')}</div>`;
  let visibleCount=0;
  for(const g of DATA){
    if(!gameMatch(g)) continue;
    let byMonth={};
    for(let idx=0; idx<g.events.length; idx++){const e=g.events[idx]; if(matchEvent(e,g)){ (byMonth[ym(e.date_key)] ||= []).push({e,idx}); visibleCount++; }}
    html+=`<div class="game-row"><div class="game-label"><div class="game-name">${g.name}</div><div class="release">출시일 ${g.release_display||''}</div></div>`;
    for(const m of MONTHS){ const es=(byMonth[m]||[]).sort((a,b)=>String(a.e.date_key).localeCompare(String(b.e.date_key))); html+=`<div class="cell">${es.map(({e,idx})=>cardHtml(e,g,idx)).join('')}</div>`; }
    html+=`</div>`;
  }
  if(!visibleCount) html+=`<div class="no-results">조건에 맞는 항목이 없습니다.</div>`;
  root.innerHTML=html;
  const counter=$('counter'); if(counter) counter.textContent=`표시 ${visibleCount}건 / 전체 ${TOTAL_EVENTS}건`;
  root.querySelectorAll('.event-card').forEach(c=>c.onclick=(ev)=>{ev.stopPropagation(); root.querySelectorAll('.event-card.selected').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); showDetail(c.dataset.game,c.dataset.idx);});
  renderMinimap();
  updateMinimapViewport();
  updateFloatingYear();
}
function monthCounts(){const counts=Object.fromEntries(MONTHS.map(m=>[m,0])); filteredEvents().forEach(({e})=>{const m=ym(e.date_key); if(m in counts) counts[m]++;}); return counts;}
function scrollToMonth(month){const idx=MONTHS.indexOf(month); if(idx<0) return; const viewport=$('viewport'); const cellW=getMonthCellWidth(); const labelW=getLabelWidth(); viewport.scrollTo({left:Math.max(0,labelW+idx*cellW-40), behavior:'smooth'});}
function getMonthCellWidth(){const m=document.querySelector('.month'); return m?m.getBoundingClientRect().width:230;}
function getLabelWidth(){const c=document.querySelector('.corner'); return c?c.getBoundingClientRect().width:180;}
function renderMinimap(){
  const bars=$('minimapBars'); if(!bars) return;
  const counts=monthCounts(); const max=Math.max(1,...Object.values(counts)); const curYear=state.year;
  bars.innerHTML=MONTHS.map((m,i)=>{const c=counts[m]||0; const h=Math.max(8, Math.round((c/max)*100)); const cls=[c?'':'empty', m.endsWith('-01')?'year-start':'', (curYear!=='전체'&&m.startsWith(curYear))?'active-year':''].join(' '); return `<div class="mbar ${cls}" title="${m} · ${c}건" data-month="${m}" style="height:${c? h:8}%"></div>`;}).join('');
  bars.querySelectorAll('.mbar').forEach(b=>b.onclick=()=>scrollToMonth(b.dataset.month));
  const empty=$('minimapEmpty'); if(empty) empty.style.display=Object.values(counts).some(v=>v>0)?'none':'flex';
}
function updateMinimapViewport(){
  const viewport=$('viewport'), win=$('minimapWindow'), wrap=$('minimapWrap');
  if(!viewport||!win||!wrap) return;
  const maxScroll=Math.max(1, viewport.scrollWidth-viewport.clientWidth);
  const ratio=viewport.scrollLeft/maxScroll;
  const widthRatio=Math.min(1, viewport.clientWidth/Math.max(1,viewport.scrollWidth));
  const innerW=wrap.clientWidth;
  const w=Math.max(28, innerW*widthRatio);
  const left=Math.max(0, Math.min(innerW-w, ratio*(innerW-w)));
  win.style.width=w+'px'; win.style.left=left+'px';
}
function updateFloatingYear(){
  const viewport=$('viewport'), fy=$('floatingYear');
  if(!viewport||!fy||!MONTHS.length) return;
  const rect=viewport.getBoundingClientRect();
  if(rect.width<=0||rect.height<=0){fy.style.display='none';return;}
  const labelW=getLabelWidth(); const cellW=getMonthCellWidth();
  let idx=Math.floor(Math.max(0, viewport.scrollLeft-labelW)/Math.max(1,cellW));
  idx=Math.max(0, Math.min(MONTHS.length-1, idx));
  fy.textContent=MONTHS[idx].slice(0,4);
  fy.style.left=(rect.left+labelW+12)+'px';
  fy.style.top=(rect.top+11)+'px';
  fy.style.display='block';
}
function attachViewportListeners(){const viewport=$('viewport'); if(viewport&&!viewport.dataset.minimapBound){const sync=()=>{updateMinimapViewport(); updateFloatingYear();}; viewport.addEventListener('scroll',sync,{passive:true}); viewport.addEventListener('click',e=>{if(!e.target.closest('.event-card')) clearDetail();}); window.addEventListener('resize',sync); viewport.dataset.minimapBound='1';}}
function cardHtml(e,g,idx){ const major=isMajor(e); const rel=e.type==='release'; const sum=cardSummary(e); return `<div class="event-card ${major?'major':''} ${rel?'release-card':''}" data-game="${g.name}" data-idx="${idx}"><div class="title-line"><span class="dot"></span><span class="date-title">${escapeHtml(e.title||'')}</span></div>${sum?`<div class="summary ${major?'major-text':''}">${major?'<span class="major-badge in-summary">주요</span>':''}${escapeHtml(sum)}</div>`:''}</div>`; }
function showDetail(game,idx){
  openDetail();
  const g=GAME_BY_NAME[game], e=g.events[Number(idx)]; const major=isMajor(e);
  const signals=asArray(e.representative_signals).map(s=>`<span class="tag">${escapeHtml(s)}</span>`).join('');
  const majorItems=asArray(e.major_update_summary).map(textOf).map(cleanBullet).filter(Boolean);
  const bodyItems=asArray(e.body_summary).map(textOf).map(cleanBullet).filter(Boolean);
  const generalItems=asArray(e.general_patch_summary).map(textOf).map(cleanBullet).filter(Boolean);
  let html=`<div class="side-sub">선택 항목</div>${major?'<span class="tag">주요</span>':''}<div class="side-sub">${escapeHtml(g.name)}</div><div class="side-title">${escapeHtml(e.title||'')}</div>`;
  if(signals) html+=`<div class="box"><h3>패치 카테고리</h3>${signals}</div>`;
  if(majorItems.length) html+=box('주요 업데이트',majorItems);
  if(bodyItems.length) html+=box('본문 요약', bodyItems, 'primary');
  if(generalItems.length) html+=box('일반 패치 요약', generalItems);
  if(e.source_url) html+=`<a class="source-btn" href="${escapeAttr(e.source_url)}" target="_blank">원문 패치노트 열기</a>`;
  $('side').innerHTML=html;
}
function box(title,items,extra=''){return `<div class="box ${extra}"><h3>${escapeHtml(title)}</h3><ul>${items.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`}
function escapeHtml(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}
async function startApp(){
  try{
    await loadDataJson();
    refreshDerivedData();
    render();
  }catch(err){
    console.error(err);
    const root = document.getElementById('timeline');
    if(root) root.innerHTML = '<div style="padding:24px;color:#b91c1c;font-weight:700">data.json 로드 실패: '+String(err.message||err)+'</div>';
  }
}
startApp();
</script></body></html>
