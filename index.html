<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PatchLogDB 패치노트 타임라인</title>
<style>
* { box-sizing: border-box; }
:root {
  --label-w: 196px;
  --year-h: 54px;
  --timeline-w: 10800px;
  --border: #e2e8f0;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --grid-s: #cbd5e1;
  --grid-q: #edf2f7;
}
html, body { height: 100%; margin: 0; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
}
.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
  gap: 8px;
}

/* ── HEADER ── */
.header {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.03em;
  white-space: nowrap;
}
.legend {
  display: flex;
  gap: 12px;
  align-items: center;
  color: var(--muted);
  font-size: 11px;
  margin-left: auto;
  white-space: nowrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.ldot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.ldot.release { background: #0f172a; }
.ldot.update { background: #94a3b8; }
.ldot.today { background: #ef4444; }

/* ── CONTROLS ── */
.controls { flex: 0 0 auto; display: flex; flex-direction: column; gap: 6px; }
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
}
.ctrl-row::-webkit-scrollbar { display: none; }

.search-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 4px 9px;
  flex-shrink: 0;
}
.search-wrap svg { color: var(--muted); flex-shrink: 0; }
.search-wrap input {
  border: none; outline: none;
  font-size: 12px; color: var(--text);
  background: transparent; width: 120px;
  font-family: inherit;
}
.search-wrap input::placeholder { color: #94a3b8; }
.clr-btn {
  background: none; border: none; cursor: pointer;
  color: #94a3b8; padding: 0; font-size: 13px; line-height: 1;
  display: none;
}
.clr-btn:hover { color: #475569; }

.type-filters { display: flex; gap: 3px; flex-shrink: 0; }
.type-btn {
  padding: 4px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: white;
  font-size: 11px; font-weight: 600;
  cursor: pointer; color: var(--muted);
  transition: all 0.13s; font-family: inherit;
  white-space: nowrap;
}
.type-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
.type-btn:hover:not(.active) { border-color: #94a3b8; color: var(--text); }

.zoom-ctrl {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-left: auto;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--muted);
}
.zoom-ctrl input[type=range] { width: 88px; accent-color: #334155; cursor: pointer; }
.zoom-val { font-weight: 700; color: var(--text); font-size: 11px; min-width: 34px; text-align: right; }

.all-chip {
  padding: 3px 9px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 700;
  cursor: pointer; background: white;
  color: var(--muted); font-family: inherit;
  transition: all 0.13s; white-space: nowrap; flex-shrink: 0;
}
.all-chip.active { background: #0f172a; color: white; border-color: #0f172a; }

.game-filters { display: flex; gap: 4px; align-items: center; }
.gchip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 6px;
  border-radius: 999px; border: 1.5px solid transparent;
  font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  white-space: nowrap; flex-shrink: 0;
  transition: opacity 0.13s;
}
.gchip .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: white; }

.yr-jumps { display: flex; gap: 3px; margin-left: auto; flex-shrink: 0; }
.yjbtn {
  padding: 3px 6px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: white; font-size: 10px; font-weight: 700;
  cursor: pointer; color: var(--muted); font-family: inherit;
  transition: all 0.13s; white-space: nowrap;
}
.yjbtn:hover { background: #f8fafc; border-color: #94a3b8; color: var(--text); }

/* ── MINIMAP ── */
.minimap-section { flex: 0 0 auto; }
.minimap-hdr {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px;
}
.minimap-sub { font-weight: 400; color: #94a3b8; }
.minimap-wrap {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 8px 3px;
  position: relative; overflow: hidden;
  height: 42px;
}
.minimap-bars {
  display: flex; align-items: flex-end; gap: 0px;
  width: 100%; height: 100%;
}
.mbar {
  flex: 1; min-height: 2px;
  border-radius: 1px 1px 0 0;
  transition: opacity 0.13s;
  cursor: pointer;
}
.mbar:hover { opacity: 0.6 !important; }
.mbar.yr-start { border-left: 1px solid #e2e8f0; }
.minimap-today-line {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: #ef4444; pointer-events: none; z-index: 3;
}
.minimap-today-lbl {
  position: absolute; top: 3px;
  font-size: 8px; font-weight: 800; color: #ef4444;
  background: white; padding: 0 2px;
  transform: translateX(-50%); white-space: nowrap; z-index: 4;
  pointer-events: none;
}

/* ── MAIN SHELL ── */
.shell {
  flex: 1 1 auto; min-height: 0;
  display: grid; grid-template-columns: 1fr 276px; gap: 8px;
}
.timeline-card, .detail-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 3px rgba(15,23,42,0.05);
}
.timeline-card { min-width: 0; min-height: 0; }
.timeline-vp {
  width: 100%; height: 100%;
  overflow: auto; scroll-behavior: smooth;
}
.timeline-inner { position: relative; min-height: 100%; }

.corner {
  position: sticky; left: 0; top: 0; z-index: 10;
  width: var(--label-w); height: var(--year-h);
  background: #f8fafc;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; font-size: 12px; font-weight: 700;
}

.yr-header {
  position: sticky; top: 0; z-index: 9;
  margin-left: var(--label-w);
  width: var(--timeline-w);
  height: var(--year-h);
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
}
.yr-tick {
  position: absolute; top: 0; bottom: 0;
  border-left: 1px solid var(--grid-s);
  display: flex; align-items: flex-start;
  padding-top: 8px; padding-left: 7px;
  font-size: 12px; font-weight: 700;
}
.q-lbl {
  position: absolute; bottom: 5px;
  transform: translateX(-50%);
  font-size: 9px; color: #94a3b8; font-weight: 700;
}
.today-hdr {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: #ef4444; opacity: 0.75;
}
.today-hdr-lbl {
  position: absolute; top: 4px;
  font-size: 9px; font-weight: 800; color: #ef4444;
  background: #f8fafc; padding: 0 2px;
  transform: translateX(-50%); white-space: nowrap;
}

.rows { position: relative; }
.row {
  position: relative;
  border-bottom: 1px solid var(--border);
  background: white;
  transition: background 0.1s;
}
.row:hover { background: #fafbfd; }
.game-label {
  position: sticky; left: 0; z-index: 7;
  width: var(--label-w); height: 100%;
  background: inherit;
  border-right: 1px solid var(--border);
  padding: 10px 11px 10px 15px;
  display: flex; flex-direction: column; justify-content: center; gap: 2px;
}
.game-strip {
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.game-name { font-size: 12px; font-weight: 700; line-height: 1.25; }
.game-rdt { font-size: 10px; color: var(--muted); }
.game-badges { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.cbadge {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 6px; border-radius: 999px;
  font-size: 9px; font-weight: 700;
}

.track {
  position: absolute; left: var(--label-w); top: 0;
  width: var(--timeline-w); height: 100%;
}
.row-line { position: absolute; left: 0; right: 0; top: 18px; border-top: 1px solid #e9eef5; }
.gl-yr { position: absolute; top: 0; bottom: 0; border-left: 1px dashed #cbd5e1; }
.gl-q { position: absolute; top: 0; bottom: 0; border-left: 1px dashed #edf2f7; }
.today-row {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: #ef4444; opacity: 0.3;
  z-index: 4; pointer-events: none;
}

.ev {
  position: absolute; width: 220px;
  transform: translateX(-50%);
  cursor: pointer; user-select: none; z-index: 5;
}
.ev-card {
  position: relative; min-height: 50px;
  padding: 7px 9px 7px 26px;
  background: white; border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  transition: box-shadow 0.13s, transform 0.1s;
}
.ev-dot {
  position: absolute; left: 9px; top: 12px;
  width: 10px; height: 10px; border-radius: 50%;
}
.ev-date { font-size: 9.5px; color: var(--muted); margin-bottom: 2px; line-height: 1.2; }
.ev-title {
  font-size: 10.5px; font-weight: 500; line-height: 1.4;
  word-break: keep-all; overflow-wrap: anywhere;
}
.ev-title strong { font-weight: 800; }
.ev-title em { font-style: italic; }
.ev-title code {
  padding: 0 3px; border-radius: 3px;
  background: #f1f5f9; font-family: monospace; font-size: 0.9em;
}
.ev:hover .ev-card { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,23,42,0.11); }
.ev.selected .ev-card { box-shadow: 0 3px 14px rgba(15,23,42,0.14); }
.ev.dimmed { opacity: 0.18; pointer-events: none; }

.ev-anchor {
  position: absolute;
  top: 13px;
  width: 12px; height: 12px;
  border-radius: 50%;
  transform: translateX(-50%);
  border: 2px solid white;
  box-shadow: 0 0 0 1.5px rgba(15,23,42,0.18);
  z-index: 6;
  pointer-events: none;
}
.ev-link {
  position: absolute;
  overflow: visible;
  z-index: 4;
  pointer-events: none;
}
.ev-link line {
  stroke-width: 1.5;
  stroke-dasharray: 2 2;
  opacity: 0.8;
}
.hit {
  padding: 0 1px;
  background: #fde68a;
  border-radius: 2px;
  color: inherit;
}

/* ── DETAIL PANEL ── */
.detail-card {
  padding: 14px; overflow: auto;
  display: flex; flex-direction: column; gap: 0;
}
.kicker {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.d-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  text-align: center; font-size: 13px; color: #94a3b8; line-height: 1.7;
}
.d-badge {
  display: inline-block; padding: 2px 8px;
  border: 1.5px solid; border-radius: 999px;
  font-size: 11px; font-weight: 700; margin-bottom: 8px;
}
.d-game { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.d-title { font-size: 15px; font-weight: 700; line-height: 1.45; margin-bottom: 8px; }
.d-title strong { font-weight: 900; }
.d-title em { font-style: italic; }
.d-date { font-size: 12px; font-weight: 700; color: #334155; margin-bottom: 12px; }
.d-note {
  margin-top: auto; padding: 9px 11px;
  border: 1px solid var(--border); background: #f8fafc;
  border-radius: 9px; font-size: 11px; color: #64748b; line-height: 1.6;
}
.d-stats {
  margin-top: 10px; padding: 10px 11px;
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 9px;
}
.d-stat {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; padding: 3px 0;
  border-bottom: 1px solid #e9eef5;
}
.d-stat:last-child { border-bottom: none; }
.d-stat-lbl { color: var(--muted); }
.d-stat-val { font-weight: 700; }

.no-results {
  padding: 48px 0; text-align: center;
  color: var(--muted); font-size: 13px;
}

@media (max-width: 1100px) {
  .shell { grid-template-columns: 1fr; }
  .detail-card { max-height: 200px; }
}
</style>
</head>

  <!-- MINIMAP -->
  <div class="minimap-section">

      <div class="minimap-today-lbl" id="minimapTodayLbl">기준일</div>

  <!-- MAIN -->
  <div class="shell">
    <section class="timeline-card">
      <div class="timeline-vp" id="viewport">
        <div class="timeline-inner" id="timelineInner">
          <div class="corner">게임명</div>
          <div class="yr-header" id="yrHeader"></div>

      </div>

    <aside class="detail-card">

      </div>
    </aside>
  </div>

</div>

/* ─── CONSTANTS ─── */
const GAME_COLORS = {
  "미르4": "#c2410c"
};

const START   = new Date("2020-01-01T00:00:00+09:00");
const END     = new Date("2026-12-31T23:59:59+09:00");
const TODAY   = new Date("2026-05-20T00:00:00+09:00");
const TOTAL   = END - START;
const YEARS   = [2020,2021,2022,2023,2024,2025,2026];
const BASE_W  = 10800;
const CARD_W  = 220;
const CARD_GAP= 16;
const MIN_DIST= CARD_W + CARD_GAP;
const LANE_H  = 76;
const ROW_TOP = 40;
const ROW_BOT = 18;

/* ─── STATE ─── */
let timelineW  = BASE_W;
let activeGames = new Set(games.map(g => g.name));
let activeType  = "all";
let searchQ     = "";
let selNode     = null;

/* ─── HELPERS ─── */
function dx(dateStr) {
  return ((new Date(dateStr + "T00:00:00+09:00") - START) / TOTAL) * timelineW;
}
function todayX() { return ((TODAY - START) / TOTAL) * timelineW; }

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escRe(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
function highlightEscaped(raw) {
  let s = esc(raw);
  if (!searchQ) return s;
  const q = esc(searchQ);
  if (!q) return s;
  return s.replace(new RegExp(escRe(q), "gi"), m => `<mark class="hit">${m}</mark>`);
}
function md(raw) {
  let s = highlightEscaped(raw);
  s = s.replace(/`([^`]+)`/g,"<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/__([^_]+)__/g,"<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g,"<em>$1</em>");
  s = s.replace(/_([^_]+)_/g,"<em>$1</em>");
  return s;
}
function hl(raw) {
  return highlightEscaped(raw);
}

function quarterBounds(ev) {
  const startMonth = (ev.quarter - 1) * 3 + 1;
  const qStart = dx(`${ev.year}-${String(startMonth).padStart(2,"0")}-01`);
  let endYear = ev.year;
  let endMonth = startMonth + 3;
  if (endMonth > 12) { endMonth -= 12; endYear += 1; }
  const qEnd = dx(`${endYear}-${String(endMonth).padStart(2,"0")}-01`);
  return { qStart, qEnd };
}
function preferredCardX(ev) {
  const anchorX = dx(ev.date_key);
  const { qStart, qEnd } = quarterBounds(ev);
  const pad = 12;
  const minC = qStart + CARD_W / 2 + pad;
  const maxC = qEnd - CARD_W / 2 - pad;
  const cardX = maxC >= minC ? Math.min(Math.max(anchorX, minC), maxC) : anchorX;
  return { anchorX, cardX };
}
function assignLanes(events) {
  const grouped = new Map();
  events.forEach((ev, i) => {
    const k = `${ev.year}-${ev.quarter}`;
    if (!grouped.has(k)) grouped.set(k, []);
    const pos = preferredCardX(ev);
    grouped.get(k).push({...ev, _i: i, _anchorX: pos.anchorX, _cardX: pos.cardX});
  });
  const byIdx = {}; let maxLane = 1;
  grouped.forEach(grp => {
    const sorted = grp.sort((a,b) => a._cardX - b._cardX || a._anchorX - b._anchorX);
    const ends = [];
    sorted.forEach(ev => {
      let lane = 0;
      while (lane < ends.length && ev._cardX - ends[lane] < MIN_DIST) lane++;
      if (lane === ends.length) ends.push(ev._cardX); else ends[lane] = ev._cardX;
      ev._lane = lane; byIdx[ev._i] = ev;
    });
    maxLane = Math.max(maxLane, ends.length);
  });
  return { maxLane, byIdx };
}

/* ─── RENDER: YEAR HEADER ─── */
function renderYearHeader() {
  const el = document.getElementById("yrHeader");
  el.innerHTML = "";
  YEARS.forEach(yr => {
    const yt = document.createElement("div");
    yt.className = "yr-tick";
    yt.style.left = dx(`${yr}-01-01`) + "px";
    yt.textContent = yr;
    el.appendChild(yt);
    [1,2,3,4].forEach(q => {
      const cm = (q-1)*3+2;
      const ql = document.createElement("div");
      ql.className = "q-lbl";
      ql.style.left = dx(`${yr}-${String(cm).padStart(2,"0")}-15`) + "px";
      ql.textContent = `${q}Q`;
      el.appendChild(ql);
    });
  });
  // Today line + label in header
  const tx = todayX();
  const tl = document.createElement("div");
  tl.className = "today-hdr"; tl.style.left = tx + "px";
  el.appendChild(tl);
  const tll = document.createElement("div");
  tll.className = "today-hdr-lbl"; tll.style.left = tx + "px";
  tll.textContent = "기준일";
  el.appendChild(tll);
}

/* ─── RENDER: DETAIL PANEL ─── */
function renderDetail(game, event, color) {
  document.getElementById("detail").innerHTML = `
    <div class="d-badge" style="border-color:${color};color:${color}">${"패치노트"}</div>
    <div class="d-game" style="color:${color}">◉ ${esc(game.name)}</div>
    <div class="d-title">${md(event.title)}</div>
    <div class="d-date">${hl(event.date_display)}</div>
  `;
}

/* ─── RENDER: ROWS ─── */
function renderRows() {
  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = ""; selNode = null;
  let anyRow = false;

  games.forEach(game => {
    if (!activeGames.has(game.name)) return;
    const color = GAME_COLORS[game.name] || "#475569";

    const filtered = game.events.filter(ev => {
      if (activeType !== "all" && ev.type !== activeType) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return ev.title.toLowerCase().includes(q) || ev.date_display.includes(q);
      }
      return true;
    });
    if (filtered.length === 0) return;
    anyRow = true;

    const { maxLane, byIdx } = assignLanes(filtered);
    const rowH = ROW_TOP + maxLane * LANE_H + ROW_BOT;

    const row = document.createElement("div");
    row.className = "row"; row.style.height = rowH + "px";

    // Label
    const label = document.createElement("div");
    label.className = "game-label";

    const strip = document.createElement("div");
    strip.className = "game-strip"; strip.style.background = color;
    label.appendChild(strip);

    const rCnt = filtered.filter(e => e.type === "release").length;
    const uCnt = filtered.filter(e => e.type === "update").length;

    const nameEl = document.createElement("div");
    nameEl.className = "game-name"; nameEl.textContent = game.name;
    label.appendChild(nameEl);

    const dtEl = document.createElement("div");
    dtEl.className = "game-rdt"; dtEl.textContent = `기록 시작 ${game.release_display}`;
    label.appendChild(dtEl);

    const badges = document.createElement("div");
    badges.className = "game-badges";
    if (rCnt > 0) {
      const rb = document.createElement("span");
      rb.className = "cbadge";
      rb.style.cssText = `background:${color}18;color:${color}`;
      rb.textContent = `출시 ${rCnt}`;
      badges.appendChild(rb);
    }
    if (uCnt > 0) {
      const ub = document.createElement("span");
      ub.className = "cbadge";
      ub.style.cssText = "background:#f1f5f9;color:#64748b";
      ub.textContent = `업 ${uCnt}건`;
      badges.appendChild(ub);
    }
    label.appendChild(badges);
    row.appendChild(label);

    // Track
    const track = document.createElement("div");
    track.className = "track";
    track.appendChild(Object.assign(document.createElement("div"), {className:"row-line"}));

    YEARS.forEach(yr => {
      const gy = document.createElement("div");
      gy.className = "gl-yr"; gy.style.left = dx(`${yr}-01-01`) + "px";
      track.appendChild(gy);
      [4,7,10].forEach(m => {
        const gq = document.createElement("div");
        gq.className = "gl-q";
        gq.style.left = dx(`${yr}-${String(m).padStart(2,"0")}-01`) + "px";
        track.appendChild(gq);
      });
    });

    // Today line in row
    const trow = document.createElement("div");
    trow.className = "today-row"; trow.style.left = todayX() + "px";
    track.appendChild(trow);

    // Events
    filtered.forEach((event, ei) => {
      const asgn = byIdx[ei];
      if (!asgn) return;

      const evEl = document.createElement("div");
      evEl.className = "ev " + event.type;
      evEl.style.left = asgn._cardX + "px";
      evEl.style.top  = (ROW_TOP + asgn._lane * LANE_H) + "px";

      const bdrColor  = event.type === "release" ? color : "#e2e8f0";
      const dotColor  = event.type === "release" ? color : color + "99";
      const shadowClr = color + "26";

      const anchor = document.createElement("div");
      anchor.className = "ev-anchor";
      anchor.style.left = asgn._anchorX + "px";
      anchor.style.background = dotColor;
      track.appendChild(anchor);

      const cardTop = ROW_TOP + asgn._lane * LANE_H;
      const linkTop = 19;
      const x1 = asgn._anchorX;
      const x2 = asgn._cardX;
      const leftX = Math.min(x1, x2);
      const linkW = Math.max(1, Math.abs(x2 - x1));
      const linkH = Math.max(1, cardTop - linkTop);
      const link = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      link.setAttribute("class", "ev-link");
      link.style.left = leftX + "px";
      link.style.top = linkTop + "px";
      link.setAttribute("width", linkW);
      link.setAttribute("height", linkH);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1 - leftX);
      line.setAttribute("y1", "0");
      line.setAttribute("x2", x2 - leftX);
      line.setAttribute("y2", linkH);
      line.setAttribute("stroke", dotColor);
      link.appendChild(line);
      track.appendChild(link);

      evEl.innerHTML = `
        <div class="ev-card" style="border-color:${bdrColor}${event.type==='release'?`;box-shadow:0 1px 6px ${shadowClr}`:''}">
          <div class="ev-dot" style="background:${dotColor}"></div>
          <div class="ev-date">${hl(event.date_display)}</div>
          <div class="ev-title">${md(event.title)}</div>
        </div>`;

      evEl.addEventListener("click", () => {
        document.querySelectorAll(".ev.selected").forEach(e => e.classList.remove("selected"));
        evEl.classList.add("selected");
        selNode = evEl;
        renderDetail(game, event, color);
      });
      track.appendChild(evEl);

      if (!selNode) {
        evEl.classList.add("selected");
        selNode = evEl;
        renderDetail(game, event, color);
      }
    });

    row.appendChild(track);
    rowsEl.appendChild(row);
  });

  if (!anyRow) {
    const nr = document.createElement("div");
    nr.className = "no-results";
    nr.textContent = "🔍 검색 결과가 없습니다.";
    rowsEl.appendChild(nr);
    document.getElementById("detail").innerHTML = '<div class="d-placeholder">패치노트를 클릭하여<br>상세 정보를 확인하세요</div>';
  }
}

/* ─── RENDER: MINIMAP ─── */
function renderMinimap() {
  const barsEl = document.getElementById("minimapBars");
  barsEl.innerHTML = "";

  const quarters = [];
  for (let yr = 2017; yr <= 2026; yr++)
    for (let q = 1; q <= 4; q++) quarters.push({yr, q});

  const counts = quarters.map(({yr, q}) => {
    let c = 0;
    games.forEach(g => {
      if (!activeGames.has(g.name)) return;
      g.events.forEach(ev => {
        if (activeType !== "all" && ev.type !== activeType) return;
        if (ev.year !== yr || ev.quarter !== q) return;
        if (searchQ && !(ev.title.toLowerCase().includes(searchQ.toLowerCase()) || ev.date_display.includes(searchQ))) return;
        c++;
      });
    });
    return c;
  });

  const maxC = Math.max(...counts, 1);

  quarters.forEach(({yr, q}, i) => {
    const bar = document.createElement("div");
    bar.className = "mbar" + (q === 1 ? " yr-start" : "");
    const hPct = Math.max(3, (counts[i] / maxC) * 100);
    bar.style.height = hPct + "%";
    const intensity = counts[i] / maxC;
    // Gradient from slate-blue (low) to indigo (medium) to violet (high)
    const h = Math.round(240 - intensity * 50);
    const s = Math.round(40 + intensity * 50);
    const l = Math.round(72 - intensity * 32);
    bar.style.background = `hsl(${h},${s}%,${l}%)`;
    bar.title = `${yr} Q${q}: ${counts[i]}건`;
    bar.addEventListener("click", () => {
      const frac = (yr - 2017 + (q - 1) / 4) / 10;
      document.getElementById("viewport").scrollTo({left: frac * timelineW - 40, behavior: "smooth"});
    });
    barsEl.appendChild(bar);
  });

  // Today marker
  const todayFrac = (TODAY - START) / TOTAL;
  document.getElementById("minimapTodayLine").style.left = (todayFrac * 100) + "%";
  document.getElementById("minimapTodayLbl").style.left  = (todayFrac * 100) + "%";
}

/* ─── UPDATE LAYOUT ─── */
function updateLayout() {
  document.documentElement.style.setProperty("--timeline-w", timelineW + "px");
  document.getElementById("timelineInner").style.width = `calc(var(--label-w) + ${timelineW}px)`;
}

function renderAll() {
  updateLayout();
  renderYearHeader();
  renderRows();
  renderMinimap();
}

/* ─── SETUP: GAME CHIPS ─── */
function setupGameChips() {
  const container = document.getElementById("gameFilters");
  games.forEach(game => {
    const color = GAME_COLORS[game.name] || "#475569";
    const chip = document.createElement("button");
    chip.className = "gchip";
    chip.dataset.game = game.name;
    chip.innerHTML = `<span class="cdot" style="background:white"></span>${esc(game.name)}`;
    chip.style.cssText = `background:${color};color:white;border-color:${color};opacity:1`;

    chip.addEventListener("click", () => {
      const isOn = activeGames.has(game.name);
      if (isOn && activeGames.size <= 1) return;
      if (isOn) {
        activeGames.delete(game.name);
        chip.style.background = "white"; chip.style.color = color; chip.style.opacity = "0.5";
      } else {
        activeGames.add(game.name);
        chip.style.background = color; chip.style.color = "white"; chip.style.opacity = "1";
      }
      document.getElementById("allChip").classList.toggle("active", activeGames.size === games.length);
      renderRows(); renderMinimap();
    });
    container.appendChild(chip);
  });

  document.getElementById("allChip").addEventListener("click", () => {
    games.forEach(g => activeGames.add(g.name));
    document.querySelectorAll(".gchip").forEach(ch => {
      const c = GAME_COLORS[ch.dataset.game] || "#475569";
      ch.style.background = c; ch.style.color = "white"; ch.style.opacity = "1";
    });
    document.getElementById("allChip").classList.add("active");
    renderRows(); renderMinimap();
  });
}

/* ─── SETUP: YEAR JUMPS ─── */
function setupYearJumps() {
  const container = document.getElementById("yrJumps");
  YEARS.forEach(yr => {
    const btn = document.createElement("button");
    btn.className = "yjbtn"; btn.textContent = yr;
    btn.addEventListener("click", () => {
      document.getElementById("viewport").scrollTo({left: dx(`${yr}-01-01`) - 12, behavior: "smooth"});
    });
    container.appendChild(btn);
  });
}

/* ─── SETUP: TYPE FILTER ─── */
document.querySelectorAll(".type-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeType = btn.dataset.type;
    renderRows(); renderMinimap();
  });
});

/* ─── SETUP: SEARCH ─── */
const searchInput = document.getElementById("searchInput");
const clrBtn = document.getElementById("clrBtn");
searchInput.addEventListener("input", e => {
  searchQ = e.target.value.trim();
  clrBtn.style.display = searchQ ? "block" : "none";
  renderRows(); renderMinimap();
});
clrBtn.addEventListener("click", () => {
  searchInput.value = ""; searchQ = "";
  clrBtn.style.display = "none";
  renderRows(); renderMinimap();
});

/* ─── SETUP: ZOOM ─── */
document.getElementById("zoomSlider").addEventListener("input", e => {
  const vp = document.getElementById("viewport");
  const labelW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--label-w")) || 196;
  const visibleTimelineW = Math.max(1, vp.clientWidth - labelW);
  const centerXBefore = vp.scrollLeft + visibleTimelineW / 2;
  const centerFrac = timelineW > 0 ? centerXBefore / timelineW : 0;

  const zoom = parseInt(e.target.value);
  document.getElementById("zoomVal").textContent = zoom + "%";
  timelineW = Math.round(BASE_W * zoom / 100);
  renderAll();

  requestAnimationFrame(() => {
    const target = centerFrac * timelineW - visibleTimelineW / 2;
    vp.scrollLeft = Math.max(0, target);
  });
});

/* ─── INIT ─── */
setupGameChips();
setupYearJumps();
renderAll();
</script>
</body>
</html>
