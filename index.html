 3차 인원 확장; Lv.50 이상 캐릭터 보유","summary_items":["원문 전문","자유를 향한 검은 날개","12월 14일(목) 업데이트 점검 이후 적용될 사항에 대해 안내드립니다.","이번 업데이트에서는 많은 단원님들께서 기다리시던 제 3차 서버 이전이 시작되며, 에픽 던전 : 하르페논 성소에 신규 네임드 몬스터가 추가됩니다.","또한, 신 트리에스테 공국 전 지역과 격전지에서의 몬스터 사냥 경험치가 상향되며, 일부 밤까마귀 장비와 영웅 등급 팔찌의 능력치가 상향 조정됩니다.","마지막으로, 크리스마스를 기념한 신규 의상과 이벤트 탈것이 추가되며 다양한 이벤트가 진행될 예정입니다."]},{"date_key":"2023-12-21","date_display":"2023.12.21","title":"12월 21일(목) 패치노트","type":"update","year":2023,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/216322","note":"이번 시즌에서는 이전과는 다르게 3개의 서버 그룹이 매칭되어, 각 조에는 총 9개의 서버가 참여하게 됩니다.; 격전지 및 월드 격전지 네임드 몬스터의 출현 수량이 줄어들고, 출현 빈도가 조정됩니다.; 격전지 및 월드 격전지 네임드 몬스터의 아이템 드랍률이 상향 조정됩니다.; 월드 격전지에 출현하는 네임드 몬스터의 능력치가 증가됩니다.; 모든 보스 몬스터의 출현 주기에서 랜덤 시간을 제거하고 고정 주기로 변경됩니다.; 돌격 자세 기술에 이동 속도 능력치가 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","12월 21일(목) 업데이트 점검 이후 적용될 사항에 대해 안내드립니다.","이번 업데이트에서는 희귀 ~ 신화 등급의 신규 탈것 추가 및 창과 마법봉 클래스의 일부 스킬 상향, 에픽 던전 네임드 몬스터 ‘로키우스’가 고정된 위치에서 등장하도록 수정, 월드 격전지에서 출현하는 네임드 몬스터의 출현 빈도 하향과 더불어 처치 보상이 상향됩니다.","이 외에도 게임 이용에 불편을 주었던 부분에 대한 수정 작업과 편의성 개선 또한 준비하였으니 이용해주시는 단원님의 많은 관심을 부탁드립니다.","＊ 점검이 시작되는 08시를 기점으로"]},{"date_key":"2023-12-28","date_display":"2023.12.28","title":"12월 28일(목) 패치노트","type":"update","year":2023,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/218257","note":"로키우스의 출현 주기에서 랜덤 시간을 제거하고, 고정 주기로 변경됩니다.; 로키우스의 아이템 드랍률이 상향 조정됩니다.; 신화 등급 탈것의 교체 가능 횟수가 최대 2회에서 3회로 변경됩니다.; 출석; 출석; 보스 토벌","summary_items":["원문 전문","자유를 향한 검은 날개","12월 28일(목) 업데이트 점검 이후 적용될 사항에 대해 안내드립니다.","금주 업데이트를 통해 에픽 던전 내 네임드 몬스터 ‘로키우스’의 출현 주기를 고정 주기로 변경하고 아이템 드랍률을 상향 조정하였습니다. 이로 인해 더욱 치열한 전투가 벌어질 것으로 예상됩니다.","또한, 지난 업데이트에서 신화 등급 탈것 종류가 추가됨에 따라 신화 등급 탈것의 교체 가능 횟수가 최대 2회에서 3회로 변경되었습니다.","더불어 원활하고 안정적인 서비스를 제공드리기 위해 기타 오류 수정 작업이 진행되었습니다."]},{"date_key":"2024-01-04","date_display":"2024.01.04","title":"1월 4일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/219801","note":"기존 4주 단위로 진행되던 서버 매칭이 1주 단위의 무작위 매칭으로 변경됩니다.; 월드 던전 보스 몬스터 등장 일정이 아래와 같이 변경됩니다.; 제작 및 기술서 상인을 통해 획득할 수 있습니다.; 푸른 용의 조각은 일반 던전 3종(번영의 땅, 수련의 숲, 산코나 유적) 몬스터 처치 시 획득할 수 있습니다.; 푸른 용의 조각을 사용하여 이벤트 아이템을 제작할 수 있습니다.; 사용 시 30분간 능력이 상승합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","1월 4일(목) 업데이트 점검 이후 적용될 사항에 대해 안내드립니다.","이번 업데이트에서는 까마귀 서신을 통해 안내드렸던 월드 던전의 리뉴얼이 진행됩니다.","월드 던전의 매칭 주기가 기존 4주에서 1주 단위의 무작위 매칭으로 변경되어 조금 더 긴장감 있는 경쟁 구도를 가지게 될 것으로 기대됩니다.","기존 용맹 주화 초기화 시간과 고대의 유물 아티팩트는 기존과 동일하게 4주간 유지됩니다."]},{"date_key":"2024-01-11","date_display":"2024.01.11","title":"1월 11일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/221276","note":"네임드 몬스터 로키우스의 생명력이 증가하고, 능력치가 상향 조정됩니다.; 정예 몬스터 성소 수호단장 처치 시 수호단장의 궤짝(귀속)이 확정적으로 드랍됩니다.; 전설 등급 기술서; 영웅 등급 기술서; 전설 등급 방어구 제작 재료; 황금 흉갑 휘장","summary_items":["원문 전문","자유를 향한 검은 날개","1월 11일(목) 업데이트 이후의 적용 사항에 대해 안내드립니다.","게임의 다양한 측면에서의 향상이 이루어집니다. 밤까마귀 장비의 능력치가 상향 조정되어 높은 효과를 누릴 수 있게 되었으며, 가방 및 창고의 최대 공간이 확장되어 보다 효율적인 아이템 관리가 가능합니다. 또한, 보스의 출현 예상 시간 정보가 더욱 세분화되어 편의성을 높이는 데 기여합니다.","게임의 난이도 및 밸런스에 대한 고려가 진행되어, 파티 던전의 난이도가 조정되며, 일부 지역에서의 아이템 드랍률 또한 조정됩니다. 이에 더불어, 게임 내의 기타 변경 사항들로는 공헌 주화 상품의 가격 조정 등이 포함됩니다.","업데이트의 자세한 내용은 하단의 내용을 참고하여 주시기 바랍니다."]},{"date_key":"2024-01-18","date_display":"2024.01.18","title":"1월 18일(목) 패치노트 (1/23 11:43 수정)","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/222452","note":"캐릭터의 잠재력을 해방시켜 능력치를 상승시킬 수 있는 잠재력 시스템이 추가됩니다.; 각 슬롯마다 해방의 씨앗을 소모하여 돌파 경험치를 획득할 수 있습니다.; 돌파 경험치는 무작위로 증가하며 경험치를 모두 충족시키면 돌파 효과 능력치를 획득합니다.; 돌파 경험치를 모두 충족시킬 때까지 사용된 해방의 씨앗 개수가 누적되며, 돌파 후 초기화를 통해 씨앗을 반환 받을 수도 있습니다.; 해방의 씨앗은 희귀 등급 장비를 분해하여 얻을 수 있는 해방의 결정으로 제작할 수 있습니다.; 해방의 결정 3개","summary_items":["원문 전문","자유를 향한 검은 날개","1월 18일(목) 업데이트 이후의 적용 사항에 대해 안내드립니다.","이번 업데이트에서는 캐릭터를 더욱 강하게 성장시켜줄 잠재력 시스템과 상급 기술 특성, 신화 등급을 비롯한 여러 등급의 신규 글라이더들과 신화 등급 원소 5종이 추가됩니다.","또한, 월드 던전이 완전히 새로운 모습으로 리뉴얼되며 에픽 던전 : 하르페논 성소에 막대한 보상을 획득할 수 있는 보물 상자가 출현하게 됩니다.","아울러 그간 여러 단원님들께서 건의하신 클래스간 밸런스 조정 또한 이루어질 예정입니다."]},{"date_key":"2024-01-25","date_display":"2024.01.25","title":"1월 25일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/224630","note":"클래스 체인지는 상점 – 클래스 체인지에서 이용할 수 있습니다.; 클래스 체인지는 Lv.50 이상, 2차 클래스 이상의 캐릭터만 가능합니다.; 클래스 체인지는 서버당 2회에 한하여 가능합니다.; 현재 전직 차수와 동일한 단계의 타 클래스로 변경할 수 있습니다.; 보유 중인 영웅 등급 이상 모든 무기 외형을 선택하여 변경하려는 클래스의 무기 외형으로 변경할 수 있습니다.; 무기 외형은 최대 3개까지 변경할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","1월 25일(목) 업데이트 이후 적용 사항에 대해 안내드립니다.","이번 업데이트부터 일주일 간 원하는 클래스로 변경할 수 있는 ‘클래스 체인지’를 이용하실 수 있게 됩니다.","또한, 특수 던전: 마사르타 기암 성역 내 ‘7지역’과 ‘8지역’ 추가와 더불어 신화 등급 무기 외형의 능력치가 상향됩니다.","이 외에도 격전지: 킬데바트와 특수 던전: 마사르타 기암 성역 내 보스 몬스터에 대한 변경 사항 및 에픽 던전 내 보물 상자 조작 시간 변경, 번영의 땅 5구역에서 ‘사금 주머니’ 아이템 드랍률이 상향되는 등 다양한 방면에서 개선 및 변경 사항이 적용됩니다."]},{"date_key":"2024-02-01","date_display":"2024.02.01","title":"2월 1일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/225820","note":"보유한 전공 휘장은 2월 1일(목) 23; 보유한 용맹 주화는 2월 2일(금) 12; 신규 사냥터 지역이 추가되고, 기존 사냥터의 난이도가 조정됩니다.; 일부 지역의 아이템 드랍률이 상향 조정됩니다.; Lv.80 ~ Lv.90 지역; Lv.80 ~ Lv.94 지역","summary_items":["원문 전문","자유를 향한 검은 날개","2월 1일(목) 업데이트 이후 적용 사항에 대해 안내드립니다.","이번 업데이트로 혼돈의 킬데바트에 신규 사냥터가 추가되고 기존 사냥터의 난이도가 조정되며, 일부 사냥터의 아이템 드랍률이 상향 조정됩니다.","또한, 격전지와 용맹 주화 상인이 판매하는 아이템 항목이 변경되고 월드 던전 내 보물 상자 추가, 마사르타 얼음 동굴 보스 처치 보상 추가 드랍 이벤트 등이 진행됩니다.","이 외에도 다양한 혜택과 이벤트가 제공되는 특별한 서버, '부트캠프'가 추가되며, 특별한 상품을 구매할 수 있는 원스토어 버전이 출시됩니다. 원스토어 버전 출시에 대한 상세한 내용은 추후 별도 공지사항을 통해 추가 안내해 드릴 예정입니다."]},{"date_key":"2024-02-07","date_display":"2024.02.07","title":"2월 7일(수) 패치노트(15:10 수정)","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/227801","note":"3페이지 마력 주입은 마력 서리 결정을 소비하여 주입이 가능합니다.; 마력 서리 결정 I 은 공헌 주화 상인 및 제작을 통해 획득할 수 있습니다.; 기존 아티팩트 2종(향로, 나침반)을 각성할 수 있습니다.; 각성은 +6 강화 이상의 아티팩트가 필요하며, 동일한 강화 수치로 각성됩니다.; 거래 가능 여부에 따라 각각의 제작 레시피가 존재합니다.; 각성에는 고유 재료가 필요하며, 아래 제작식으로 각각 제작할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2월 7일(수) 업데이트 이후 적용 사항에 대해 안내드립니다.","이번 업데이트에서는 마력 주입 3페이지가 추가되며, 아티팩트 2종(향로, 나침반)의 각성 추가 및 설날 기념 글라이더가 추가됩니다.","또한 월드 던전 보물 상자의 개봉 시간 단축과 실패 확률이 있는 아이템을 제작할 때에도 확률 정보를 알아볼 수 있도록 개선됩니다.","＊ 1월 4일(목) 추가된 「알린의 스텝업(희귀~전설)」 상품은 2월 7일(수) 업데이트를 마지막으로 판매가 조기 종료 될 예정입니다. 상품 구매를 원하셨던 단원님께서는 반드시 점검 전까지 구매해주시길 바랍니다."]},{"date_key":"2024-02-15","date_display":"2024.02.15","title":"2월 15일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/229882","note":"서버 이전은 상점 – 서버 이전에서 이용할 수 있습니다.; 서버 이전은 서버의 혼잡 방지와 서버 간의 인원 균형을 위하여 제한된 인원 내에서 이전이 가능하며, 2월 15일(목) 12; 1차 인원 확장; 2차 인원 확장; 3차 인원 확장; Lv.50 이상 캐릭터 보유","summary_items":["원문 전문","자유를 향한 검은 날개","2월 15일(목) 업데이트 이후 적용 사항에 대해 안내드립니다.","이번 업데이트에서는 많은 단원님들께서 기다리시던 제 4차 서버 이전이 시작되며, 나이트 크로우의","정식 서비스 30","을 기념하는 다양한 이벤트들이 진행됩니다."]},{"date_key":"2024-02-22","date_display":"2024.02.22","title":"2월 22일(목) 패치노트(2/22 15:10 수정)","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/231606","note":"에픽 던전; 매주 토요일 22시에 기원의 신역에서 암운의 신전으로 입장할 수 있는 신역의 균열이 나타납니다.; 신역의 균열 주변은 탈것과 글라이더 탑승이 제한됩니다.; 21시 50분부터 신역의 균열 주변에서 전조 현상이 발생합니다.; 22시 정각이 되면 신역의 균열이 나타나며, 조작을 통해 암운의 신전 내 4개의 제단 중 하나를 선택하여 입장할 수 있습니다.; 신전 내 4개의 제단을 통해 신역의 균열로 퇴장할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2월 22일(목) 업데이트 이후 적용 사항에 대해 안내드립니다.","이번 업데이트에서는 많은 단원님께서 기다리고 계셨을","에픽 던전 보스 몬스터 추가","와 함께 글라이더의 한계를 돌파하여 더욱 강력하게 성장시킬 수 있는"]},{"date_key":"2024-02-29","date_display":"2024.02.29","title":"2월 29일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/233145","note":"월드 던전 진행 일정이 주 3회에서 2회로 변경됩니다.; 월드 던전 입장 조건이 서버 레벨 순위에서 성장도 순위로 변경됩니다.; 몬스터 처치 시 획득하는 용맹 주화 및 경험치가 상향 조정됩니다; 용맹 주화의 PVE 일일 획득량이 200,000에서 300,000으로 상향됩니다.; 용맹 주화 상인이 판매하는 기간제 수집 재료 아이템이 변경됩니다.; 상층 칸델리움 대사막에 출현하는 네임드 몬스터 및 보스 몬스터의 아이템 드랍률이 상향 조정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2월 29일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","월드 던전 진행 일정이 주 3회에서 2회로 변경되었습니다. 일정이 간소화되었으나 용맹 주화 획득량에는 변동이 없도록 몬스터 처치 시 용맹 주화 획득량 및 PVE 일일 획득량은 상향 조정되었습니다.","또한, 전투의 긴장감 고조와 함께 더욱 전략적인 전투를 경험하실 수 있도록 에픽 던전의 일부 변경 사항이 적용되었으며, 일부 영웅 등급 장비의 능력치가 상향 조정되었습니다.","더불어, 단원 여러분께서 보다 원활하게 게임을 진행하실 수 있도록 보스 토벌 및 이벤트 보스의 등장 시간이 변경되었습니다."]},{"date_key":"2024-03-07","date_display":"2024.03.07","title":"3월 7일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/234733","note":"에픽 던전 시즌2가 시작됩니다.; 에픽 던전 입장 조건이 성장도 265,000 이상 → 285,000 이상으로 변경됩니다.; 에픽 던전에 출현하는 일반 몬스터의 생명력이 증가하고, 능력치가 상향 조정됩니다.; 몬스터 처치 시 획득하는 경험치 및 무기 숙련도가 상향 조정됩니다.; 정예 몬스터 성소 수호단장 출현 지역이 추가됩니다.; 네임드 몬스터 로키우스의 생명력이 증가하고, 능력치가 상향 조정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 7일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트 점검 이후로 에픽 던전 시즌2가 시작됩니다. 새롭게 시작될 시즌2에서는 입장 조건이 상향되며, 이에 따라 해당 지역에 출현하는 몬스터들에 대한 변경 사항이 다수 적용됩니다.","또한, 월드 던전 내 출현하는 네임드 몬스터들이 동시에 등장하도록 변경되며, 마을 및 에픽 던전에 생명력과 정신력을 회복할 수 있는 치유사 NPC가 새롭게 추가됩니다.","더불어 ‘부트캠프’ 서버 그룹 한정 클래스 체인지 기능을 이용하실 수 있게되며, 상점에서 구매 가능한 ‘신병 경험치 비약’ 아이템의 레벨 별 사용효과가 개선 및 추가됩니다."]},{"date_key":"2024-03-14","date_display":"2024.03.14","title":"3월 14일(목) 패치노트 (3/15 18:55 수정)","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/239377","note":"서버 이전은 상점 – 서버 이전에서 이용할 수 있습니다.; 서버 이전은 서버의 혼잡 방지와 서버 간의 인원 균형을 위하여 제한된 인원 내에서 이전이 가능하며, 3월 14일(목) 12; 1; 2차 인원 확장; 3차 인원 확장; Lv.50 이상 캐릭터 보유","summary_items":["원문 전문","자유를 향한 검은 날개","3월 14일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","제 5차 서버 이전 시작과 함께 서버 이전으로 인해 길드 기여도가 초기화되는 단원분들을 위해 이벤트 기간 동안 길드 활동에 대한 길드 기여도 획득량이 대폭 상향됩니다.","또한, 에픽 던전 내 치열한 전투가 더 활성화될 수 있도록 암운의 신전에 네임드 등급 몬스터 2종이 추가되며, 암운의 신전 개방 시간이 30분 연장됩니다.","아울러, 3월 17일(일) 12:00부터 시작되는 월드 던전 17시즌부터 부트캠프 서버 그룹이 매칭 서버에 합류하게 됩니다."]},{"date_key":"2024-03-21","date_display":"2024.03.21","title":"3월 21일(목) 패치노트 (3/21 11:20 수정)","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/248574","note":"월드 격전지 신규 지역 오베르 화산지대가 추가됩니다.; 입장 조건; 기존 격전지 및 월드 격전지와 동일하게 격전지 비행사를 통해 입장할 수 있습니다.; 사냥터는 Lv.90 ~ Lv.115 난이도로 구성되어 있습니다.; 오베르 화산지대에는 보스 몬스터; 황금 흉갑 휘장","summary_items":["원문 전문","자유를 향한 검은 날개","3월 21일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트 점검 이후로 월드 콘텐츠 시즌 3가 시작되며, 월드 격전지 내 신규 지역 추가 및 기존/월드 격전지가 리뉴얼 됩니다.","더불어 사전 안내를 통해 안내드렸던 것과 같이 7일간 이용하실 수 있는 ‘클래스 체인지’가 다시금 열리게 되며, 탈것 및 무기 외형 초월 시스템이 새롭게 추가됩니다.","또한, 일부 상급 기술의 특성이 추가 및 변경되며, 신규 의상 1종이 추가됩니다."]},{"date_key":"2024-03-28","date_display":"2024.03.28","title":"3월 28일(목) 패치노트","type":"update","year":2024,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/264645","note":"보유한 전공 휘장은 3월 28일(목) 23; 보유한 용맹 주화는 3월 29일(금) 12; 용맹 주화 시즌 진행 일정; 전공 휘장 시즌 진행 일정; 월드 던전 및 격전지의 신규 시즌이 시작됨에 따라 기간제 수집 아이템이 변경됩니다.; 산코나 유적 7발굴터(Lv.75)와 8발굴터(Lv.80)가 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 28일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","산코나 유적의 신규 발굴터가 추가되며, 신규 발굴터에서만 획득할 수 있는 산코나 유적 수집 아이템과 전용 수집이 추가됩니다.","더불어 잠재력 2페이지가 추가되며, 혼돈의 킬데바트 감시탑 지역 부근에 넘어갈 수 없는 지형을 제거하여 비행을 통한 사냥터 이동이 원활하도록 개선하였습니다.","이외에도 원활한 게임 환경을 제공해 드리기 위한 기타 오류 수정 작업이 진행되었습니다."]},{"date_key":"2024-04-04","date_display":"2024.04.04","title":"4월 4일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/276313","note":"진행 일정; 시험의 탑 11층 이상의 난이도가 상향 조정됩니다.; 50층 이상 격퇴전 및 입증전 최초 공략 성공 시 기존 대비 더 많은 개척자 징표를 획득할 수 있습니다.; 시험의 탑 증표 전용 수집 10종이 추가됩니다.; 시즌 2 전용 수집 효과 적용 기간; 보스 몬스터 베나쉬의 생명력이 20% 하향 조정됩니다","summary_items":["원문 전문","자유를 향한 검은 날개","4월 4일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트 이후 5월 16일(목)까지 시험의 탑 시즌2가 시작됩니다.","＊ 지난 시즌 1에 진행했던","최초 공략 및 반복 공략의 정보는 모두 초기화"]},{"date_key":"2024-04-11","date_display":"2024.04.11","title":"4월 11일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/288203","note":"오베르 화산 지대에 신규 사냥터가 추가됩니다.; 최상급 영웅 등급 견장 및 팔찌가 추가됩니다.; 제작을 통해 획득할 수 있으며 최상급 견장 및 팔찌 전용 제작 재료가 추가됩니다.; 선택한 제작술과 무관하게 일반 제작에서 제작할 수 있습니다.; 잊혀진 심판자의 잔재; 잊혀진 지배자의 잔재","summary_items":["원문 전문","자유를 향한 검은 날개","이번 업데이트에서는 오베르 화산 지대에 신규 사냥터가 추가되며, 다양한 혜택이 주어지는 부트캠프 2기가 시작됩니다.","또한, 파티 던전 수집 25종과 영웅 등급 장신구가 추가되며, 킬데바트의 포화도 완화를 위해 채널이 3개로 증설됩니다.","이외에도 80레벨 이상 달성 업적 및 수집이 추가되며, 개척자 증표 상인 판매 물품 구매 제한이 초기화됩니다.","업데이트 상세 내용은 하단의 내용을 확인하여 주시기 바랍니다."]},{"date_key":"2024-04-18","date_display":"2024.04.18","title":"4월 18일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/299488","note":"탈것 및 무기 외형 합성 시 좌측 하단 실패 횟수를 클릭하면 해당 등급의 마지막 합성 실패 이력을 확인할 수 있습니다; 실패 횟수를 모두 채워 획득하는 확정 보상과는 무관하게 마지막으로 합성에 실패한 날짜가 표시됩니다.; 출석; 미션 달성; 미션 달성; 할인","summary_items":["원문 전문","자유를 향한 검은 날개","이번 점검에서는 탈것 및 무기 외형의 합성 실패 이력을 확인할 수 있는 기능이 추가됩니다.","아울러 차주 4월 25일(목) 업데이트에서는 나이트 크로우 서비스 1주년을 맞이하여 신규 클래스 레이피어, 대전쟁 크루세이드 등 풍성하고 다양한 업데이트가 제공될 예정이오니 단원님들의 많은 관심을 부탁드립니다.","＊ 부트캠프 수료식 보상은 순차적으로 지급됩니다.","업데이트 상세 내용은 하단의 내용을 확인하여 주시기 바랍니다."]},{"date_key":"2024-04-24","date_display":"2024.04.24","title":"4월 25일(목) 1주년 기념 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/310523","note":"전 서버 연합이 참전하는 대규모 정복 전쟁, 크루세이드 콘텐츠가 업데이트됩니다.; 크루세이드는 규모에 따라 다수의 소형, 중형 영지와 단 하나의 대형 영지로 구성되어 있습니다.; 크루세이드의 경기 진행 방식을 포함한 자세한 내용은 아래 링크에서 확인하실 수 있습니다.; 크루세이드는 시즌 단위로 진행되며, 각 단계별 진행 일정은 다음과 같습니다.; 2024년 04월 26일 00; 크루세이드가 시작하고 최초의 영지 정복전은 전초 기지에서만 가능합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","지난 1년 동안 단원 여러분께서 나이트 크로우에 보내주신 사랑과 열정 덕분에 지금의 나이트 크로우가 있었습니다.","이번 1주년 업데이트는 전 서버 연합이 참전하는 대규모 정복 전쟁,","‘크루세이드’","콘텐츠가 추가됩니다. 이에 따라 에픽 던전 보스 몬스터 출현 시간 및 월드 던전 진행 일정이 조정되오니 이용에 참고해주시기 바랍니다. 또한, 상태 이상을 활용한 전투에 특화된"]},{"date_key":"2024-05-02","date_display":"2024.05.02","title":"5월 2일(목) 패치노트 (5/2 10:50 추가)","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/320266","note":"월드 던전 신규 사냥터 추가; 월드 던전에 신규 사냥터가 추가됩니다.; 신규 사냥터가 추가됨에 따라 기존 사냥터의 위치가 조정됩니다.; Lv.88 사냥터는; Lv.90 사냥터는; Lv.92 사냥터는","summary_items":["원문 전문","자유를 향한 검은 날개","이번 점검에서는 월드 던전의 신규 사냥터가 추가됩니다. 이에 따라 기존 사냥터의 위치가 조정되며 칸델리움 상/하층에 등장하는 네임드, 보스 몬스터에 대한 조정이 동시에 진행됩니다.","길드 던전(코드쉬, 티아라카) 최상급 난이도가 추가됩니다. 최상급 길드에서는 개인 보상과 길드 전리품을 추가로 획득할 수 있습니다.","덧붙여 신규 단원님들께서 좀 더 원활하게 부트캠프 서버를 이용하실 수 있도록 부트캠프 3기가 시작되며, 단원님들의 원활한 소통을 위한 신규 이모티콘 10종 추가 및 신규 장비 수집 추가, ‘레이피어’ 클래스의 기술 밸런스 조정이 진행될 예정입니다.","제6차 서버 이전부터는 ‘연합 이전’ 기능이 추가됩니다. 로마 교황령을 향해 영지 확장을 꿈꾸는 연합장님께서는 반드시 숙지해주시기 바랍니다."]},{"date_key":"2024-05-09","date_display":"2024.05.09","title":"5월 9일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/328857","note":"마력 주입 3페이지 단계 추가; 마력 주입 3페이지의 3단계, 4단계, 5단계가 추가됩니다.; 마력 서리 결정 Ⅱ 은 제작을 통해 획득할 수 있습니다.; 나이트 크로우 7일 출석; 7일간 마력 서리 결정; 미션 달성 이벤트 2종이 시작됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","이번 업데이트에서는 마력 주입 3페이지의 3, 4, 5단계와 해당 단계의 주입 재료인 마력 서리 결정 Ⅱ가 추가됩니다.","또한 업데이트 이후 이벤트 제작 롱기누스, 파라 벨룸이 종료되므로 제작을 계획하셨던 단원 여러분께서는 참고 부탁드립니다.","업데이트 상세 내용은 하단의 내용을 확인해 주시기 바랍니다.","5월 9일(목) 패치노트"]},{"date_key":"2024-05-16","date_display":"2024.05.16","title":"5월 16일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/336149","note":"월드 격전지 특수 사냥터 추가; 혼돈의 킬데바트에 Lv.88 신규 특수 사냥터 반기의 봉우리가 추가됩니다.; 반기의 봉우리에서 신규 네임드 몬스터 및 선공 정예 몬스터가 등장합니다.; 네임드 몬스터 듀카스; 정예 몬스터 반기의 난폭자; 오베르 화산지대에 Lv.96 신규 특수 사냥터 맹화의 오름길이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","5월 16일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","혼돈의 킬데바트와 오베르 화산지대에 신규 사냥터와 신규 네임드 몬스터 및 선공 정예 몬스터가 추가됩니다.","또한, 기존 영웅 등급 장비를 더욱 강력하게 만들 수 있도록 각성 장비가 추가됩니다. 각성에는 고유 재료가 필요하며, 일부 정예 몬스터를 처치하면 드랍되는 궤짝 아이템에서 획득하실 수 있습니다.","더불어 많은 단원님들께서 의견을 보내주셨던 크루세이드 교황령 정복전의 밸런스가 조정됩니다."]},{"date_key":"2024-05-23","date_display":"2024.05.23","title":"5월 23일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/344121","note":"용맹 주화 및 전공 휘장 신규 시즌 시작; 용맹 주화 시즌 진행 일정; 전공 휘장 시즌 진행 일정; 마사르타 기암 성역 5지역 보스 몬스터 추가; 마사르타 기암 성역 5지역에 신규 보스 몬스터 `멜빌이 등장합니다.; 주요 획득 보상은 다음과 같습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","5월 23일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","마사르타 기암 성역 5지역에 신규 보스 몬스터 ‘멜빌’이 추가되며, 잠재력 3페이지가 추가됩니다.","더불어 일부 전설 등급 장비의 능력치가 상향 조정되며, 많은 단원님께서 말씀해 주셨던 시험의 탑 30층과 80층에 등장하는 보스 몬스터 ‘바르돈’의 능력치가 하향 조정됩니다.","용맹 주화 및 전공 휘장 시즌이 종료되면 보유 중인 용맹 주화, 전공 휘장이 초기화되므로"]},{"date_key":"2024-05-30","date_display":"2024.05.30","title":"5월 30일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/351494","note":"서버그룹 총력전; 월드 콘텐츠 시즌 4 진행 이전에 앞서 서버 그룹 총력전이 진행됩니다.; 서버 그룹 총력전은 월드 콘텐츠의 신규 매칭에 따라 서버 그룹간 경쟁 방식으로 진행되며, 시즌 종료 이후 최종 결과에 따라서 서버 그룹의 존속과; 서버 그룹 총력전 기간 내 여러 콘텐츠에서 획득할 수 있는 총력전 공헌 상자 아이템의 획득 수량을 집계하여 서버 그룹 내 순위가 결정됩니다.; 총력전 종료(2024년 6월 4일(화) 00시) 이후에 획득하는 총력전 공헌 상자 아이템은 집계에 포함되지 않습니다.; 총력전 공헌 상자 아이템은 월드 콘텐츠의 보스 및 네임드 몬스터 처치 또는 총력전 상인 에스텔라를 통해 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","5월 30일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트에서는 6월 4일(화) 0시까지 진행되는 [서버 그룹 총력전]이 진행되며, 신규 콘텐츠인 ‘마력 주조’ 콘텐츠와 신규 아티팩트 ‘수호부’ 아이템이 추가됩니다.","또한, 단원님들의 캐릭터 성장에 도움을 드리고자 파티 던전의 리뉴얼과 길드 레벨 확장 및 붉은 늑대 일지 추가, 초월 콘텐츠 보유 효과 추가 및 영웅 등급 글라이더의 성장 재료 추가 등을 준비하였습니다.","더불어 많은 단원님들께서 요청해주셨던 ‘해방의 결정’ 아이템의 제작식이 추가되었으며, 부트캠프 서버에 월드 던전이 오픈될 예정입니다."]},{"date_key":"2024-06-05","date_display":"2024.06.05","title":"6월 5일(수) 패치노트(6/5 11:14 수정)","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/355665","note":"서버 통합; 월드 콘텐츠; 월드 격전지 및 월드 특수 던전; 서버그룹 총력전 결과에 따라 새롭게 매칭된 서버그룹으로 월드 격전지 및 월드 특수 던전의 시즌4가 시작됩니다.; 월드 던전; 서버 통합으로 인해 6월 5일(수) 월드 던전 경기는 진행되지 않습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","6월 5일(수) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","서버그룹 총력전의 결과에 따라 3위를 기록한 서버그룹은 2위 서버그룹에 통합되며, 새롭게 통합된 서버그룹을 기준으로 월드 콘텐츠 시즌4가 시작됩니다.","더불어, 안전 강화를 보장하는 새로운 아이템 ‘보호의 밤까마귀 강화 주문서(귀속)’가 추가됩니다.","또한, 많은 단원 여러분께서 의견을 보내주셨던 신규 파티 던전의 보스 몬스터 밸런스 조정이 진행되며, 일부 지형이 변경되었습니다."]},{"date_key":"2024-06-13","date_display":"2024.06.13","title":"6월 13일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/362740","note":"에픽 던전 하르페논 성소 상층 추가; 에픽 던전; 염원의 신역에는 일반 몬스터와 선공 정예 몬스터인 성소 오크단장이 등장하며, 몬스터 처치 시 더 높은 경험치와 무기 숙련도를 획득할 수 있습니다; 선공 정예 몬스터 성소 오크단장 처치 시 오크단장의 궤짝 아이템이 확정적으로 드랍됩니다.; 전설 등급 방어구 제작 재료; 황금 투구 휘장","summary_items":["원문 전문","자유를 향한 검은 날개","6월 13일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트에서는 에픽 던전 상층(하르페논 성소: 염원의 신역)과 신규 전설 등급 방어구(투구) 6종 추가, 클래스 체인지 기능이 활성화됩니다.","또한, 길드에 속해있는 단원님들의 성장에 도움이 되는 길드 특성 능력치 III 페이지가 추가되며, 클래스 별 상급 기술 특성 추가로 더욱 강력한 캐릭터로 발돋움 할 수 있게 됩니다.","활과 단검 클래스의 일부 기술에 대한 변경 사항과 더불어 클래스 체인지 이후 반환되는 일부 귀속 기술서를 분해 및 다른 클래스의 기술서로 교환할 수 있는 제작식이 추가됩니다."]},{"date_key":"2024-06-20","date_display":"2024.06.20","title":"6월 20일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/368511","note":"월드 격전지 리뉴얼; 혼돈의 킬데바트 일부 지역에 정예 몬스터 몰락배회 폭군이 등장합니다.; 오베르 화산 지대 일부 지역에 정예 몬스터 화산분화 폭군이 등장합니다.; 몰락배회 폭군과 화산분화 폭군 처치 시 폭군의 궤짝 아이템을 확정적으로 획득합니다.; 영웅 등급 무기 및 보조 무기 핵심 제작 재료; 영웅 등급 장비","summary_items":["원문 전문","자유를 향한 검은 날개","6월 20일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","월드 격전지가 리뉴얼됩니다. 이제 혼돈의 킬데바트, 오베르 화산지대의 일부 지역에서 정예 몬스터가 등장하며, 처치 시 확정적으로 ‘폭군의 궤짝’ 아이템을 획득할 수 있습니다.","월드 던전 하층의 일부 지역에서도 잊혀진 잔재 아이템을 획득할 수 있도록 변경됩니다.","경쟁 환경의 변화를 주고자 서버 이전이 시작되며, 1주년 기념 이벤트 보상으로 제공된, 기간제 아이템인 롱기누스 장비의 사용 기한을 2주일 더 연장하였습니다."]},{"date_key":"2024-06-27","date_display":"2024.06.27","title":"6월 27일(목) 패치노트","type":"update","year":2024,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/376681","note":"파티 던전 시즌2 시작; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다.; 파티 던전 시즌 2에는 수하를 소환하는 보스 몬스터 로커딜이 등장합니다.; 로커딜의 수하가 살아있는 동안 로커딜은 피해를 입지 않습니다.; 시즌2 기간 동안 획득하는 토벌자 표식은 제작을 통해 다양한 보상으로 교환할 수 있습니다.; 영웅 등급 방어구를 획득할 수 있는 봉인된 영웅 투구/상의 선택 상자 아이템이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","6월 27일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","업데이트 점검 이후 오후 12시부터 다양한 혜택과 이벤트가 제공되는 특별한 서버, '부트캠프 4기'가 시작됩니다. 입소를 희망하는 단원님께서는 많은 관심과 참여 부탁드립니다.","기존 부트캠프 2기와 3기를 이용하셨던 55레벨 이상의 캐릭터를 보유하신 단원님께는 7월 3일(수) 23시까지 무료로 계정, 길드 이전의 기회가 제공됩니다.","파티 던전 시즌2가 새로운 보스 몬스터 ‘로커딜’과 함께 새롭게 시작하게 되며, 시즌 내 획득하는 ‘토벌자 표식’을 모아 영웅 등급 방어구 선택 상자를 구매할 수 있도록 개편됩니다."]},{"date_key":"2024-07-04","date_display":"2024.07.04","title":"7월 4일(목) 패치노트(7/4 10:33 수정)","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/384589","note":"마력 주입 3페이지 단계 추가; 마력 주입 3페이지의 6단계, 7단계, 8단계가 추가됩니다.; 마력 서리 결정 Ⅲ 은 일반 제작 > 마력 주입 > 마력 서리 결정 탭에서 제작할 수 있습니다.; 아티팩트 수집 추가; 아티팩트 수집 40종이 추가됩니다.; 강화된 향로, 나침반, 주사위를 등록하여 완성할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","7월 4일(목) 업데이트 이후 새롭게 적용되는 사항들에 대해 안내드립니다.","마력 주입 3페이지의 6~8단계가 추가되며, 해당 단계에 사용되는 새로운 마력 주입 재료 ‘마력 서리 결정 III’이 추가됩니다.","또한, 강화된 아티팩트를 재료로 등록하는 새로운 수집 40종이 추가되어 단원 여러분께 새로운 성장의 기회가 제공됩니다.","단원 여러분의 전직에 대한 부담 완화를 위해 이를레타 신전 5전당의 상급 전직의 증표 드랍률을 상향 조정하였습니다."]},{"date_key":"2024-07-11","date_display":"2024.07.11","title":"7월 11일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/389551","note":"신규 필드 카르데일 추가; 신 트리에스테 공국에 다섯 번째 필드 카르데일이 추가됩니다.; 신규 필드 카르데일은 11개의 사냥터로 구성되어 있습니다.; 카르데일의 사냥터에서는 다양한 신규 아이템을 획득할 수 있습니다.; 카르데일 필드 전용 수집 아이템을 획득할 수 있습니다.; 신규 장비 내갑 제작에 필요한 제작 재료를 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","7월 11일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트에서는 다섯 번째 필드 ‘카르데일’이 추가됩니다. 카르데일에서 확장된 메인 퀘스트로 더 즐거운 모험 즐겨보시기 바랍니다.","신규 방어구 ‘내갑’이 추가되며, 장비 축복 부여 기능이 추가됩니다. ‘내갑’ 장비를 만드는데 쓰이는 ‘면사’ 아이템과 장비 축복에 사용되는 ‘축복석’ 역시 신규 필드 카르데일에서 획득하실 수 있습니다.","여름맞이 신규 이벤트 의상과 무기 외형이 추가됩니다. 더욱 자세한 내용은 7월 11일(목) 19시 45분부터 진행되는 이벤트 홈쇼핑 LIVE 방송을 기대해주시기 바랍니다."]},{"date_key":"2024-07-18","date_display":"2024.07.18","title":"7월 18일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/393738","note":"전공 휘장; 용맹 주화; 특수 던전 상위 지역 추가; 마사르타 얼음 동굴과 마사르타 기암 성역이 확장됩니다.; 신규 추가된 지역 내 몬스터 처치 시 더 높은 경험치와 무기 숙련도를 획득할 수 있습니다.; 엘로메트의 저주를 상쇄하는 엘로메트 저주 저항은 아티팩트(보옥, 향로, 나침반) 강화 시 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","7월 18일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","마사르타 얼음 동굴 11공동과 마사르타 기암 성역 9지역이 추가되며, 월드 던전 상층의 Lv.96, Lv.100 지역 추가 및 상, 하층의 일부 사냥터 난이도가 조정됩니다.","더불어 장비 축복과 일부 메인 퀘스트, 일부 선택 상자에 변경점이 적용되었습니다.","용맹 주화 및 전공 휘장 신규 시즌이 시작됨에 따라, 용맹 주화, 전공 휘장이 초기화될 예정입니다. 사용 기한을 확인해 주시길 바라며, 초기화 이전에 모두 사용해 주시길 바랍니다."]},{"date_key":"2024-07-25","date_display":"2024.07.25","title":"7월 25일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/398974","note":"파티 던전 시즌3; 파티 던전 신규 시즌이 시작됩니다.; 진행 일정; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다.; 파티 던전 시즌 3에는 보스 몬스터 크라부스가 등장합니다.; 크라부스는 체력이 낮아질수록 더욱 빠르고 강력해집니다.","summary_items":["원문 전문","자유를 향한 검은 날개","7월 25일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","파티 던전 시즌3이 시작되며, 새로운 보스 ‘크라부스’가 등장합니다. 크라부스는 전투가 지속될수록 광폭화하여 더욱 강력해지며, 각종 상태 이상과 약화 효과를 부여하는 기술을 사용하여 긴장감 넘치는 전투 경험을 선사합니다.","파티 던전 시즌2에서 획득했던 토벌자 표식은 모두 초기화될 예정이오니, 업데이트 전 제작을 통해 모두 사용해 주시기 바랍니다.","다음으로, 지난 4월 27일(토)부터 진행되었던 크루세이드 시즌1이 7월 27일(토) 경기를 끝으로 종료됩니다. 크루세이드 시즌2 관련 내용은 추후 공지를 통해 안내드리겠습니다."]},{"date_key":"2024-08-01","date_display":"2024.08.01","title":"8월 1일(목) 패치노트 (7/31 20:06 수정)","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/402523","note":"무료 클래스 체인지; 부트캠프4 서버를 포함한 전체 서버에 일주일 간 무료 클래스 체인지 기회가 제공됩니다.; 진행 일정; 클래스 체인지는 상점 > 패키지 > 클래스 체인지 항목에서 100골드로 구매하실 수 있습니다.; 무료로 진행되는 클래스 체인지에 대한 상세 내용은 다음 공지를 참고해주시기 바랍니다.; 신규 탈것 5종이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","8월 1일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","이번 업데이트에서는 부트캠프 4기를 포함, 모든 단원님들께 서버당 2회 무료 클래스 체인지 기회를 드립니다.","금번 업데이트를 통해 일부 클래스에 대한 기술 밸런스 케어가 진행되어 더욱 균형잡힌 플레이 환경이 조성될 것입니다. 단원님들께서는 무료 클래스 체인지 기회를 적극 활용해서 자신에게 맞는 클래스를 선택하고, 더욱 흥미로운 게임 플레이를 경험해 보시기 바랍니다.","또한, 신규 신화 탈것 ‘베르나르도의 타라스크’를 포함한 신규 탈것 5종이 추가되며, 기본 능력치 밸런스 조정 및 파티 던전 보스 몬스터 ‘크라부스’의 공격 패턴 및 밸런스가 조정됩니다."]},{"date_key":"2024-08-08","date_display":"2024.08.08","title":"8월 8일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/406057","note":"시험의 탑 시즌 5; 시험의 탑의 시즌4가 종료되고 시즌5가 시작됩니다.; 진행 일정; 시즌 4에 진행했던 최초 공략 및 반복 공략의 정보, 시험의 탑 증표 전용 수집, 개척자 징표가 모두 초기화 됩니다.; 시즌 4에 등록한 시험의 탑 증표 전용 수집 효과는 2024년 8월 8일(목) 08; 개척자 징표 상인 판매 아이템 변경","summary_items":["원문 전문","자유를 향한 검은 날개","8월 8일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","시험의 탑의 새로운 시즌이 시작됩니다. 시즌 5는 지난 시즌과 동일한 난이도로 진행되며, 개척자 징표 상인의 일부 판매 목록이 변경되었습니다.","업데이트 이후에는 시험의 탑 전용 수집이 종료되며, 시즌 4에서 획득한 개척자 징표가 모두 초기화되므로 초기화 전 반드시 사용해 주시길 바랍니다.","아울러, 이번 업데이트 이후 종료될 예정이었던 클래스 체인지 기간이 일주일 연장되며, 이용 가능 횟수도 1회 더 제공됩니다."]},{"date_key":"2024-08-14","date_display":"2024.08.14","title":"8월 14일(수) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/408524","note":"신규 에픽 던전 테네리스 해협 추가; 신원을 식별할 수 없는 익명 던전 테네리스 해협이 추가됩니다.; 테네리스 해협은 하층, 중층, 상층 총 3개의 지역으로 구분되며, 각 지역은 정해진 성장도 범위 내 대상자만 입장할 수 있습니다.; 테네리스 해협 전지역에는 정해진 위치에 정예 몬스터와 네임드 몬스터가 출현합니다.; 자만의 해역; 기만의 해역","summary_items":["원문 전문","자유를 향한 검은 날개","8월 14일(수) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","신원을 식별할 수 없는 익명 에픽 던전 ‘테네리스 해협’이 추가됩니다. 테네리스 해협은 하층, 중층, 상층으로 구분되어 있으며, 각 지역은 정해진 성장도 범위 내 대상자만 입장할 수 있습니다.","기존 에픽 던전 ‘하르페논 성소’의 입장 성장도 조건이 조정되며, 네임드 몬스터 ‘로키우스’의 출현 시간이 매일 23시로 고정됩니다.","클래스 별 전설 및 영웅 등급 신규 기술이 추가됩니다. 영웅 기술서는 신규 에픽 던전인 ‘테네리스 해협’에서 획득 가능하며, 전설 기술서는 제작을 통해 획득할 수 있습니다."]},{"date_key":"2024-08-22","date_display":"2024.08.22","title":"8월 22일(목) 패치노트 (8/22 11:28 수정)","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/408531","note":"파티 던전 시즌4; 파티 던전 신규 시즌이 시작됩니다.; 진행 일정; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다.; 파티 던전 시즌 4에는 더욱 강력해진 보스 몬스터 엘몬드가 등장합니다.; 엘몬드는 체력이 일정 수준 이하가되면 선혈의 마검을 소환하며 강력한 공격을 준비합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","8월 22일(목) 업데이트 이후 적용되는 사항들에 대해 안내드립니다.","파티 던전 시즌 4가 시작되며 더욱 강력해진 보스 몬스터 '엘몬드'와 마주하게 됩니다.","시즌 3에서 획득했던 토벌자 표식은 8월 22일(목) 08:00에 모두 초기화되므로 꼭 사용해 주시길 바랍니다.","테네리스 해협의 입장이 원활하도록 입장 가능 인원이 확장되며, 테네리스 해협 내에서 경계 길드 식별이 가능하던 현상이 수정됩니다."]},{"date_key":"2024-08-29","date_display":"2024.08.29","title":"8월 29일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/414185","note":"월드 콘텐츠 시즌5; 월드 격전지와 월드 특수 던전(마사르타 기암 성역)의 다섯번째 시즌이 시작됩니다.; 기간; 마사르타 얼음 동굴 리뉴얼; 마사르타 얼음 동굴 규칙 일부가 조정됩니다.; 기존","summary_items":["원문 전문","자유를 향한 검은 날개","8월 29일(목) 업데이트 점검을 통해서 적용되는 사항을 안내하여 드립니다.","자유를 향한 모험을 즐기시던 월드 콘텐츠가 새롭게 개선되어 5번째 시즌이 되었습니다.","이번 시즌5 에서는 월드 격전지와 월드 특수 던전인 마사르타 얼음 동굴과 마사르타 기암 성역의 개선을 준비하였습니다.","또한, 길드 지령 개편과 파티 던전의 일부 규칙이 변경될 예정입니다."]},{"date_key":"2024-09-05","date_display":"2024.09.05","title":"9월 5일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/416892","note":"이벤트 에픽 던전2 보물 상자 추가; 진행 기간; 이벤트 기간에 테네리스 해협 전역에 보물 상자 잊혀진 해적의 보물함이 등장합니다.; 보물 상자는 출현 시 메시지와 함께 무작위 위치에 일정 시간 잠겨진 상태로 출현하며 지도에서 위치를 확인할 수 있습니다.; 상자의 일정 범위 내에서는 줍기 버튼이 조작 버튼으로 변경되며, 조작을 통해 보상을 획득할 수 있습니다.; 조작 중 이동하거나 기술을 사용할 경우 취소되며, 다른 대상에게 피격당했을 때도 취소됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","9월 5일(목) 업데이트 점검 이후 적용되는 사항들을 안내드립니다.","이벤트 기간 동안 테네리스 해협 전역에 보물 상자 ‘잊혀진 해적의 보물함’이 등장합니다. 잊혀진 해적의 보물함은 조작에 성공 시, 보상이 가방으로 바로 지급되지 않고 바닥으로 드랍됩니다.","원소 각인 및 현자의 돌 연결 효과를 통해 획득하는 속성별 마력 효과 능력치가 상향 조정됩니다.","나이트 크로우의 론칭 500일을 기념하여 다양한 이벤트가 진행되며, 미션 달성 이벤트를 통해 클레멘스의 플래티넘 쿠폰 3종을 획득할 수 있습니다."]},{"date_key":"2024-09-12","date_display":"2024.09.12","title":"9월 12일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/439752","note":"전공 휘장; 용맹 주화; 무기 숙련 최대 레벨 변경; 무기 숙련 추가 효과는 100Lv 이상부터 3Lv마다 해금됩니다.; 기술 특성 포인트는 기존과 동일하게 1Lv 당 2포인트씩 지급됩니다.; 무기 숙련 달성 가능 최대 레벨이 100Lv → 130Lv로 상향 조정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","9월 12일(목) 업데이트 점검에서는 무기 숙련 달성 가능 최대 레벨이 상향 조정되어 레벨에 따른 업적이 추가되며, 신규 길드 망토 특성 추가와 길드 망토 효과 강화 최대 레벨이 상향 조정됩니다.","그리고 한가위를 기념하여 이벤트 탈것인 ‘둥실 달토끼’와 함께 추석 맞이 이벤트와 500일 기념 이벤트가 진행되며, 부트캠프 4기 서버 이전이 9월 25일(수)까지 진행될 예정입니다.","용맹 주화 및 전공 휘장 신규 시즌이 시작됨에 따라, 용맹 주화, 전공 휘장이 초기화될 예정입니다. 사용 기한을 확인해 주시길 바라며, 초기화 이전에 모두 사용해 주시길 바랍니다.","전공 휘장: 9월 12일(목) 23:59까지"]},{"date_key":"2024-09-26","date_display":"2024.09.26","title":"9월 26일(목) 패치노트","type":"update","year":2024,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/445788","note":"길드 전장; 길드 단위의 대결을 펼치는 신규 경쟁 콘텐츠 길드 전장이 추가됩니다.; 길드 전장은 매주 한번 진행되며, 9월 26일(목) 업데이트 이후 ~ 10월 31일(목) 업데이트 전까지 프리 시즌으로 진행됩니다.; 길드원 상위 10명의 성장도를 기준으로 길드의 그룹이 결정되며, 그룹은 총 7개로 분류됩니다.; 그룹은 매주 월요일 00; 대결은 일대일로 진행되며, 동일한 그룹 내에 소속된 길드 중 무작위 매칭을 통해 상대 길드가 선정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","9월 26일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","길드의 명예를 걸고 싸우는 신규 경쟁 콘텐츠 ‘길드 전장’이 추가됩니다. 또한, 신규 장신구 ‘머리 장식’을 길드 전장을 통해 획득할 수 있으며, 새로운 신화, 전설, 영웅 등급 글라이더가 추가되어 더 다양한 전투 전략을 펼칠 수 있게 되었습니다. 시험의 탑 시즌 6과 파티 던전 시즌 5에서도 새로운 도전이 기다리고 있습니다.","시험의 탑 시즌 5에서 획득했던 개척자 징표와 파티 던전 시즌 4에서 획득했던 토벌자 표식은 업데이트 이후 모두 사라지므로 반드시 업데이트 전에 사용해 주시길 바랍니다.","다양한 편의성 개선과 함께 더욱 풍성해진 업데이트를 지금 바로 확인해 보세요."]},{"date_key":"2024-10-10","date_display":"2024.10.10","title":"10월 10일(목) 패치노트 (10:56 수정)","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/451779","note":"특수 던전 리뉴얼; 마사르타 얼음 동굴과 마사르타 기암 성역의 일부 사냥터가 통합되고, 신규 사냥터가 추가됩니다.; 마사르타 얼음 동굴과 마사르타 기암 성역의 최고 난이도 공동을 제외한 대부분의 공동이 혼합된 형태로 구성되어 있습니다.; 희미해진 입장권을 분해하면 특수 던전 입장에 사용할 수 있는 신규 입장권을 얻을 수 있습니다.; 기존 입장권(귀속)에서 변경된 희미해진 입장권은 분해 시 신규 입장권(귀속)을 획득합니다.; 기존 입장권(거래 가능)에서 변경된 희미해진 입장권은 분해 시 신규 입장권(거래 가능)을 획득합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","10월 10일(목) 업데이트 점검으로 적용되는 사항을 안내드립니다.","성장을 위한 재료를 얻을 수 있는 특수 던전이 개선되어 단원 여러분의 새로운 도전을 기다리고 있습니다.","또한, 소중한 길드원을 성장시킬 수 있는 붉은 늑대 일지의 최고 단계가 확장되며, 월드 던전의 시즌이 새롭게 시작됩니다.","크루세이드 시즌2 보상이 각 연합에게 지급될 예정입니다."]},{"date_key":"2024-10-17","date_display":"2024.10.17","title":"10월 17일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/456839","note":"에픽 던전(하르페논 성소) 변경; 에픽 던전 상층 Lv.110 염원의 신역에 신규 네임드 몬스터 카르니우스가 추가됩니다.; 신규 클래스 별 신규 전설 보조 장비 핵심 제작 재료; 신규 태양의 축복석; 전설 장비 제작 재료; 황금 투구 휘장","summary_items":["원문 전문","자유를 향한 검은 날개","10월 17일(목) 업데이트 점검으로 적용되는 사항을 안내드립니다.","이번 업데이트에서는 에픽 던전 상층에 신규 네임드 몬스터 ‘카르니우스’가 추가되며, 클래스 별 전설 등급의 보조 장비가 추가됩니다.","또한, 사용 시 100% 확률로 전설 등급의 축복이 부여되는 ‘태양의 축복석’ 아이템 추가와 함께 신화 등급의 무기 외형, 탈것 초월 개체 보유 효과가 추가됩니다.","더 자세한 업데이트 사항은 하단의 안내를 참고해주시기 바랍니다."]},{"date_key":"2024-10-24","date_display":"2024.10.24","title":"10월 24일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/462624?wmsso_sign=check","note":"","summary_items":["원문 전문","자유를 향한 검은 날개","10월 24일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","월드 격전지와 월드 특수 던전의 새 시즌이 시작됩니다.","또한, 파티 던전의 새 시즌과 함께 수하를 소환하는 보스 몬스터 ‘로커딜’이 다시 등장합니다. 돌아온 로커딜은 시즌 2와 다르게 공격 패턴과 밸런스가 조정됩니다.","잠재력의 네 번째 페이지가 추가되며, 4페이지를 돌파하기 위해서는 '상급 해방의 씨앗'이 필요합니다."]},{"date_key":"2024-10-31","date_display":"2024.10.31","title":"10월 31일(목) 패치노트 (11/04 19:58 수정)","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/466120","note":"개선 및 변경 사항 → 10. 현자의 축복 제작식 상시 제공 내용이 추가되었습니다. (11/04 19; 신규 서버 도노반 오픈; 기존 서버와 독립된 환경에서 많은 성장 지원 혜택을 제공받으며, 더욱 빠르고 쾌적한 플레이를 할 수 있는 신규 서버 도노반이 추가됩니다.; 도노반 서버에서 플레이하는 모든 캐릭터는 빠른 성장과 편의를 위하여; 아빌리우스에 위치한 도노반 NPC와 상호작용 시 전투에 도움을 줄 수 있는; 도노반 서버에서는 다양한 클래스들을 부담 없이 변경해가며 자신에게 가장 적합한 클래스를 찾으실 수 있도록","summary_items":["원문 전문","자유를 향한 검은 날개","10월 31일(목) 업데이트 이후 적용되는 사항들을 안내하여 드립니다.","새롭게 독립된 세계관으로 나이트 크로우의 새로운 이야기가 시작될 도노반 서버와 강력한 마법 기술과 버프와 디버프를 사용할 수 있는 신규 클래스인 “보주” 가 나이트 크로우에 찾아옵니다.","또한, 일부 문제 현상의 수정과 개선사항이 반영됩니다.","자세한 업데이트 상세 내용은 아래 안내를 참고 부탁드립니다."]},{"date_key":"2024-11-07","date_display":"2024.11.07","title":"11월 7일(목) 패치노트(11/8 13:55 수정)","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/474078","note":"보유한 전공 휘장은 11월 7일(목) 23; 보유한 용맹 주화는 11월 8일(금) 12; 길드 전장 시즌1; 길드 단위의 대결을 펼치는 경쟁 콘텐츠 길드 전장의 첫 번째 정식 시즌이 시작됩니다.; 진행 일정; 시즌1 기간동안 획득하는 영광의 표식을 통해 머리장식 및 머리빗 아이템을 제작할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","11월 7일(목) 업데이트 이후 적용되는 사항을 안내드립니다.","길드 단위의 대결이 펼쳐지는 경쟁 콘텐츠 길드 전장 시즌1이 시작됩니다. 새롭게 시작되는 정규 시즌에서는 소속 그룹과 경기 결과에 따라 시즌 점수를 획득할 수 있으며, 시즌의 마지막 경기가 끝난 이후부터 시즌 종료까지 점수에 따른 보상을 받을 수 있습니다.","시험의 탑 시즌7이 시작됩니다. 업데이트 이후에는 이전 시즌에서 진행한 시험의 탑 전용 수집과 획득한 개척자 징표가 모두 초기화되므로 초기화 전 반드시 사용해 주시길 바랍니다.","마지막으로, 용맹 주화 및 전공 휘장 신규 시즌이 시작됩니다. 하기의 일정을 확인하시어 시즌 종료 전 다양한 혜택을 누려보시기 바랍니다."]},{"date_key":"2024-11-14","date_display":"2024.11.14","title":"11월 14일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/478880","note":"신규 장비 수집 추가; 고급 및 희귀 등급 수호부 수집 36종이 추가됩니다.; 영웅 장비 수집 51종이 추가됩니다.; 마사르타 얼음 동굴 보스 몬스터 추가; 마사르타 얼음 동굴 3지역에 신규 보스 몬스터 공포의 다르달로카가 추가됩니다.; 공포의 다르달로카 처치 시 정해진 확률에 따라 다양한 아이템을 획득합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","11월 14일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","고급 및 희귀 등급의 수호부 36종과 영웅 등급 장비 51종이 추가되어, 단원 여러분의 장비 수집이 한층 더 다채로워집니다.","마사르타 얼음 동굴 3지역에서 출현하는 신규 보스 ‘공포의 다르달로카’가 추가되며, 처치 시 영웅 장비 및 영웅 상급 장신구 제작 재료 등 다양한 보상을 획득할 수 있습니다.","이와 함께 11월 14일부터 28일까지 매일 22시, 킬데바트에 새로운 네임드 몬스터 ‘죽음의 기사’가 등장합니다. 같은 기간 동안 행운의 보물함도 킬데바트에 등장하며, 보물함 조작에 성공하면 탈것, 무기 외형, 글라이더 소환 기회와 성장에 도움이 되는 다양한 아이템을 얻을 수 있습니다. 행운의 보물함은 지도에 표기되지 않고 일정 시간 동안 잠겨있으며, 피격이나 이동 시 조작이 취소될 수 있으니 각별히 유의해 주시길 바랍니다."]},{"date_key":"2024-11-21","date_display":"2024.11.21","title":"11월 21일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/482330","note":"파티 던전 시즌 7; 체력이 낮아질수록 더욱 빠르고 강력해지는 보스 몬스터 크라부스가 돌아옵니다.; 진행 일정; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다.; 보스 몬스터 크라부스의 밸런스가 조정됩니다.; 파티 던전 시즌 7 기간 동안 획득하는 토벌자 표식은 제작을 통해 다양한 보상으로 교환할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2024년 11월 21일(목) 업데이트 점검 이후 적용되는 내용을 안내하여 드립니다.","이번 업데이트로 파티 던전 시즌 7이 시작되며, 보스 몬스터 ‘크라부스’가 돌아옵니다.","파티 던전 시즌6에서 획득했던 토벌자 표식은 모두 초기화될 예정이오니, 업데이트 전 제작을 통해 모두 사용해 주시기 바랍니다.","보다 자세한 업데이트 사항은 아래 안내하여 드리는 내용을 확인해 주시기 바랍니다."]},{"date_key":"2024-11-28","date_display":"2024.11.28","title":"11월 28일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/485651","note":"월드 던전 리뉴얼; 월드 던전 - 칸델리움 대사막 상층과 하층이 통합됩니다.; 11월 28일(목) 업데이트 이후부터는 1조당 4개 서버 매칭이 아닌 2개 서버 매칭으로 변경됩니다.; 매칭 정보는 일주일 단위로 변경되며, 월드 던전 매칭 서버 정보는 게임 내; 상층과 하층이 통합됨에 따라, 월드 던전은 칸델리움 대사막 1개만 운용됩니다.; 칸델리움 대사막은 서버별 성장도 순위 1위 ~ 300위의 단원님들이 이용할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","11월 28일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","월드 던전 - 칸델리움 대사막의 상, 하층이 통합되어 1개로 운용되며, 매칭 서버도 4개 서버 매칭이 아닌 2개 서버 매칭으로 변경됩니다.","칸델리움 대사막이 통합됨에 따라 사냥터 난이도가 변경됩니다.","더불어 신규 서버 ‘도노반’과 ‘에스텔라’ 전용 이벤트 던전 ‘광명의 정원 – 축복의 전당’이 추가됩니다."]},{"date_key":"2024-12-05","date_display":"2024.12.05","title":"12월 5일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/488593","note":"클래스 체인지; 이번 클래스 체인지는; 클래스 기술 특성 추가 및 변경; 기술 특성을 더욱 강력한 형태로 변경할 수 있는 신규 상급 기술 특성이 새롭게 추가됩니다.; 일부 기술 특성의 효과가 아래와 같이 변경됩니다.; 드랍을 통해 얻은 영웅 등급 기술서 및 기술서 부록을 분해하면 찢어진 상급 비급서 아이템을 획득할 수 있으며, 해당 아이템으로 상급 기술 특성","summary_items":["원문 전문","자유를 향한 검은 날개","12월 5일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","금일 업데이트 점검 이후 7일 동안 진행될 클래스 체인지는 횟수 제한 없이 클래스 체인지를 할 수 있게 변경됩니다.","또한, 각 클래스의 기술 특성이 추가 및 변경되며, 기술 특성을 더욱 강력하게 변경할 수 있는 상급 기술 특성이 추가됩니다.","12월 6일(금) 12:00에 보유 중인 용맹 주화가 초기화되므로, 초기화 이전에 모두 사용해 주시길 바랍니다."]},{"date_key":"2024-12-12","date_display":"2024.12.12","title":"12월 12일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/492737","note":"수호정령 시스템; 다양한 능력치 효과와 기술을 제공하는 귀여운 성장 시스템 수호정령이 새롭게 추가됩니다.; 수호정령은 일반종과 희소종으로 구분되며, 각각 9개의 수호정령이 존재합니다.; 수호정령은 60레벨 이상 달성 시; 획득한 수호정령은 가방으로 지급되며, 원하는 수호 정령을 선택하여 등록할 수 있습니다.; 수호정령은 최대 10마리까지 등록하여 보유할 수 있으며, 보유 가능한 수호정령의 수량은 재화를 소모하여 확장할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","12월 12일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","단원 여러분의 모험에 함께할 귀여운 파트너 ‘수호정령’이 업데이트됩니다. 수호정령은 단원님의 곁에 머무르며 다양한 능력치 효과와 기술을 제공합니다.","크루세이드 시즌 4가 시작됩니다. 진행 일정이 변경되었으며, 개인별 입찰 금액 제한, 용병 모집 기능 제거, 백작령 익명 처리 및 영지 수입 추가 등 많은 변경 사항이 추가되었습니다.","더 많은 경험치 및 무기 숙련도를 획득할 수 있는 테네리스 해협의 최상층 지역 ‘Lv.110 낙망의 해역’이 추가됩니다."]},{"date_key":"2024-12-19","date_display":"2024.12.19","title":"12월 19일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/497671","note":"길드 전장 시즌 2; 길드 단원의 대결을 펼치는 경쟁 콘텐츠 길드 전장의 두 번째 정식 시즌이 시작됩니다.; 시즌 진행 일정; 시즌 2 기간동안 획득하는 영광의 표식으로 신규 머리 장식 머리빗 아이템을 제작할 수 있습니다.; 시즌 1에 획득한 영광의 표식과 머리 장식, 머리빗 아이템은 2024년 12월 30일(월) 08; 시즌 1에서 획득한 머리 장식 강화 주문서 아이템은 2024년 12월 19일(목) 업데이트 이전까지 사용할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","길드의 명예를 걸고 싸우는 길드 전장의 두 번째 정식 시즌이 시작됩니다.","또한, 선혈의 마검을 소환하는 엘몬드가 파티 던전 신규 시즌과 시험의 탑 시즌 8이 단원 여러분의 새로운 도전을 기다리고 있습니다.","시험의 탑 시즌 7에서 획득한 ‘개척자의 징표’와 지난 파티던전 시즌에서 얻은 ‘토벌자 표식’은 업데이트 이후 모두 사라지므로 반드시 업데이트 전에 사용해 주시기 바랍니다.","다양한 편의성 개선과 함께 더욱 풍성해진 업데이트를 지금 확인해 보세요."]},{"date_key":"2024-12-26","date_display":"2024.12.26","title":"12월 26일(목) 패치노트","type":"update","year":2024,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/504474","note":"신규 길드 던전 추가; 전설 장비 제작에 필요한 필수 재료들을 획득할 수 있는 최상위 공략 길드 던전; 안티메네는 다른 길드 던전과 달리, 공략 실패 시 이용 시간이 반환되며 재도전이 가능합니다.; 안티메네는 체력이 일정 이하로 떨어지면 다음과 같은 특수 기믹을 사용합니다.; 길드 던전 내 자비의 기둥 세 개가 동시에 생성됩니다.; 자비의 기둥은 높은 생명력을 가지고 있기에 다수의 길드원이 합심하여 제한된 시간 안에 자비의 기둥을 파괴해야 합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","12월 26일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","세 번째 길드 던전 ‘추락한 위선의 날개: 안티메네’가 추가됩니다.","안티메네는 10레벨 이상의 길드부터 도전할 수 있으며, 최상위 길드 던전인 만큼 더 높은 수준의 보상이 제공됩니다.","더불어 2025년 푸른 뱀의 해를 기념하여 다양한 이벤트가 시작되며, 원활하고 쾌적한 게임 환경을 제공해 드리기 위한 오류 수정 작업이 진행되었습니다."]},{"date_key":"2025-01-02","date_display":"2025.01.02","title":"1월 2일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/511724","note":"보유한 용맹 주화는 2025년 1월 3일(금) 12; 보유한 전공 휘장은 2025년 1월 3일(금) 00; 용맹 주화 및 휘장 신규 시즌; 용맹 주화 및 전공 휘장 신규 시즌이 시작됩니다.; 용맹 주화 시즌 진행 일정; 전공 휘장 시즌 진행 일정","summary_items":["원문 전문","자유를 향한 검은 날개","이번 업데이트 점검은 게임 내 일부 오류 수정과 신규 이벤트 업데이트, 그리고 용맹 주화 및 전공 휘장 신규 시즌이 시작됩니다.","전공 휘장 및 용맹 주화 신규 시즌이 시작됨에 따라, 전공 휘장, 용맹 주화가 초기화될 예정입니다. 사용 기한을 확인해 주시길 바라며, 초기화 이전에 모두 사용해 주시길 바랍니다.","전공 휘장 및 용맹 주화 초기화","보유한 용맹 주화는 2025년 1월 3일(금) 12:00에 초기화됩니다."]},{"date_key":"2025-01-09","date_display":"2025.01.09","title":"1월 9일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/516802","note":"일반 던전 리뉴얼; 이를레타 신전이 번영의 땅과 통합되어 리뉴얼됩니다.; 이를레타 신전의 1~5전당이 하나의 지역으로 통합되며, 80레벨~100레벨 구역이 추가됩니다.; 이를레타 증표; 번영의 증표; 낡은 비행 부품","summary_items":["원문 전문","자유를 향한 검은 날개","1월 9일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","단원 여러분의 성장에 함께했던 일반 던전이 더욱 새롭고 효율적인 모습으로 리뉴얼됩니다.","이를레타 신전과 번영의 땅이 버려진 전당으로 통합되며, 산코나 유적 전지역이 미지의 발굴터로 합쳐집니다.","이와 함께, 일반 던전 리뉴얼에 따라 던전 시간 충전 장치에도 변경 사항이 적용됩니다."]},{"date_key":"2025-01-16","date_display":"2025.01.16","title":"1월 16일(목) 패치노트(1/16 09:52 수정)","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/518465","note":"마력 주입 4페이지 추가; 마력 주입 4페이지의 1단계와 2단계가 추가됩니다.; 파티 던전 시즌 9; 전멸 기술을 사용하는 아라크논 보스 몬스터가 돌아온 파티 던전 신규 시즌이 시작됩니다.; 진행 일정은 2025-01-16(목) 업데이트 후 ~ 2025-02-13(목) 업데이트 전까지 입니다.; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다","summary_items":["원문 전문","자유를 향한 검은 날개","1월 16일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","마력 주입 4페이지가 추가되며, 4페이지 주입 재료 아이템인 '마력 공학 결정'이 추가됩니다.","파티 던전 시즌 9가 시작되면서 보스 몬스터 '아라크논'이 다시 등장하고, 신규 길드 던전 '안티메네'의 밸런스도 조정됩니다.","가방 공간은 기존 최대 240칸에서 360칸까지 확장 가능하도록 개선되며, 이를레타 신전의 채널 수 상향 및 산코나 유적 일부 지역의 밸런스도 조정됩니다."]},{"date_key":"2025-01-23","date_display":"2025.01.23","title":"1월 23일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/520261","note":"수호정령 모험 시스템; 설정된 지역으로 모험을 떠나보내고, 다양한 보상을 획득할 수 있는 수호정령 모험 시스템이 추가됩니다.; 수호정령 모험은 일반 던전인 이를레타 신전과 산코나 유적, 그리고 모험 전용 던전인 꿈결 정원으로 나뉩니다.; 각 던전은 성장도에 따라 3개 구역으로 구분되며, 성장도 제한이 높은 구역일수록 더 가치 있는 보상을 획득할 수 있습니다.; 현재 동행 중인 대표 정령과 보조 정령은 모험에 보낼 수 없으며, 각 던전마다 1개의 구역에만 보낼 수 있습니다.; 던전 시간을 소모하여 모험을 설정할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","1월 23일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","수호정령 시스템에 ‘모험’과 ‘기술 발현’이 새롭게 추가되며, 기능 전반에 걸친 변경 사항이 적용됩니다.","또한, 신규 소모품 ‘꽃피우는 성장 비약’, 의상 ‘정월의 협객’, 설날 기념 글라이더 ‘푸른 뱀 방패연’도 만나보실 수 있습니다.","클래스 체인지가 상시 오픈되며, 이를레타 신전이 2개의 전당으로 분리되는 등 게임 플레이를 더욱 편리하게 만드는 여러 개선 사항도 준비했습니다."]},{"date_key":"2025-02-06","date_display":"2025.02.06","title":"2월 6일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/522556","note":"시험의 탑 시즌9; 시험의 탑 시즌 8이 종료되고, 시즌 9가 시작됩니다.; 진행 기간; 111층에서 120층까지, 총 10개의 층이 추가됩니다.; 신규 층 추가에 따라 시험의 탑 증표 전용 수집이 추가됩니다.; 지난 시즌에 최고 도달했던 층에서","summary_items":["원문 전문","자유를 향한 검은 날개","2월 6일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트를 통해 시험의 탑 시즌 8이 종료되고, 시즌 9가 시작됩니다.","아울러, 시험의 탑에 10개의 신규 층이 추가되어 최고 층이 120층까지 확장되며, 이에 맞춰 시험의 탑 전용 수집도 추가됩니다.","또한, 양손검 클래스의 ‘투혼’ 기술 발동 시 표시되는 아이콘이 변경되며, 영웅 등급 탈것 및 무기 외형 획득 시 시스템 메시지가 출력되지 않도록 변경됩니다."]},{"date_key":"2025-02-13","date_display":"2025.02.13","title":"2월 13일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/523825","note":"불멸 등급 개체 추가; 신화 등급보다 더욱 강력한 성능을 보유하고 있는 불멸 등급 탈것과 무기 외형이 추가됩니다.; 불멸 등급 개체는 기존 초월 시스템과 연계하여 특정 조건 만족 시 획득할 수 있습니다.; 불멸 등급 탈것을 장착하면 아래와 같은 발동 효과 가 적용됩니다.; 해당 효과는 전 클래스 공통으로 적용됩니다.; 받는 피해 감소율 +15%","summary_items":["원문 전문","자유를 향한 검은 날개","2월 13일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트를 통해 불멸 등급 개체가 추가되어 더욱 강력한 성장을 경험할 수 있으며, 초월 단계를 빠르게 달성할 수 있도록 탈것 및 무기 외형 성장 전용 재료가 추가되었습니다.","또한, 마사르타 기암 성역의 상위 지역이 변경되고, 신규 전설 기술이 추가되어 보다 치열한 전투가 펼쳐질 예정이기에 새로운 환경에 맞춰 대비해 주시기 바랍니다.","더불어, 수하를 소환하는 보스 몬스터 ‘로커딜’이 돌아온 파티 던전 시즌 10이 시작됩니다."]},{"date_key":"2025-02-20","date_display":"2025.02.20","title":"2월 20일(목) 패치노트 (2/20 22:03 수정)","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/525978","note":"마력 주입 4페이지 단계 추가; 기존 2단계가 3단계로 변경되고, 2단계, 4단계, 5단계가 새롭게 추가됩니다.; 마력 공학 결정 은 제작을 통해 획득할 수 있습니다.; 신규 전설 등급 장신구 추가; 전설 등급 귀걸이와 허리띠가 추가됩니다.; 에픽 던전 입장 조건 상향 및 밸런스 조정","summary_items":["원문 전문","자유를 향한 검은 날개","2월 20일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","마력 주입 4페이지의 2, 4, 5단계가 추가되어 더욱 강력한 능력치를 부여할 수 있습니다.","에픽 던전의 입장 조건이 상향 조정되며, 더욱 많은 경험치를 획득할 수 있도록 던전 내 밸런스 조정이 진행됩니다.","또한, 강력한 옵션을 보유한 신규 전설 등급 장신구가 추가되며, 보스 및 네임드 몬스터의 보상 또한 조정되어 한층 더 전략적인 플레이가 요구될 예정입니다."]},{"date_key":"2025-02-27","date_display":"2025.02.27","title":"2월 27일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/538372","note":"보유한 전공 휘장은 2025년 2월 27일(목) 23; 보유한 용맹 주화는 2025년 2월 28일(금) 12; 무기 숙련 달성 가능 최대 레벨이 130 → 150으로 상향 조정됩니다.; 무기 숙련 추가 효과는 130레벨 이상부터 4레벨마다 해금됩니다.; 기술 특성 포인트는 기존과 동일하게 레벨당 2포인트씩 지급됩니다.; 무기 숙련 최대 레벨 상승에 따른 새로운 레벨 달성 업적이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2월 27일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","무기 숙련 최대 레벨이 130에서 150으로 확장되며, 이에 따라 새로운 레벨 달성 업적이 추가됩니다. 또한, 나이트 크로우 신념 1포인트를 획득할 수 있는 ‘깨우침의 비약’ 사용 가능 횟수가 기존 10회에서 20회로 증가하여 더욱 빠른 성장이 가능해졌습니다.","길드 시스템에도 변화가 적용되어, 길드 탈퇴 후 24시간 동안 새로운 길드 가입 및 창설이 제한됩니다. 이와 함께, 용맹 주화 및 전공 휘장의 신규 시즌이 시작되며, 보유 중인 전공 휘장, 용맹 주화가 초기화될 예정입니다. 사용 기한을 확인해 주시길 바라며, 초기화 이전에 모두 사용해 주시길 바랍니다.","전공 휘장 및 용맹 주화 초기화"]},{"date_key":"2025-03-06","date_display":"2025.03.06","title":"3월 6일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/554404","note":"크루세이드 시즌 5; 크루세이드 신규 시즌이 시작됩니다.; 크루세이드 시즌 5에서는 부대 추가 편성 단계가 제외되어, 준비 기간, 영지 입찰, 경기 진행의 3단계로 진행됩니다.; 길드 전장 시즌 4; 길드 단위의 대결을 펼치는 경쟁 콘텐츠 길드 전장의 네 번째 정식 시즌이 시작됩니다.; 시즌 진행 일정","summary_items":["원문 전문","자유를 향한 검은 날개","3월 6일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","크루세이드와 길드 전장의 새 시즌이 시작되며, 균형 잡힌 전투 경험을 제공하기 위해 에픽 던전 내 일부 몬스터의 생명력 및 경험치가 조정됩니다.","또한, 강화된 영웅 중급 장신구가 포함된 신규 수집 21종이 추가됩니다. 새롭게 추가된 수집을 통해 추가 능력치를 획득하고, 더욱 강력한 성장을 이루어 보시기 바랍니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-03-13","date_display":"2025.03.13","title":"3월 13일(목) 패치노트(3/13 12:01 수정)","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/565493","note":"수호정령 신규 기능; 여러 마리의 수호정령을 동시에 성장시킬 수 있는 일괄 성장 기능이 추가됩니다.; 원하는 수호정령을 선택한 후 성장 버튼을 누르면 해당 정령이 현재 단계의 최대 레벨로 성장합니다.; 개별적으로 목표 레벨을 설정할 수 없으며, 항상 해당 진화 단계의 최대 레벨로 성장합니다.; 특정 수호정령의 레벨별 능력치를 다른 수호정령을 소모하여 변경할 수 있는 계승 시스템이 추가됩니다.; 모든 능력치를 획득한 상태에서만 계승이 가능하며,","summary_items":["원문 전문","자유를 향한 검은 날개","3월 13일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","수호정령의 일괄 성장 및 계승 시스템이 추가되며, 일부 클래스의 밸런스가 조정됩니다.","또한, 일부 기술의 효과 표현이 추가되어 전투의 몰입감을 높였으며, 보다 다채로운 전투를 경험하실 수 있도록 불멸 등급 무기의 발동 효과가 일부 변경되었습니다. 전 서버를 대상으로하는 월드 거래소가 새롭게 추가되며, 특수 초월 기능이 도입되어 캐릭터 성장의 새로운 가능성이 열립니다.","파티 던전 시즌 11이 시작되면서 생명력이 낮아질수록 더욱 빠르고 강력해지는 보스 몬스터 ‘크라부스’가 돌아옵니다."]},{"date_key":"2025-03-20","date_display":"2025.03.20","title":"3월 20일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/573040","note":"상급 내갑 추가; 신규 영웅 상급 내갑 2종이 추가됩니다.; 상급 내갑 각성 장비가 추가됩니다.; 각성은 안전 강화 단계 이상으로 강화된 장비가 필요하며 동일한 강화 수치로 각성됩니다.; 거래 가능 여부에 따라 각각의 제작 레시피가 존재합니다.; 장비 각성 시 기존에 적용되었던 세공 능력치는 초기화됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 20일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","영웅 상급 내갑 2종이 새롭게 추가되며, 이에 따라 해당 장비의 제작 재료 및 각성 장비도 함께 추가됩니다.","또한, 시험의 탑 시즌 9가 종료되고 새로운 도전이 펼쳐질 시즌 10이 시작됩니다.","월드 거래소에서는 판매 등록 및 구매가 가능한 아이템의 범위가 더욱 확대되며, 수호정령 능력치 계승을 위한 전용 재료인 ‘계승의 마법석’ 제작식이 추가됩니다."]},{"date_key":"2025-03-27","date_display":"2025.03.27","title":"3월 27일(목) 패치노트","type":"update","year":2025,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/577607","note":"신규 의상 추가; 신규 의상 2종이 추가됩니다.; 잠재력 신규 페이지 추가; 잠재력 5페이지가 추가됩니다.; 잠재력 5페이지 슬롯 돌파 시 상급 해방의 씨앗 재료가 소모됩니다.; 돌파 시 10개의 상급 해방의 씨앗이 소모되며, 해당 재료는 제작 및 상인을 통해 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 27일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","잠재력 5페이지와 의상 2종이 새롭게 추가되며, 일부 에픽 던전 입장 위치에서 캐릭터 간 충돌이 발생하지 않도록 변경됩니다.","아울러, 용맹 주화 신규 시즌이 시작됨에 따라 3월 28일(금) 12:00에 보유 중인 용맹 주화가 초기화되므로, 초기화 이전에 모두 사용해 주시길 바랍니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-04-03","date_display":"2025.04.03","title":"4월 3일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/580970","note":"붉은 늑대 일지 8장 추가; 길드 연구소 붉은 늑대 일지 8장이 추가됩니다.; 신규 페이지를 활성화할 수 있는 8번째 길드 특성이 추가되며, 길드 특성에서 각 일지별 480,000 포인트로 해금할 수 있습니다.; 신규 지속 기술 추가; NPC 상인 판매 품목 추가; 일부 NPC 상점의 판매 품목이 추가되고, 일부 아이템의 구매 제한이 변경됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","4월 3일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","길드 연구소의 붉은 늑대 일지 8장이 추가되어 더욱 강력한 복원 효과를 적용받을 수 있게됩니다.","클래스 공통 신규 지속 기술 2종 추가 및 공헌 주화 상인과 길드 상인의 판매 품목이 추가되며, 일부 아이템의 구매 제한이 변경됩니다.","더불어, 기존 콘텐츠에서 획득할 수 있는 ‘별의 기억(귀속)’ 개수가 상향 조정됩니다."]},{"date_key":"2025-04-10","date_display":"2025.04.10","title":"4월 10일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/586243","note":"신규 전설 등급 장신구 추가; 팔찌와 견장은 제작을 통해 획득할 수 있습니다.; 팔찌 및 견장 제작 시, 금속 파편과 계몽의 비전서의 상위 등급 재료가 소모되며, 필요한 재료는 아래와 같습니다.; 월드 거래소 등록 가능 품목 추가; 월드 거래소에서 판매 등록 및 구매할 수 있는 아이템이 추가됩니다.; 상급 계몽의 비전서","summary_items":["원문 전문","자유를 향한 검은 날개","4월 10일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","신규 전설 등급 팔찌, 견장이 각 3종씩 추가되며, 전설 등급 팔찌, 견장 제작에 필요한 신규 재료 아이템이 추가됩니다.","아울러, 파티 던전 시즌 11이 종료되고 시즌 12가 시작됩니다. 시즌 12의 파티 던전 보스로 선혈의 마검을 사용하는 엘몬드가 등장합니다.","파티 던전 시즌 11에서 획득했던 토벌자 표식(귀속)은 모두 초기화되므로 반드시 업데이트 전까지 사용해 주시기 바랍니다."]},{"date_key":"2025-04-17","date_display":"2025.04.17","title":"4월 17일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/589474","note":"길드 전장 시즌 5; 길드 단위의 대결을 펼치는 경쟁 콘텐츠 길드 전장의 다섯 번째 정식 시즌이 시작됩니다.; 시즌 진행 일정; 영광의 표식으로 시즌 5 전용 신규 머리 장식과 머리빗 아이템을 제작할 수 있습니다.; 시즌 5 머리 장식, 머리빗 아이템은; 시즌 5 머리 장식 강화 주문서 아이템은","summary_items":["원문 전문","자유를 향한 검은 날개","4월 17일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","길드 전장 시즌 5가 새롭게 시작됩니다.","이번 시즌부터는 동일 그룹 내에서도 일방적인 전투가 발생하지 않도록 일부 그룹의 비율이 조정되어, 보다 공정하고 균형 잡힌 매칭 환경이 제공될 예정입니다.","또한, 전설 등급 견장의 안전 강화 단계 이후 명중 및 방어 수치가 상향 조정됩니다."]},{"date_key":"2025-04-23","date_display":"2025.04.23","title":"4월 24일(목) 2주년 기념 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/591422","note":"신규 필드 디트슈타인 추가; 신 트리에스테 공국에 여섯 번째 필드 디트슈타인이 추가됩니다.; 길드 지령의 트리에스테 공국 지역 명칭이 일반 지역으로 변경됩니다.; 포함하는 영역은 이전과 같으며 신규 필드 디트슈타인이 추가됩니다.; 신규 필드 디트슈타인은 12개의 사냥터로 구성되어 있습니다.; 메인 퀘스트가 확장되며, 기존의 서브/일일 퀘스트와 함께 외전 퀘스트가 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","나이트 크로우가 여러분의 변함없는 애정과 관심 덕분에 어느덧 2주년을 맞이하게 되었습니다. 함께해 주신 모든 여정에 깊이 감사드리며, 이번 2주년을 기념하여 더욱 정성스럽게 준비한 업데이트 소식을 전해드립니다.","이번 2주년 업데이트는 새로운 지역, 도전 콘텐츠, 그리고 성장의 새로운 지평을 여는 클래스 각성 등 다양한 콘텐츠를 포함하고 있습니다.","먼저, 신규 지역 ‘디트슈타인’에서는 익숙하면서도 새로운 모험이 펼쳐지며, 더욱 깊어진 세계관과 함께 단원 여러분의 여정을 한층 풍성하게 만들어 드릴 예정입니다.","또한, 동료들과 협력해 공략하는 파티 콘텐츠 ‘몽환의 미궁’이 새롭게 추가되어, 전략과 팀워크의 즐거움을 경험하실 수 있습니다."]},{"date_key":"2025-04-30","date_display":"2025.04.30","title":"4월 30일(수) 패치노트 (5/7 19:46 수정)","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/596673","note":"몽환의 미궁 상층 6단계 보스 처치 시 출현하는 보물 상자에서 신규 아티팩트 꿈의 거울(귀속) 아이템을 확정적으로 획득할 수 있도록 변경됩니다.; 몽환의 미궁 상층은 3~6단계 사이에 보스가 등장할 수 있으며, 5단계까지 등장하지 않았을 경우 6단계에서 확정적으로 등장합니다.; 3~5단계에서 보스 처치 시 꿈의 거울(귀속) 및 거울 아티팩트 강화 주문서(귀속)는 확률적으로 획득할 수 있습니다.; 몽환의 미궁 상층 5단계 보스 미궁의 노스 페리온 처치 시 출현하는 영원한 몽환의 상자에서 신규 아티팩트 꿈의 거울(귀속) 및 거울 아티팩트 강; 몽환의 미궁 상층은 2~4단계 사이에 보스가 등장할 수 있으며, 4단계까지 등장하지 않았을 경우 5단계에서 확정적으로 등장합니다.; 2~4단계에서 보스 처치 시 꿈의 거울(귀속) 및 거울 아티팩트 강화 주문서는 확률적으로 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","4월 30일(수) 업데이트를 통해 적용되는 사항들을 안내드립니다.","캐릭터의 개성을 더욱 돋보이게 해줄 신규 의상 1종과 감정을 풍부하게 표현할 수 있는 신규 이모티콘 25종이 추가되어, 모험 외에도 소통의 즐거움과 자신만의 스타일을 완성하는 재미도 한층 더 강화되었습니다.","시험의 탑 시즌 10이 종료되고 새로운 시즌 11이 시작되며, 몽환의 미궁 상층 보상이 조정되어 최종 보상으로 신규 아티팩트 ‘꿈의 거울(귀속)’을 확정적으로 획득하실 수 있습니다.","아울러, 지난 길드 전장 시즌 4의 보상으로 제작할 수 있었던 일부 아이템을 버리기 및 NPC 상점 판매 가능하도록 변경됩니다."]},{"date_key":"2025-05-08","date_display":"2025.05.08","title":"5월 8일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/599442","note":"파티 던전 신규 시즌; 전멸 기술을 사용하는 아라크논 보스 몬스터가 돌아온 파티 던전 신규 시즌이 시작됩니다.; 신규 시즌이 시작됨에 따라 기존에 남아있던 주간 입장 횟수는 초기화됩니다.; 아피우스 왕국의 보물 상자 이벤트 기간 연장; 아피우스 왕국의 보물 상자 이벤트 3종의 진행 기간이 5월 8일(목) 업데이트 전까지에서 5월 15일(목) 업데이트 전까지로 연장됩니다.; 퀘스트","summary_items":["원문 전문","자유를 향한 검은 날개","5월 8일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","파티 던전 시즌 12가 종료되고 시즌 13이 시작됩니다. 시즌 13의 파티 던전 보스로 전멸 기술을 사용하는 ‘아라크논’이 등장합니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다.","5월 8일(목) 패치노트"]},{"date_key":"2025-05-15","date_display":"2025.05.15","title":"5월 15일(목) 패치노트 (5/14 19:19 수정)","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/602193","note":"수호정령; 밤까마귀 암릿 추가; 신규 밤까마귀 장비 밤까마귀 암릿이 추가됩니다.; +8 이상 강화 성공 시 발동 효과 능력치인 밤까마귀의 숨결이 추가로 적용됩니다.; +9강 이상 추가 강화 수치 달성 시 최대 생명력 회복량과 보호막량이 증가합니다.; +10강 이상 추가 강화 수치 달성 시 PVP 피해 감소율 증가 효과가 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","5월 15일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","캐릭터의 전투 능력을 한층 더 강화할 수 있는 신규 밤까마귀 장비 '밤까마귀 암릿’이 추가됩니다.","미궁 던전의 입장권 드랍률이 상향 조정되고, 도전의 보람을 더욱 크게 느끼실 수 있도록 공략 성공 시 획득 보상이 상향 조정됩니다.","에픽 던전 전 지역의 입장 조건이 상향 조정되며, 보다 원활한 협동 전투가 가능하도록 테네리스 해협 내 일부 지역의 입장 가능 인원 수가 상향 조정됩니다."]},{"date_key":"2025-05-22","date_display":"2025.05.22","title":"5월 22일(목) 패치노트 (5/26 10:42 수정)","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/604204","note":"수호부 아티팩트 각성 추가; 영웅 등급 아티팩트 순교자의 수호부를 각성할 수 있습니다.; 각성된 아티팩트는 제작을 통해 획득할 수 있습니다.; 마력 주조 리뉴얼; 등록한 재료 아이템의 등급과 강화 단계에 따라 결정되는 주조 예측 단계가 기존 8단계 → 7단계로 변경됩니다.; 마력 주조 단계에 따라 획득 가능한 보상이 변경됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","5월 22일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","영웅 등급 아티팩트 ‘순교자의 수호부’의 각성 기능이 새롭게 추가됩니다.","또한, 마력 주조 시스템이 리뉴얼되었으며, 예측 단계 5단계 이상부터는 ‘순교자의 수호부’의 각성 고유 재료인 ‘깊은 신의의 기운’을 획득할 수 있습니다.","아울러, 용맹 주화 신규 시즌이 시작됨에 따라 5월 23일(금) 12:00에 보유 중인 용맹 주화가 초기화되므로, 초기화 이전에 모두 사용해 주시길 바랍니다."]},{"date_key":"2025-05-29","date_display":"2025.05.29","title":"5월 29일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/607481","note":"신규 무기 외형 추가; 클래스 별 신규 무기 외형이 추가됩니다.; 신규 무기 외형 추가에 따라 보유 효과가 추가됩니다.; 초월 레벨 달성 개체 보유 효과가 추가됩니다.; 불멸 등급 무기 외형은 1레벨까지 성장할 수 있도록 확장됩니다.; 마력 주입 능력치 잠금 기능 추가","summary_items":["원문 전문","자유를 향한 검은 날개","5월 29일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 클래스별 신규 무기 외형과 그에 따른 보유 효과가 추가되며, 마력 주입 효과 변경 시 기존 능력치를 유지할 수 있는 잠금 기능이 새롭게 도입됩니다.","또한, 미궁 던전에서는 성장도 비교 기능과 UI 개선을 통해 더욱 직관적인 진행이 가능해졌고, 길드 전장과 크루세이드 경기에는 처치 안내 시스템 메시지가 적용되어 전투의 몰입감을 높였습니다.","그 외에도 테네리스 해협의 클래스 아이콘 표기 방식 변경, 수호정령 관련 알림 최적화, 일부 기술의 상태 이상 해제 조건 개선 등 다양한 편의성과 밸런스 조정이 함께 이루어졌습니다. 여섯 번째 정식 시즌을 맞이한 길드 전장과 새롭게 시작되는 이벤트도 많은 관심 부탁드립니다."]},{"date_key":"2025-06-05","date_display":"2025.06.05","title":"6월 5일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/609636","note":"서버 이전; 캐릭터 삭제 대기 시간; 캐릭터 삭제 가능 레벨; 파티 던전 신규 시즌 및 난이도 추가; 던전","summary_items":["원문 전문","자유를 향한 검은 날개","6월 5일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","파티 던전 시즌 13이 종료되고, 수하를 소환하는 보스 몬스터 로커딜이 등장하는 시즌 14가 시작됩니다.","또한, 이번 시즌부터는 새로운 난이도 5단계가 추가되며, 토벌자 표식으로 제작할 수 있는 아이템이 추가됩니다.","파티 던전 시즌 13에서 획득했던 토벌자 표식은 모두 초기화되므로, 반드시 업데이트 전까지 사용해 주시기 바랍니다."]},{"date_key":"2025-06-12","date_display":"2025.06.12","title":"6월 12일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/611672","note":"시험의 탑 시즌 12; 시험의 탑 시즌 11이 종료되고 시즌 12가 시작됩니다.; 121층에서 130층까지 총 10개의 층이 추가됩니다.; 123층에는 신규 던전 유형인 보물 찾기 몬스터 던전이 추가됩니다.; 신규 층 추가에 따라 시험의 탑 증표 전용 수집이 추가됩니다.; 100층 ~ 120층의 시험의 탑 공략 성공 시 획득하는 전용 수집 증표의 아이콘이 변경됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","6월 12일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","이번 업데이트를 통해 시험의 탑 시즌 11이 종료되고, 121층부터 130층까지 확장된 시즌 12가 새롭게 시작됩니다.","또한, 크루세이드도 시즌 6에 돌입하여 새로운 경쟁이 펼쳐질 예정입니다.","더불어, 이벤트 기간 동안 길드 던전2 - 티아라카의 모든 난이도에서 ‘길드 이름 변경권’을 획득할 수 있는 기회가 제공되며, 서버 이전 종료와 함께 일시적으로 변경되었던 캐릭터 삭제 조건도 원복됩니다."]},{"date_key":"2025-06-19","date_display":"2025.06.19","title":"6월 19일(목) 패치노트 (6/27 10:34 수정)","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/613647","note":"보유한 용맹 주화는 2025년 6월 20일(금) 12; 보유한 전공 휘장은 2025년 6월 20일(금) 00; 신화 글라이더 추가; 신화 등급 신규 글라이더 3종이 추가됩니다.; 신규 글라이더 추가에 따라 보유 효과가 추가됩니다.; 초월 개체 보유 효과가 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","6월 19일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","신화 등급 글라이더 3종이 새롭게 추가되며, 이에 따른 일반 및 초월 보유 효과도 함께 추가됩니다.","또한, 각성 기술의 밸런스 조정이 진행되며, 크루세이드 시즌 6의 종료 일정 변경과 함께 교황령의 규칙 및 기수 간 전투 밸런스에도 일부 조정이 이뤄집니다.","더불어, 용맹 주화 및 전공 휘장의 신규 시즌이 시작되며, 보유 중인 전공 휘장, 용맹 주화가 초기화될 예정입니다."]},{"date_key":"2025-06-26","date_display":"2025.06.26","title":"6월 26일(목) 패치노트","type":"update","year":2025,"quarter":2,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/615526","note":"길드 던전 상위 난이도 추가; 길드 던전의 상위 난이도가 추가됩니다.; 티아라카는 공략 실패 시 이용 시간이 반환되며, 재도전이 가능하도록 변경됩니다.; 길드 던전 I, II; 발현의 기운 3종; 황금 방어구 휘장 파편","summary_items":["원문 전문","자유를 향한 검은 날개","6월 26일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","길드 던전 I, II에는 ‘특급’ 난이도, 길드 던전 III에는 ‘극한’ 난이도가 새롭게 추가됩니다.","더불어, 신규 길드 망토 특성 ‘특급 망토 강화’가 추가되며, 길드 망토 효과의 강화 최대 레벨이 상향 조정됩니다.","또한, 꿈의 거울 상자 제작식이 새롭게 추가되어, 강화된 귀속 꿈의 거울을 거래소를 통해 획득하실 수 있게 됩니다."]},{"date_key":"2025-07-03","date_display":"2025.07.03","title":"7월 3일(목) 패치노트","type":"update","year":2025,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/616447","note":"여름맞이 신규 의상 및 무기 외형 추가; 신규 의상 파도의 질주가 추가됩니다.; 파티 던전 신규 시즌; 체력이 낮아질수록 더욱 빠르고 강력해지는 보스 몬스터 크라부스 가 돌아온 파티 던전 시즌 15가 시작되며, 새로운 난이도 5단계가 추가됩니다.; 진행 기간; 신규 난이도인 5단계 클리어 시 아래 보상을 획득할 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","시원한 바다의 감성을 담은 신규 의상 ‘파도의 질주’와 함께 아이스크림 무기 외형이 새롭게 추가되며, 더욱 강력해진 보스 ‘크라부스’가 돌아온 파티 던전 신규 시즌이 시작됩니다.","길드 던전 ‘안티메네’의 극한 난이도는 더 많은 단원님들이 도전할 수 있도록 전반적인 난이도가 완화되었으며, 서버 그룹의 운명을 결정짓는 서버 그룹 총력전이 시작됩니다.","또한, 7 ","8월 21일(목) 업데이트를 통해 적용되는 사항들을 안내드립니다.","새로운 도전이 기다리고 있는 특수 던전 ‘기억 속의 성소’가 추가되며, 에픽 던전 전 지역의 입장 조건과 난이도가 대대적으로 리뉴얼됩니다.","특히, '하르페논 성소 – 염원의 신역'에는 신규 보스 몬스터가 출현하는 ‘몰락의 전당’ 영역이 추가되어 한층 치열한 전투가 펼쳐질 예정입니다.","더불어, 신화 등급을 뛰어넘는 불멸 등급 글라이더가 새롭게 등장하며, 원하는 능력치를 획득할 수 있는 신규 성장 시스템 ‘신념 결의’가 추가됩니다."]},{"date_key":"2025-08-28","date_display":"2025.08.28","title":"8월 28일(목) 패치노트","type":"update","year":2025,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/644314","note":"신규 신화 탈것 추가; 신화 등급 탈것 1종이 추가됩니다.; 신규 탈것 추가에 따라 보유 효과가 추가됩니다.; 신화 등급 개체 추가에 따라 불멸 탈것 유성의 바하무트 레벨이 2레벨로 확장됩니다.; 신화 교체 비용 변경; 신화 등급 탈것 교체 비용이 아래와 같이 변경됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","8월 28일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 새로운 신화 등급 탈것 ‘초패왕의 기린’이 새롭게 추가되며, 불멸 등급 탈것의 초월 최대 레벨이 2레벨까지 확장됩니다.","또한, 신화 등급 탈것 교체 비용이 일부 구간에서 대폭 인하되어 교체에 대한 부담이 완화되었습니다.","전멸 기술을 구사하는 보스 ‘아라크논’이 등장하는 파티 던전 시즌 17이 시작되며, 새로운 5단계 난이도를 통해 한층 긴장감 넘치는 전투가 펼쳐집니다."]},{"date_key":"2025-09-04","date_display":"2025.09.04","title":"9월 4일(목) 패치노트 (9/5 16:48 수정)","type":"update","year":2025,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/647063","note":"신규 의상 추가; 신규 의상 1종이 추가됩니다.; 밤까마귀 장비 강화 리뉴얼; 파괴 없이 밤까마귀 장비를 강화할 수 있는 강화 주문서 수호의 밤까마귀 강화 주문서가 추가됩니다.; 수호의 밤까마귀 강화 주문서 사용 시 강화 단계에 따라 정해진 수량의 주문서가 필요합니다.; 밤까마귀 장비 강화 실패 시 주문서의 제작 재료인 밤까마귀의 수호 파편을 획득합니다.","summary_items":["원문 전문","자유를 향한 검은 날개","9월 4일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 단원님의 개성을 더욱 빛내줄 신규 의상 1종이 추가되며, 밤까마귀 장비 강화 리뉴얼을 통해 파괴 위험 없이 안전하게 장비를 강화시킬 수 있는 ‘수호의 밤까마귀 강화 주문서’가 추가됩니다.","또한, 콘라드와 신시아 서버에서는 월드 격전지의 안전지대가 해제되며, 특수 던전 ‘기억속의 성소’가 오픈됩니다.","더불어, 시험의 탑 시즌 13이 종료되고 새로운 시즌 14가 시작되며, 많은 단원 여러분께서 기다려 주신 서버 이전도 함께 진행되오니 많은 관심 부탁드립니다."]},{"date_key":"2025-09-11","date_display":"2025.09.11","title":"9월 11일(목) 패치노트","type":"update","year":2025,"quarter":3,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/649022","note":"신규 지속 기술 추가; 길드 상인이 판매하는 클래스 공통 신규 지속 기술 결심 3레벨이 추가됩니다.; 결심 기술의 상급 특성이 추가 적용됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","10월 30일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 할로윈 기념 신규 의상 ‘한밤의 그림자’가 출시 되며, 모든 클래스의 4차 전직 의상이 추가됩니다. 한손검 클래스의 어그로 효율이 증가하도록 조정 될 예정입니다.","이외에도 길드 전장에 참여해 획득할 수 있는 제작 재료인 ‘영광의 표식’의 명칭이 ‘전장의 표식’으로 변경됩니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-11-06","date_display":"2025.11.06","title":"11월 6일(목) 패치노트 (11/6 11:00 수정)","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/665626","note":"링크 시스템; 11월 6일(목) 업데이트 이후부터 자산 전송이 시작됩니다.; 신규 서버 서버 이전; 신규 서버 전용 서버 이전으로, 신규 서버→ 기존 서버로의 이동만 가능합니다.; 정해진 기간 내 서버 이전하지 못한 캐릭터는 콘라드, 신시아 서버 운영 기간 종료 후 임의의 서버로 자동 이전됩니다.; 서버 이전은 상점 → 서버 이전에서 이용하실 수 있습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","11월 6일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","금주 업데이트에서는 신규 서버 신시아, 콘라드 서버에서 서버 이전과 더불어 자산 전송이 시작됩니다.","영웅~신화 등급의 신규 탈것 5종이 추가되며, 이에 따른 보유 효과가 추가될 예정입니다.","신화 등급의 탈것 또는 무기 외형을 중복으로 보유하고 계신 단원분들의 편의성 개선을 위해 중복 개체를 상시 교체할 수 있는 기능 추가와 파티 던전 최소 성장도 미달 파티원이 있는 경우, 팝업 창이 노출되도록 개선됩니다."]},{"date_key":"2025-11-13","date_display":"2025.11.13","title":"11월 13일(목) 패치노트 (11/12 20:26 수정)","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/671210","note":"신규 서버 종료; 신시아, 콘라드 서버 운영이 11월 13일(목) 업데이트를 기점으로 종료됩니다.; 임의의 서버로 자동 이전 시 서버 통합 처리 규칙이 적용되며, 서버 통합 처리 규칙과 관련한 자세한 사항은 하단의 공지를 참고해 주시기 바랍니다; 월드 던전 리뉴얼; 칸델리움 대사막 지역의 난이도가 상향 조정됩니다.; 월드 던전 보스 몬스터 히샤라트, 찬타라트의 생명력이 상향 조정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","11월 13일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","신시아 또는 콘라드 서버에서 기존 서버로 이전을 계획하고 계신 단원님께서는 11월 12일(수) 23시까지 서버 이전해주시기 바랍니다.","＊ 이전 기간 동안 서버 이전을 진행하지 않은 캐릭터는 업데이트 종료 후 임의의 서버로 자동 이전됩니다.","월드 던전 ‘칸델리움 대사막’ 지역의 난이도가 상향 조정되며, 칸델리움 대사막에서 획득할 수 있는 재료 ‘유적의 정수’를 통해 제작 가능한 신규 아티팩트 ‘기원의 유물’이 추가됩니다."]},{"date_key":"2025-11-20","date_display":"2025.11.20","title":"11월 20일(목) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/677786","note":"연금술 연마 레벨 상향; 현자의 돌 연마 최대 레벨이 Lv.12 → Lv.18로 상향됩니다.; Lv.13 이상 연마 시 신규 아이템 창조의 결정이 연마 재료로 소모됩니다.; 월드 격전지 변경; 정예 몬스터 화산분화 폭군이 맹화의 오름길 지역을 제외한 오베르 화산 지대 전지역에 등장하도록 변경됩니다.; 월드 던전 변경","summary_items":["원문 전문","자유를 향한 검은 날개","11월 20일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 현자의 돌 연마 최대 레벨이 상향됩니다. 이에 따라, 13레벨 이상 연마 시에 사용되는 신규 재료 아이템 ‘창조의 결정’이 추가됩니다.","월드 격전지 정예 몬스터 ‘화산분화 폭군’이 맹화의 오름길 지역을 제외한 오베르 화산 지대 전 지역에 등장하도록 변경됩니다. 해당 몬스터 처치 시 100% 확률로 ‘폭군의 궤짝(귀속)’ 아이템을 획득할 수 있습니다.","파티 던전의 신규 시즌이 시작되며, ‘선혈의 마검’을 소환하는 보스 몬스터 ‘엘몬드’가 등장합니다."]},{"date_key":"2025-11-27","date_display":"2025.11.27","title":"11월 27일(목) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/686157","note":"밤까마귀 장비 전용 축복 추가; 밤까마귀 장비에 축복을 부여하여 능력치를 획득하는 밤까마귀 전용 장비 축복이 추가됩니다.; 동일한 축복이 부여된 장비의 개수에 따라 축복 공명 효과가 발생하며, 공명 효과 발생 시 추가 능력치를 적용 받을 수 있습니다.; 밤까마귀 장비 관련 업적 변경; 밤까마귀 장비 강화 시도 신규 업적이 추가되고, 기존 업적 목표 횟수가 하향 조정됩니다.; 길드 특성 추가","summary_items":["원문 전문","자유를 향한 검은 날개","11월 27일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 밤까마귀 장비에 축복을 부여할 수 있는 축복 기능과 밤까마귀 장비 강화 시도에 따른 신규 업적 추가 및 기본 업적 목표 횟수가 하향 조정됩니다.","다양한 능력치를 올려주는 길드 특성 능력치 4페이지가 추가되며, 시험의 탑 시즌 16의 시작과 더불어 많은 단원님들께서 기다려주셨던 서버 이전이 일주일 간 진행됩니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-12-04","date_display":"2025.12.04","title":"12월 4일(목) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/689218","note":"마력 주입 5페이지가 새롭게 추가됩니다.; 마력 주입 5페이지에 사용 가능한 신규 재료 마력 홍염 결정이 추가됩니다.; 신규 업적 및 수집 추가; 성장도, 수집 달성도에 따른 신규 업적이 추가되며, 일부 업적 보상으로 지급되는 신규 수집 아이템이 지급됩니다.; 신규 업적 보상으로 완성할 수 있는 신규 수집이 추가됩니다.; 붉은 늑대 일지 9장 추가","summary_items":["원문 전문","자유를 향한 검은 날개","12월 4일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 마력 주입 5페이지와 붉은 늑대 일지 9장이 추가되며, 성장도와 수집 달성도에 따른 신규 업적이 추가됩니다.","희귀 비전서 5종과 고대 파피루스가 월드 거래소에 등록할 수 있게 변경되며, 용맹 주화 및 전공 휘장 신규 시즌이 시작됩니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-12-11","date_display":"2025.12.11","title":"12월 11일(목) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/691849","note":"익명 에픽 테네리스 해협 던전에 Lv.122 회한의 해역 지역이 추가되며, 일부 지역의 입장 조건이 변경됩니다.; 성장도는 달성한 최고 성장도를 기준으로 실시간 갱신되며, 서버 점검 후에는 접속한 기준으로 재 갱신됩니다.; 테네리스 해협 내 일부 네임드 몬스터가 등장하지 않게 됩니다.; 자만의 해역, 기만의 해역 내의 익명 상태를 제어하는 화로를 더 이상 사용할 수 없으며, 상시 익명 상태로 진행됩니다.; 하르페논 성소 변경; 하르페논 성소의 입장 조건과 난이도가 상향 조정됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","12월 11일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 익명 에픽 ‘테네리스 해협’ 던전 내 신규 해역이 추가되며, 일부 지역의 입장 조건이 변경됩니다.","하르페논 성소의 입장 조건과 난이도가 상향됩니다. 이로 인해, 해당 지역의 일반 몬스터 처치 시 획득 경험치가 상향 조정됩니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2025-12-18","date_display":"2025.12.18","title":"12월 18일(목) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/695432","note":"신규 에픽 던전 타르티스 감옥 추가; PVP 및 PVE 요소가 모두 결합된 새로운 에픽 던전3; 타르티스 감옥은 자신이 속한 길드를 제외한 모든 플레이어를 식별할 수 없습니다. (동일 연합도 익명 처리됩니다.); 타르티스 감옥에서는 동일한 구조의 방들이 존재하며, 포탈을 통해 이동할 수 있습니다.; 21; 21","summary_items":["원문 전문","자유를 향한 검은 날개","12월 18일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 세 번째 에픽 던전 ‘타르티스 감옥’이 추가됩니다. 타르티스 감옥에서는 길드 단위 전략과 협동이 매우 중요한 점령전이 진행되며, 승리한 길드는 전설 각성 장비 제작 재료를 포함한 다양한 아이템을 획득할 수 있습니다. 신규 전장에서 새로운 경쟁의 재미를 느껴보시기 바랍니다.","나이트 크로우에 등장하는 보스 몬스터의 모습을 하는 상위 등급 수호정령 ‘마수종’ 8종이 추가됩니다. 전설 ~ 신화 등급의 전용 기술을 보유한 귀엽고 강력한 수호정령을 만나보세요!","제작을 통해 제작할 수 있는 전설 등급 각성 방어구 36종이 추가됩니다. 강화 단계 +7 이상의 전설 방어구와 고유 제작 재료를 사용하여 더욱 강력한 방어구를 제작해보시기 바랍니다."]},{"date_key":"2025-12-24","date_display":"2025.12.24","title":"12월 24일(수) 패치노트","type":"update","year":2025,"quarter":4,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/699092","note":"밤까마귀 인장 추가; 신규 밤까마귀 장비 밤까마귀 인장이 추가됩니다.; +8 이상 강화 성공 시 발동 효과 능력치인 밤까마귀의 기세가 추가로 적용됩니다.; 강화된 밤까마귀 인장 상자 제작식이 추가됩니다.; 신규 업적 추가; 수호의 밤까마귀 강화 주문서 사용 시 달성되는 반복 업적이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","12월 24일(수) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 신규 밤까마귀 장비 ‘밤까마귀 인장’이 추가되며, 수호의 밤까마귀 강화 주문 서 소모에 따른 반복 업적이 추가됩니다.","에픽 던전3: 타르티스 감옥 점령전 일정과 밸런스 수정이 진행될 예정이며, 타르티스 감옥 내 끝없는 회랑에 정예 몬스터 ‘철혈의 간수장’이 추가됩니다. ‘철혈의 간수장’ 처치 시 궤짝을 100% 확률로 획득할 수 있습니다.","타르티스 감옥에 등장하는 몬스터를 처치하면 획득할 수 있는 신규 몬스터 무기 외형 2종이 추가됩니다."]},{"date_key":"2026-01-08","date_display":"2026.01.08","title":"1월 8일(목) 패치노트 (1/8 11:26 수정)","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/704598","note":"익명 에픽 던전 테네리스 해협 변경; 테네리스 해협의 난이도 및 입장 조건이 상향 조정됩니다.; 난이도가 상향된 지역에서 획득하는 경험치 및 무기 숙련도가 상향 조정됩니다.; 전설 각성 장비 재료 지급 수량 상향 및 획득처 추가; 전설 각성 장비 제작 재료인 분열된 공명의 파편 획득처가 추가되며, 기존 획득처에서의 보상 지급 수량이 상향 조정됩니다.; 잠재력 신규 페이지 추가","summary_items":["원문 전문","자유를 향한 검은 날개","1월 8일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 익명 에픽 던전인 ‘테네리스 해협’의 난이도 및 입장 조건을 상향 조정하며, 전설 각성 장비 재료 ‘분열된 공명의 파편’의 획득처 추가 및 기존 획득처에서의 보상 지급 수량이 상향 조정됩니다.","또한, 신규 서버인 링크캠프를 제외한 서버 이전이 일주일 간 진행되며, 잠재력의 신규 페이지가 추가됩니다.","이 외에도 모든 클래스 공통 지속 기술 ‘불퇴’가 추가되며, 시험의 탑 신규 시즌이 시작됩니다."]},{"date_key":"2026-01-15","date_display":"2026.01.15","title":"1월 15일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/706580","note":"일부 클래스 변경; 일부 클래스의 기술 효과 및 기술 특성 효과가 변경됩니다.; 치명적 운용(사용 기술, 토글 효과)이 성운의 장막(사용 기술)으로 변경됩니다.; 별의 축복 발동 조건에 성운의 장막이 추가됩니다.; 일부 기술이 사용 기술 → 지속 기술(발동 효과)로 변경되며, 기술 효과가 리뉴얼됩니다.; 희귀 등급 치유 와 영웅 등급 빛나는 치유 기술의 반복 사용으로 인한 피로도를 줄이기 위해 빛나는 치유 보유 시 치유 기술의 회복량이 증가하는","summary_items":["원문 전문","자유를 향한 검은 날개","1월 15일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 보주, 마법봉 클래스의 기술 효과 및 기술 특성 효과가 변경됩니다. 이로 인해 일부 장비와 무기 외형, 전직 능력치가 변경됩니다.","또한, 1000일 기념 글라이더가 추가되며, 공헌 주화 상점에서 구매 가능한 아이템 추가 및 일부 상품의 구매 제한 수량이 변경됩니다.","이 외에도 파티 던전의 신규 시즌 시작 및 링크캠프 월드 격전지의 안전 지대 해제 및 월드 던전이 오픈됩니다."]},{"date_key":"2026-01-22","date_display":"2026.01.22","title":"1월 22일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/708864","note":"일부 기술 변경; 한손검 수호의 장벽이 기술 순차 사용에 등록되지 않도록 변경됩니다.; 한손검 수호의 장벽과 보주 성운의 장막 기술을 자동 사용 등록해둘 경우, 기술 순차 사용 중에도 자동 사용할 수 있도록 변경됩니다.; 무게 관련 변경 사항; 일부 소모품 및 재료 아이템의 무게가 0으로 변경됩니다.; 클래스와 관계없이 전직 시 지급되는 최대 무게가 동일하게 변경됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","1월 22일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","한손검 및 보주 클래스 내 일부 기술이 변경됩니다. 또한, 일부 소모품 및 재료 아이템의 무게가 0으로 변경되며, 클래스와 관계없이 전직 시 지급되는 최대 무게가 동일하게 변경됩니다.","장비의 무게가 종류에 따라 일관되도록 변경되며, 링크캠프 서버에서 대량의 경험치와 무기 숙련도, 골드를 획득할 수 있는 하이퍼 부스팅 이벤트 던전: 광명의 정원 - 축복의 전당이 오픈됩니다.","자세한 업데이트 내용은 하단의 안내를 통해 확인해 주시기 바랍니다."]},{"date_key":"2026-01-29","date_display":"2026.01.29","title":"1월 29일(목) 패치노트 (2/2 14:10 추가)","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/710480","note":"신규 콘텐츠 - 도미니언 추가; 총 4주간 시즌이 진행되는 동안 최대 128길드가 참여할 수 있는 길드 단위 콘텐츠 도미니언이 추가됩니다.; 시즌1 일정; 중앙 점령지를 차지하고 점령 포인트를 가득 채운 길드가 승리합니다.; 점령 포인트는 점령지 위의 아군 길드 인원이 적군 길드보다 더 많을수록 빠르게 상승합니다.; 점령지 위 아군 길드 인원이 너무 적을 경우 상승하지 않습니다.","summary_items":["원문 전문","자유를 향한 검은 날개","1월 29일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","총 4주간의 시즌이 진행되는 동안 최대 128개의 길드가 참여할 수 있는 길드 단위 콘텐츠 ‘도미니언’이 추가됩니다.","도미니언은 4개의 길드가 하나의 그룹을 이루어 스테이지를 진행하며, ‘점령전’과 결승전이 진행되는 ‘공성전’으로 구성되어 있습니다.","또한, 앞서 스무 번째 서신에서 알려드린 것처럼 도미니언 시작 전 길드 재편성의 기회를 제공하기 위해 1월 29일(목) 12:00 ~ 2월 1일(일) 23:00 까지 서버 이전이 진행됩니다."]},{"date_key":"2026-02-05","date_display":"2026.02.05","title":"2월 5일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/712722","note":"도미니언 콘텐츠 변경; 도미니언 점령전의 부활 시간이 30초에서 10초로 변경됩니다.; 도미니언 점령전에서 점령 포인트가 기존보다 빠르게 상승하도록 변경됩니다.; 도미니언 점령전의 시작 지점부터 탈것에 탑승할 수 있도록 변경됩니다.; 테네리스 해협 변경; 테네리스 해협에 대기열 시스템이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","2월 5일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 도미니언 컨텐츠 내 일부 시간이 조정되며, 테네리스 해협 내 대기열 시스템이 추가됩니다.","또한, 전설 글라이더 및 영웅 글라이더 도전 상자 사용 시 달성되는 반복 업적이 추가되며, 수호정령 꿈결 정원 4구역이 추가 및 환상의 정령수 열매 제작식이 추가됩니다.","그 외에도 마력 주조 7레벨에서 획득할 수 있는 황금 방어구 휘장 파편의 개수 증가 및 링크캠프 서버 이전 기간 일주일 연장 및 타르티스 감옥 이용 불편 보상으로 일주일 간 점령 보상이 2배로 상향됩니다."]},{"date_key":"2026-02-12","date_display":"2026.02.12","title":"2월 12일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/714932","note":"시험의 탑 시즌 연장; 설 연휴 기간인 2월 19일(목)에는 업데이트 점검이 진행되지 않음에 따라 시험의 탑 시즌 17 일정이 일주일 연장됩니다.; 파티 던전 신규 시즌; 체력이 낮아질수록 더욱 빠르고 강력해지는 보스 몬스터 크라부스가 돌아옵니다.; 진행 일정; 이벤트 신규 글라이더","summary_items":["원문 전문","자유를 향한 검은 날개","2월 12일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","시험의 탑 시즌 진행 일자가 일주일 연장되며, 체력이 낮아질수록 더 강력해지는 보스 몬스터 ‘크라부스’가 출현하는 파티 던전의 신규 시즌이 시작됩니다.","링크캠프 서버에 칸델리움 대사막 지역의 난이도가 상향 조정되며, 특수 던전 ‘기억 속의 성소’가 오픈됩니다.","설 기념 이벤트 보상으로 획득할 수 있는 신규 글라이더 ‘붉은 말 방패연’이 추가되며, 킬데바트 및 혼돈의 킬데바트에서 자동 사냥이 좀 더 수월하도록 몬스터 배치가 개선됩니다."]},{"date_key":"2026-02-26","date_display":"2026.02.26","title":"2월 26일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/717486","note":"에픽 던전; 에픽 던전; 신규 전설 등급 기술서; 분열된 공명의 파편; 전설 보조 장비 핵심 제작 재료; 별의 영혼","summary_items":["원문 전문","자유를 향한 검은 날개","2월 26일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","에픽 던전 하르페논 성소 상위 난이도 지역 ‘서원의 신역’이 추가됩니다. 신규 지역에서는 매주 수요일 22시에 신규 네임드 몬스터 ‘케나탈’이 출현합니다.","캐릭터에 개성을 불어넣을 신규 의상 1종과 더불어 4차 각성을 완료한 캐릭터가 익힐 수 있는 전설 등급의 신규 지속 기술 1종이 추가됩니다.","시험의 탑 신규 시즌과 용맹 주화 신규 시즌이 시작됩니다."]},{"date_key":"2026-03-05","date_display":"2026.03.05","title":"3월 5일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/718730","note":"일부 클래스 기술 밸런스 조정; 마법봉 기술 효과 변경; 보주 기술 효과 변경; 쌍검 기술 효과 변경; 한손검 기술 효과 변경; 3/5 업데이트 이후 121층, 122층에서 획득 가능한 수집 아이템인 시험의 탑 증표 XVII(귀속)은 123층, 124층에서 획득한 시험의","summary_items":["원문 전문","자유를 향한 검은 날개","3월 5일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 마법봉, 보주, 쌍검, 한손검 클래스의 기술 밸런스 조정이 진행될 예정입니다.","더 자세한 업데이트 사항은 하단의 내용을 참고해주시기 바랍니다.","3월 5일(목) 패치노트"]},{"date_key":"2026-03-12","date_display":"2026.03.12","title":"3월 12일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/720271","note":"신규 탈것 추가; 신규 탈것 3종이 추가됩니다.; 신규 탈것 추가에 따라 보유 효과가 추가됩니다.; 신화 등급 개체 추가에 따라 불멸 탈것 유성의 바하무트 레벨이 4레벨로 확장됩니다.; 4레벨 추가 달성을 위해서는 아래 등급의 초월 개체가 필요합니다.; 유성의 바하무트가 4레벨 성장 시, 신수의 혼이 강화됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 12일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 영웅, 전설, 신화 등급의 신규 탈것 3종이 추가되며, 캐릭터에 적용되는 신규 능력치 2종이 추가됩니다 이와 더불어 에픽 던전 타르티스 감옥과 테네리스 해협에 변경 사항이 적용됩니다.","지난 나이트 크로우의 스물두 번째 서신에서 안내드린 것처럼, 금번 업데이트에서는 마을을 거치지 않고 격전지 메뉴 아이콘을 클릭해 이동하거나, 시험의 탑 다음 층 자동 입장, 일일 퀘스트 완료 자동화, 수호 정령 자동 진화 및 자동 교체 기능 추가 등의 다양한 편의성 업데이트가 제공될 예정입니다.","또한, 3월 20일(금)부터는 크루세이드 시즌 8이 진행될 예정이므로, 업데이트 이후부터 일주일 간 제공되는 서버 이전을 통해 보다 전략적인 선택을 준비해주시면 감사하겠습니다."]},{"date_key":"2026-03-19","date_display":"2026.03.19","title":"3월 19일(목) 패치노트 (3/19 15:41 추가)","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/721785","note":"크루세이드 시즌 8; 크루세이드 신규 시즌이 시작됩니다.; 진행 일정; 크루세이드 보상이 다음과 같이 변경됩니다.; 길드 전장 신규 시즌(S13); 길드 단위의 대결을 펼치는 경쟁 콘텐츠 길드 전장의 열세 번째 시즌이 시작됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 19일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 지난 공지에서 안내드린 것처럼 크루세이드 시즌 8이 진행됩니다. 기존 시즌과는 다르게 영지 보상 및 참여 보상이 리뉴얼됩니다.","길드 전장 시즌 13이 시작되며, NPC 상점 내 일일 구매 제한 상품이 주간 구매 제한 상품으로 변경됩니다.","또한, 마일리지 상점에서 판매하는 상품이 리뉴얼되며, 테네리스 해협의 입장 시간이 변경됩니다."]},{"date_key":"2026-03-26","date_display":"2026.03.26","title":"3월 26일(목) 패치노트","type":"update","year":2026,"quarter":1,"impact":"중","source_url":"https://www.nightcrows.co.kr/news/release/723461","note":"상급 특성 추가; 일부 기술의 상급 기술 특성이 추가됩니다.; 비급서 사용 제한 확장; 일반 및 상급 특성 비급서의 최대 사용 가능 개수가 확장됩니다.; 신규 지속 기술 추가; 길드 상인 NPC가 판매하는 전설 클래스 공통 신규 지속 기술이 추가됩니다.","summary_items":["원문 전문","자유를 향한 검은 날개","3월 26일(목) 업데이트 이후 적용되는 사항들을 안내드립니다.","이번 업데이트에서는 일부 기술에서의 상급 기술 특성이 추가되며, 일반 및 상급 특성 비급서의 최대 사용 개수가 확장됩니다.","길드 상인 NPC가 판매하는 전설 클래스의 공통 신규 지속 기술이 추가되며, 골동품 수집 11종 추가와 더불어 상인 NPC가 판매하는 물품이 리뉴얼됩니다.","상태 이상 및 약화 효과 적중, 저항 효과를 제공하는 신규 소모품이 추가됩니다."]},{"date_key":"2026-04-02","date_display":"2026.04.02","title":"4월 2일(목) 패치노트","type":"update","year":2026,"quarter":2,"im
