</head><body><div class="app"><div class="toolbar" id="controls"></div><div class="minimap-section"><div class="minimap-wrap" id="minimapWrap"><div class="minimap-bars" id="minimapBars"></div><div class="minimap-window" id="minimapWindow"></div><div class="minimap-empty" id="minimapEmpty" style="display:none">표시할 패치노트가 없습니다</div></div></div><div class="content no-side" id="content"><div class="timeline-wrap" id="viewport"><div class="timeline" id="timeline"></div></div><aside class="side" id="side"></aside></div></div><div class="floating-year" id="floatingYear"></div><script>let DATA = [];
let TOTAL_EVENTS = 0;
const GAME_NAME_MAP = {
  'NightCrows_KR':'나크',
  'NightCrows_Global':'나크글로벌',
  'Odin_KR':'오딘',
  'MIR4_Global':'미르4글로벌',
  'MIR4_KR':'미르4'
};
const GAME_RELEASE_MAP = {
  '나크글로벌':'2024-03-12',
  '나크':'2023-04-27',
  '오딘':'2021-06-29',
  '미르4글로벌':'2021-08-26',
  '미르4':'2020-11-25'
};
const GAME_ORDER = ['나크글로벌','나크','오딘','미르4글로벌','미르4'];
function splitLinesForTimeline(v){
  if(v == null) return [];
  if(Array.isArray(v)) return v.map(x => typeof x === 'string' ? x : textOf(x)).map(x => String(x || '').trim()).filter(Boolean);
  const s = String(v || '').replaceAll(String.fromCharCode(13), '');
  return s.split(String.fromCharCode(10)).map(x => x.trim()).filter(Boolean);
}
function shortDateDisplay(dateKey){
  const s = String(dateKey || '');
  if(s.length === 10) return s.slice(2,4)+'.'+s.slice(5,7)+'.'+s.slice(8,10);
  return s;
}
function quarterOf(dateKey){
  const m = Number(String(dateKey || '').slice(5,7));
  return Math.floor((Math.max(1,m)-1)/3)+1;
}
function deriveDomainTagsFromBody(lines){
  const seen = new Set();
  const out = [];
  for(const line of splitLinesForTimeline(lines)){
    const domain = String(line).split(':')[0].trim();
    if(domain && domain.length <= 24 && !seen.has(domain)){
      seen.add(domain);
      out.push(domain);
    }
  }
  return out.slice(0,12);
}


function normalizeHighlightSentenceCandidates(e){
  return asArray(e && e.highlight_sentence_candidates)
    .filter(x=>x && typeof x==='object' && textOf(x.text || x.sentence))
    .map(x=>({
      ...x,
      text: textOf(x.text || x.sentence),
      sentence: textOf(x.sentence || x.text),
      highlight_reason: textOf(x.highlight_reason || x.reason || x.rule_id),
      confidence: x.confidence
    }));
}
function normalizeFlatItem(item){
  const date = item.actual_date || '';
  const gameKey = item.game || 'Unknown';
  const gameName = GAME_NAME_MAP[String(gameKey).trim()] || String(gameKey || 'Unknown').trim();
  const body = item.body_summary || '';
  const domainTags = item.domain_tags || [];
  const patchCategory = item.patch_category || [];

  const decision = item.importance_decision || 'normal';
  return {
    date_key: date,
    title: item.title || (shortDateDisplay(date)+' | 패치노트'),
    type: 'update',
    year: Number(String(date).slice(0,4)) || null,
    quarter: quarterOf(date),
    impact: '패치노트',
    source_url: item.source_url || '',
    html_visible: true,
    patch_category: splitLinesForTimeline(patchCategory),
    domain_tags: splitLinesForTimeline(domainTags),
    detected_sections_for_general: [],
    game: gameName,
    body_summary: splitLinesForTimeline(body),
    highlight_sentence_candidates: Array.isArray(item.highlight_sentence_candidates) ? item.highlight_sentence_candidates : [],
    importance_decision: String(decision || 'normal').toLowerCase()
  };
}
function normalizeTimelinePayload(payload){
  const items = Array.isArray(payload)
    ? payload
    : (payload && Array.isArray(payload.items)
      ? payload.items
      : (payload && Array.isArray(payload.records) ? payload.records : []));
  if(!items.length) return [];
  if(items[0] && Array.isArray(items[0].events)) return items;
  const groups = new Map();
  for(const item of items){
    const ev = normalizeFlatItem(item);
    if(ev.html_visible === false || !ev.date_key) continue;
    if(!groups.has(ev.game)){
      const release = GAME_RELEASE_MAP[ev.game] || '';
      const events = [];
      if(release){
        events.push({date_key: release, title: '출시', type: 'release', year: Number(release.slice(0,4)), quarter: quarterOf(release), impact:'', source_url:'', game: ev.game, domain_tags:[], patch_category:[]});
      }
      groups.set(ev.game, {name: ev.game, release, release_display: shortDateDisplay(release), events});
    }
    groups.get(ev.game).events.push(ev);
  }
  const arr = Array.from(groups.values());
  arr.sort((a,b)=>{
    const ia = GAME_ORDER.indexOf(a.name); const ib = GAME_ORDER.indexOf(b.name);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib) || a.name.localeCompare(b.name);
  });
  for(const g of arr){g.events.sort((a,b)=>String(a.date_key).localeCompare(String(b.date_key)) || String(a.title).localeCompare(String(b.title)));}
  return arr;
}
async function loadDataJson(){
  const response = await fetch('patch_view_model.json', {cache:'no-store'});
  if(!response.ok) throw new Error('patch_view_model.json load failed: '+response.status);
  const payload = await response.json();
  DATA = normalizeTimelinePayload(payload).filter(g => Array.isArray(g.events));
  TOTAL_EVENTS = DATA.reduce((n,g)=>n + g.events.length, 0);
  if(!DATA.length || !TOTAL_EVENTS) throw new Error('patch_view_model.json contains no timeline events');
}

const $ = id => document.getElementById(id);

const ALL_GAMES='전체 게임';
const ALL_YEARS='전체';
const ALL_CATEGORIES='전체';
const state = {q:'', games:new Set([ALL_GAMES]), year:ALL_YEARS, categories:new Set([ALL_CATEGORIES])};
function ym(date){return String(date||'').slice(0,7)}
function y(date){return String(date||'').slice(0,4)}
function formatShortDate(dateKey){const s=String(dateKey||''); if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s.slice(2,4)+'.'+s.slice(5,7)+'.'+s.slice(8,10); return s;}
function asArray(v){ if(!v) return []; if(Array.isArray(v)) return v; return [v]; }
function textOf(v){ if(v==null) return ''; if(typeof v==='string') return v; if(typeof v==='object') return v.source_line || v.source || v.line || v.item_name || v.name || JSON.stringify(v); return String(v); }
function cleanBullet(s){return String(s||'').replace(/^\s*[-•]\s*/,'').replace(/^\s*\d+[.)]\s*/,'').trim();}

function getHighlightCandidates(e){
  const decision=String((e&&e.importance_decision)||'normal').toLowerCase();
  if(decision!=='major'){
    return [];
  }
  const candidates=normalizeHighlightSentenceCandidates(e||{});
  if(e){
    e.highlight_sentence_candidates=candidates;
    e.importance_decision='major';
  }
  return candidates;
}
function isMajor(e){
  return String((e&&e.importance_decision)||'normal').toLowerCase()==='major';
}
function cardSummary(e){
  if(isMajor(e)){
    const groups=getHighlightCandidates(e);
    if(groups.length){
      const labels=groups.map(g=>{
        const txt=cleanBullet(textOf(g.text||g.sentence));
        return txt.includes(':') ? txt.split(':',1)[0].trim() : txt.slice(0,30).trim();
      }).filter(Boolean);
      if(labels.length) return labels.slice(0,3).join(' · ')+(labels.length>3?` · +${labels.length-3}`:'');
    }
    const fallback=asArray(e.patch_category).map(textOf).filter(Boolean);
    return fallback.slice(0,3).join(' · ')+(fallback.length>3?` · +${fallback.length-3}`:'');
  }
  return asArray(e.domain_tags).map(textOf).filter(Boolean).slice(0,4).join(' · ');
}
function hasAll(set, allValue){return set.has(allValue)}
function selectedContains(set, value){return set.has(value)}
function categoryMatch(e){return hasAll(state.categories,ALL_CATEGORIES) || asArray(e.patch_category).some(s=>state.categories.has(s));}
function gameMatch(g){return hasAll(state.games,ALL_GAMES) || state.games.has(g.name);}
function matchEvent(e,g){
  if(e.html_visible===false) return false;
  if(!gameMatch(g)) return false;
  if(state.year!==ALL_YEARS && y(e.date_key)!==state.year) return false;
  if(!categoryMatch(e)) return false;
  const q=state.q.trim().toLowerCase();
  if(q){
    const hay=[g.name,e.title,formatShortDate(e.date_key),...asArray(e.domain_tags),...asArray(e.body_summary),...asArray(e.patch_category)].map(textOf).join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}
function allMonths(){let dates=[]; DATA.forEach(g=>g.events.forEach(e=>{if(e.date_key) dates.push(e.date_key)})); let min=new Date(Math.min(...dates.map(d=>new Date(d+'T00:00:00')))); let max=new Date(Math.max(...dates.map(d=>new Date(d+'T00:00:00')))); let cur=new Date(min.getFullYear(),min.getMonth(),1); let end=new Date(max.getFullYear(),max.getMonth(),1); let months=[]; while(cur<=end){months.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`); cur.setMonth(cur.getMonth()+1);} return months;}
let MONTHS = [];
let GAME_BY_NAME = {};
function refreshDerivedData(){
  MONTHS = allMonths();
  document.documentElement.style.setProperty('--months', MONTHS.length);
  GAME_BY_NAME = Object.fromEntries(DATA.map(g=>[g.name,g]));
}
const PATCH_CATEGORY_ORDER=['대형 콘텐츠','클래스/직업','서버/월드','신규 성장축','성장 시스템 확장','경제/거래 구조 변화'];
function availableCategories(){const set=new Set(); DATA.forEach(g=>g.events.forEach(e=>asArray(e.patch_category).forEach(s=>{if(s) set.add(s)}))); return [ALL_CATEGORIES,...PATCH_CATEGORY_ORDER.filter(s=>set.has(s)),...Array.from(set).filter(s=>!PATCH_CATEGORY_ORDER.includes(s)).sort()];}
function renderControls(){
  const games=[ALL_GAMES,...DATA.map(g=>g.name)];
  const years=[ALL_YEARS,...new Set(MONTHS.map(m=>m.slice(0,4)))];
  const categories=availableCategories();
  const ctl=$('controls');
  ctl.innerHTML=`<input class="search" id="search" placeholder="출시일·패치노트·본문 요약 검색..." value="${state.q.replaceAll('"','&quot;')}">`+ group(games,'games','game')+ group(years,'year','')+ `<span class="group-label">패치 카테고리</span>`+group(categories,'categories','');
  $('search').addEventListener('input',e=>{state.q=e.target.value; clearDetail(); renderTimeline();});
  ctl.querySelectorAll('[data-kind]').forEach(b=>b.onclick=()=>{handleFilterClick(b.dataset.kind,b.dataset.value); updateControlsActive(); clearDetail(); renderTimeline();});
}
function handleFilterClick(kind,value){
  if(kind==='games') return toggleMulti(state.games,value,ALL_GAMES);
  if(kind==='categories') return toggleMulti(state.categories,value,ALL_CATEGORIES);
  state[kind]=value;
}
function toggleMulti(set,value,allValue){
  if(value===allValue){set.clear(); set.add(allValue); return;}
  if(set.has(allValue)) set.clear();
  if(set.has(value)) set.delete(value); else set.add(value);
  if(set.size===0) set.add(allValue);
}
function isFilterActive(kind,value){
  if(kind==='games') return selectedContains(state.games,value);
  if(kind==='categories') return selectedContains(state.categories,value);
  return state[kind]===value;
}
function updateControlsActive(){document.querySelectorAll('[data-kind]').forEach(b=>{b.classList.toggle('active', isFilterActive(b.dataset.kind,b.dataset.value));});}
function clearDetail(){const side=$('side'); if(side) side.innerHTML=''; const content=$('content'); if(content) content.classList.add('no-side'); document.querySelectorAll('.event-card.selected').forEach(c=>c.classList.remove('selected'));}
function openDetail(){const content=$('content'); if(content) content.classList.remove('no-side');}
function group(values,kind,extra){return `<span class="group">${values.map(v=>`<button class="pill ${extra} ${isFilterActive(kind,v)?'active':''}" data-kind="${kind}" data-value="${v}">${v}</button>`).join('')}</span>`}
function render(){ renderControls(); renderTimeline(); attachViewportListeners(); }
function filteredEvents(){const out=[]; DATA.forEach(g=>g.events.forEach(e=>{if(matchEvent(e,g)) out.push({g,e});})); return out;}
function renderTimeline(){
  const root=$('timeline');
  let html=`<div class="month-header"><div class="corner">게임명</div>${MONTHS.map((m,i)=>`<div class="month">${Number(m.slice(5))}월</div>`).join('')}</div>`;
  let visibleCount=0;
  for(const g of DATA){
    if(!gameMatch(g)) continue;
    let byMonth={};
    for(let idx=0; idx<g.events.length; idx++){const e=g.events[idx]; if(matchEvent(e,g)){ (byMonth[ym(e.date_key)] ||= []).push({e,idx}); visibleCount++; }}
    html+=`<div class="game-row"><div class="game-label"><div class="game-name">${g.name}</div><div class="release">출시일 ${g.release_display||''}</div></div>`;
    for(const m of MONTHS){ const es=(byMonth[m]||[]).sort((a,b)=>String(a.e.date_key).localeCompare(String(b.e.date_key))); html+=`<div class="cell">${es.map(({e,idx})=>cardHtml(e,g,idx)).join('')}</div>`; }
    html+=`</div>`;
  }
  if(!visibleCount) html+=`<div class="no-results">조건에 맞는 항목이 없습니다.</div>`;
  root.innerHTML=html;
  const counter=$('counter'); if(counter) counter.textContent=`표시 ${visibleCount}건 / 전체 ${TOTAL_EVENTS}건`;
  root.querySelectorAll('.event-card').forEach(c=>c.onclick=(ev)=>{ev.stopPropagation(); root.querySelectorAll('.event-card.selected').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); showDetail(c.dataset.game,c.dataset.idx);});
  renderMinimap();
  updateMinimapViewport();
  updateFloatingYear();
}
function monthCounts(){const counts=Object.fromEntries(MONTHS.map(m=>[m,0])); filteredEvents().forEach(({e})=>{const m=ym(e.date_key); if(m in counts) counts[m]++;}); return counts;}
function scrollToMonth(month){const idx=MONTHS.indexOf(month); if(idx<0) return; const viewport=$('viewport'); const cellW=getMonthCellWidth(); const labelW=getLabelWidth(); viewport.scrollTo({left:Math.max(0,labelW+idx*cellW-40), behavior:'smooth'});}
function getMonthCellWidth(){const m=document.querySelector('.month'); return m?m.getBoundingClientRect().width:230;}
function getLabelWidth(){const c=document.querySelector('.corner'); return c?c.getBoundingClientRect().width:180;}
function renderMinimap(){
  const bars=$('minimapBars'); if(!bars) return;
  const counts=monthCounts(); const max=Math.max(1,...Object.values(counts)); const curYear=state.year;
  bars.innerHTML=MONTHS.map((m,i)=>{const c=counts[m]||0; const h=Math.max(8, Math.round((c/max)*100)); const cls=[c?'':'empty', m.endsWith('-01')?'year-start':'', (curYear!=='전체'&&m.startsWith(curYear))?'active-year':''].join(' '); return `<div class="mbar ${cls}" title="${m} · ${c}건" data-month="${m}" style="height:${c? h:8}%"></div>`;}).join('');
  bars.querySelectorAll('.mbar').forEach(b=>b.onclick=()=>scrollToMonth(b.dataset.month));
  const empty=$('minimapEmpty'); if(empty) empty.style.display=Object.values(counts).some(v=>v>0)?'none':'flex';
}
function updateMinimapViewport(){
  const viewport=$('viewport'), win=$('minimapWindow'), wrap=$('minimapWrap');
  if(!viewport||!win||!wrap) return;
  const maxScroll=Math.max(1, viewport.scrollWidth-viewport.clientWidth);
  const ratio=viewport.scrollLeft/maxScroll;
  const widthRatio=Math.min(1, viewport.clientWidth/Math.max(1,viewport.scrollWidth));
  const innerW=wrap.clientWidth;
  const w=Math.max(28, innerW*widthRatio);
  const left=Math.max(0, Math.min(innerW-w, ratio*(innerW-w)));
  win.style.width=w+'px'; win.style.left=left+'px';
}
function updateFloatingYear(){
  const viewport=$('viewport'), fy=$('floatingYear');
  if(!viewport||!fy||!MONTHS.length) return;
  const rect=viewport.getBoundingClientRect();
  if(rect.width<=0||rect.height<=0){fy.style.display='none';return;}
  const labelW=getLabelWidth(); const cellW=getMonthCellWidth();
  let idx=Math.floor(Math.max(0, viewport.scrollLeft-labelW)/Math.max(1,cellW));
  idx=Math.max(0, Math.min(MONTHS.length-1, idx));
  fy.textContent=MONTHS[idx].slice(0,4);
  fy.style.left=(rect.left+labelW+12)+'px';
  fy.style.top=(rect.top+11)+'px';
  fy.style.display='block';
}
function attachViewportListeners(){const viewport=$('viewport'); if(viewport&&!viewport.dataset.minimapBound){const sync=()=>{updateMinimapViewport(); updateFloatingYear();}; viewport.addEventListener('scroll',sync,{passive:true}); viewport.addEventListener('click',e=>{if(!e.target.closest('.event-card')) clearDetail();}); window.addEventListener('resize',sync); viewport.dataset.minimapBound='1';}}
function cardSummaryHtml(e){
  const major=isMajor(e);
  const bodyItems=asArray(e.body_summary).map(textOf).map(cleanBullet).filter(Boolean);
  if(bodyItems.length){
    const limit=major ? 4 : 3;
    const shown=bodyItems.slice(0,limit);
    const extra=Math.max(0,bodyItems.length-shown.length);
    const lines=shown.map((s,i)=>`<span class="summary-line">${major&&i===0?'<span class="major-badge in-summary">주요</span> ':''}${escapeHtml(s)}</span>`).join('');
    const more=extra?`<span class="body-summary-more">+${extra}개 더 보기</span>`:'';
    return `<div class="summary body-summary-card ${major?'major-text':''}">${lines}${more}</div>`;
  }
  const sum=cardSummary(e);
  return sum?`<div class="summary">${escapeHtml(sum)}</div>`:'';
}
function cardHtml(e,g,idx){ const major=isMajor(e); const rel=e.type==='release'; const hasBody=asArray(e.body_summary).length>0; return `<div class="event-card ${major?'major':''} ${rel?'release-card':''} ${hasBody?'has-body':''}" data-game="${g.name}" data-idx="${idx}"><div class="title-line"><span class="dot"></span><span class="date-title">${escapeHtml(e.title||'')}</span></div> ${cardSummaryHtml(e)}</div>`; }
function displayBodyItems(e){
  const bodyItems=asArray(e.body_summary).map(textOf).map(cleanBullet).filter(Boolean);
  const groups=getHighlightCandidates(e);
  if(!groups.length) return bodyItems.map(text=>({text, major:false}));
  const candidateIndices=new Set();
  const candidateTexts=new Set();
  groups.forEach(g=>{
    if(g.unit_index!==undefined && g.unit_index!==null) candidateIndices.add(Number(g.unit_index));
    asArray(g.source_unit_indices).forEach(i=>candidateIndices.add(Number(i)));
    const t=cleanBullet(textOf(g.text||g.sentence));
    if(t) candidateTexts.add(t);
  });
  return bodyItems.map((line,idx)=>({
    text: line,
    major: candidateIndices.has(idx) || candidateTexts.has(line)
  }));
}
function box(title,items,extra=''){
  const normalized=items.map(i=> typeof i==='object' ? i : {text:String(i||''), major:false}).filter(i=>i.text);
  return `<div class="box ${extra}"><h3>${escapeHtml(title)}</h3><ul>${normalized.map(i=>`<li class="${extra==='primary'&&i.major?'highlight-summary-line':''}">${escapeHtml(i.text)}</li>`).join('')}</ul></div>`
}
function showDetail(game,idx){
  openDetail();
  const g=GAME_BY_NAME[game], e=g.events[Number(idx)]; const major=isMajor(e);
  const bodyItems=displayBodyItems(e);
  const tagItems = asArray(e.domain_tags).map(textOf).filter(Boolean);
  let html=`<div class="side-sub">선택 항목</div>${major?'<span class="tag">주요</span>':''}<div class="side-sub">${escapeHtml(g.name)}</div><div class="side-title">${escapeHtml(e.title||'')}</div>`;
  if(e.source_url) html+=`<a class="source-btn v038-source-link-under-title" href="${escapeAttr(e.source_url)}" target="_blank">원문 패치노트 열기</a>`;
  if(bodyItems.length) html+=box('본문 요약', bodyItems, 'primary');
  if(tagItems.length) html+=box('관련 영역', tagItems);
  $('side').innerHTML=html;
}
function escapeHtml(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}
async function startApp(){
  try{
    await loadDataJson();
    refreshDerivedData();
    render();
  }catch(err){
    console.error(err);
    const root = document.getElementById('timeline');
    if(root) root.innerHTML = '<div style="padding:24px;color:#b91c1c;font-weight:700">patch_view_model.json 로드 실패: '+String(err && err.message ? err.message : err)+'</div>';
  }
}
startApp();
</script></body></html>
