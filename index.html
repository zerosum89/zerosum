/* ─── CONSTANTS ─── */
const GAME_COLORS = {
  "미르4": "#c2410c",
  "MIR4 Global": "#475569",
  "나이트 크로우": "#be185d"
};

const START   = new Date("2020-01-01T00:00:00+09:00");
const END     = new Date("2026-12-31T23:59:59+09:00");
const TODAY   = new Date("2026-05-21T00:00:00+09:00");
const TOTAL   = END - START;
const YEARS   = [2020,2021,2022,2023,2024,2025,2026];
const BASE_W  = 10800;
const CARD_W  = 220;
const CARD_GAP= 16;
const MIN_DIST= CARD_W + CARD_GAP;
const LANE_H  = 76;
const ROW_TOP = 40;
const ROW_BOT = 18;

/* ─── STATE ─── */
let timelineW  = BASE_W;
let activeGames = new Set(games.map(g => g.name));
let activeType  = "all";
let activeImpacts = null; // null = 전체, Set = 선택 영향도 복수 필터
let searchQ     = "";
let selNode     = null;

/* ─── HELPERS ─── */
function dx(dateStr) {
  return ((new Date(dateStr + "T00:00:00+09:00") - START) / TOTAL) * timelineW;
}
function todayX() { return ((TODAY - START) / TOTAL) * timelineW; }

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escRe(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
function highlightEscaped(raw) {
  let s = esc(raw);
  if (!searchQ) return s;
  const q = esc(searchQ);
  if (!q) return s;
  return s.replace(new RegExp(escRe(q), "gi"), m => `<mark class="hit">${m}</mark>`);
}
function md(raw) {
  let s = highlightEscaped(raw);
  s = s.replace(/`([^`]+)`/g,"<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/__([^_]+)__/g,"<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g,"<em>$1</em>");
  s = s.replace(/_([^_]+)_/g,"<em>$1</em>");
  return s;
}
function hl(raw) {
  return highlightEscaped(raw);
}

function quarterBounds(ev) {
  const startMonth = (ev.quarter - 1) * 3 + 1;
  const qStart = dx(`${ev.year}-${String(startMonth).padStart(2,"0")}-01`);
  let endYear = ev.year;
  let endMonth = startMonth + 3;
  if (endMonth > 12) { endMonth -= 12; endYear += 1; }
  const qEnd = dx(`${endYear}-${String(endMonth).padStart(2,"0")}-01`);
  return { qStart, qEnd };
}
function preferredCardX(ev) {
  const anchorX = dx(ev.date_key);
  const { qStart, qEnd } = quarterBounds(ev);
  const pad = 12;
  const minC = qStart + CARD_W / 2 + pad;
  const maxC = qEnd - CARD_W / 2 - pad;
  const cardX = maxC >= minC ? Math.min(Math.max(anchorX, minC), maxC) : anchorX;
  return { anchorX, cardX };
}
function assignLanes(events) {
  const grouped = new Map();
  events.forEach((ev, i) => {
    const k = `${ev.year}-${ev.quarter}`;
    if (!grouped.has(k)) grouped.set(k, []);
    const pos = preferredCardX(ev);
    grouped.get(k).push({...ev, _i: i, _anchorX: pos.anchorX, _cardX: pos.cardX});
  });
  const byIdx = {}; let maxLane = 1;
  grouped.forEach(grp => {
    const sorted = grp.sort((a,b) => a._cardX - b._cardX || a._anchorX - b._anchorX);
    const ends = [];
    sorted.forEach(ev => {
      let lane = 0;
      while (lane < ends.length && ev._cardX - ends[lane] < MIN_DIST) lane++;
      if (lane === ends.length) ends.push(ev._cardX); else ends[lane] = ev._cardX;
      ev._lane = lane; byIdx[ev._i] = ev;
    });
    maxLane = Math.max(maxLane, ends.length);
  });
  return { maxLane, byIdx };
}

/* ─── RENDER: YEAR HEADER ─── */
function renderYearHeader() {
  const el = document.getElementById("yrHeader");
  el.innerHTML = "";
  YEARS.forEach(yr => {
    const yt = document.createElement("div");
    yt.className = "yr-tick";
    yt.style.left = dx(`${yr}-01-01`) + "px";
    yt.textContent = yr;
    el.appendChild(yt);
    [1,2,3,4].forEach(q => {
      const cm = (q-1)*3+2;
      const ql = document.createElement("div");
      ql.className = "q-lbl";
      ql.style.left = dx(`${yr}-${String(cm).padStart(2,"0")}-15`) + "px";
      ql.textContent = `${q}Q`;
      el.appendChild(ql);
    });
  });
  // Today line + label in header
  const tx = todayX();
  const tl = document.createElement("div");
  tl.className = "today-hdr"; tl.style.left = tx + "px";
  el.appendChild(tl);
  const tll = document.createElement("div");
  tll.className = "today-hdr-lbl"; tll.style.left = tx + "px";
  tll.textContent = "기준일";
  el.appendChild(tll);
}

/* ─── RENDER: DETAIL PANEL ─── */
function renderDetail(game, event, color) {
  const isRelease = event.type === "release";

  const summaryHtml = !isRelease && Array.isArray(event.summary_items) && event.summary_items.length
    ? `
      <div class="d-section">
        <div class="d-section-title">주요 업데이트</div>
        <ul class="d-summary-list">
          ${event.summary_items.map(item => `<li>${md(item)}</li>`).join("")}
        </ul>
      </div>
    `
    : "";

  const impactHtml = !isRelease && event.impact
    ? `
      <div class="d-stats">
        <div class="d-stat">
          <span class="d-stat-lbl">영향도</span>
          <span class="d-stat-val">${esc(event.impact)}</span>
        </div>
      </div>
    `
    : "";

  const noteHtml = !isRelease && event.note
    ? `
      <div class="d-section">
        <div class="d-section-title">주요 변경사항 메모</div>
        <div class="d-note">${md(event.note)}</div>
      </div>
    `
    : "";

  const releaseHtml = isRelease
    ? `
      <div class="d-section">
        <div class="d-section-title">출시 기준점</div>
        <div class="d-note">해당 게임의 정식 출시 시점입니다.</div>
      </div>
    `
    : "";

  const sourceHtml = !isRelease && event.source_url
    ? `
      <a class="d-link" href="${esc(event.source_url)}" target="_blank" rel="noopener noreferrer">
        원문 패치노트 열기
      </a>
    `
    : "";

  document.getElementById("detail").innerHTML = `
    <div class="d-badge" style="border-color:${color};color:${color}">${isRelease ? "출시일" : "패치노트"}</div>
    <div class="d-game" style="color:${color}">◉ ${esc(game.name)}</div>
    <div class="d-title">${md(event.title)}</div>
    <div class="d-date">${hl(event.date_display)}</div>
    ${impactHtml}
    ${summaryHtml}
    ${noteHtml}
    ${releaseHtml}
    ${sourceHtml}
  `;
}

/* ─── RENDER: ROWS ─── */
function renderRows() {
  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = ""; selNode = null;
  let anyRow = false;

  games.forEach(game => {
    if (!activeGames.has(game.name)) return;
    const color = GAME_COLORS[game.name] || "#475569";

    const filtered = game.events.filter(ev => {
      if (activeType !== "all" && ev.type !== activeType) return false;
      if (ev.type !== "release" && activeImpacts && !activeImpacts.has(ev.impact)) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return ev.title.toLowerCase().includes(q) || ev.date_display.includes(q);
      }
      return true;
    });
    if (filtered.length === 0) return;
    anyRow = true;

    const { maxLane, byIdx } = assignLanes(filtered);
    const rowH = ROW_TOP + maxLane * LANE_H + ROW_BOT;

    const row = document.createElement("div");
    row.className = "row"; row.style.height = rowH + "px";

    // Label
    const label = document.createElement("div");
    label.className = "game-label";

    const strip = document.createElement("div");
    strip.className = "game-strip"; strip.style.background = color;
    label.appendChild(strip);

    const rCnt = filtered.filter(e => e.type === "release").length;
    const uCnt = filtered.filter(e => e.type === "update").length;

    const nameEl = document.createElement("div");
    nameEl.className = "game-name"; nameEl.textContent = game.name;
    label.appendChild(nameEl);

    const dtEl = document.createElement("div");
    dtEl.className = "game-rdt"; dtEl.textContent = `출시일 ${game.release_display}`;
    label.appendChild(dtEl);

    const badges = document.createElement("div");
    badges.className = "game-badges";
    if (rCnt > 0) {
      const rb = document.createElement("span");
      rb.className = "cbadge";
      rb.style.cssText = `background:${color}18;color:${color}`;
      rb.textContent = `출시 ${rCnt}`;
      badges.appendChild(rb);
    }
    if (uCnt > 0) {
      const ub = document.createElement("span");
      ub.className = "cbadge";
      ub.style.cssText = "background:#f1f5f9;color:#64748b";
      ub.textContent = `업 ${uCnt}건`;
      badges.appendChild(ub);
    }
    label.appendChild(badges);
    row.appendChild(label);

    // Track
    const track = document.createElement("div");
    track.className = "track";
    track.appendChild(Object.assign(document.createElement("div"), {className:"row-line"}));

    YEARS.forEach(yr => {
      const gy = document.createElement("div");
      gy.className = "gl-yr"; gy.style.left = dx(`${yr}-01-01`) + "px";
      track.appendChild(gy);
      [4,7,10].forEach(m => {
        const gq = document.createElement("div");
        gq.className = "gl-q";
        gq.style.left = dx(`${yr}-${String(m).padStart(2,"0")}-01`) + "px";
        track.appendChild(gq);
      });
    });

    // Today line in row
    const trow = document.createElement("div");
    trow.className = "today-row"; trow.style.left = todayX() + "px";
    track.appendChild(trow);

    // Events
    filtered.forEach((event, ei) => {
      const asgn = byIdx[ei];
      if (!asgn) return;

      const evEl = document.createElement("div");
      evEl.className = "ev " + event.type;
      evEl.style.left = asgn._cardX + "px";
      evEl.style.top  = (ROW_TOP + asgn._lane * LANE_H) + "px";

      const bdrColor  = event.type === "release" ? color : "#e2e8f0";
      const dotColor  = event.type === "release" ? color : color + "99";
      const shadowClr = color + "26";

      const anchor = document.createElement("div");
      anchor.className = "ev-anchor";
      anchor.style.left = asgn._anchorX + "px";
      anchor.style.background = dotColor;
      track.appendChild(anchor);

      const cardTop = ROW_TOP + asgn._lane * LANE_H;
      const linkTop = 19;
      const x1 = asgn._anchorX;
      const x2 = asgn._cardX;
      const leftX = Math.min(x1, x2);
      const linkW = Math.max(1, Math.abs(x2 - x1));
      const linkH = Math.max(1, cardTop - linkTop);
      const link = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      link.setAttribute("class", "ev-link");
      link.style.left = leftX + "px";
      link.style.top = linkTop + "px";
      link.setAttribute("width", linkW);
      link.setAttribute("height", linkH);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1 - leftX);
      line.setAttribute("y1", "0");
      line.setAttribute("x2", x2 - leftX);
      line.setAttribute("y2", linkH);
      line.setAttribute("stroke", dotColor);
      link.appendChild(line);
      track.appendChild(link);

      evEl.innerHTML = `
        <div class="ev-card" style="border-color:${bdrColor}${event.type==='release'?`;box-shadow:0 1px 6px ${shadowClr}`:''}">
          <div class="ev-dot" style="background:${dotColor}"></div>
          <div class="ev-date">${hl(event.date_display)}</div>
          <div class="ev-title">${md(event.title)}</div>
        </div>`;

      evEl.addEventListener("click", () => {
        document.querySelectorAll(".ev.selected").forEach(e => e.classList.remove("selected"));
        evEl.classList.add("selected");
        selNode = evEl;
        renderDetail(game, event, color);
        if (window.matchMedia("(max-width: 860px)").matches) {
          requestAnimationFrame(() => {
            const detailCard = document.querySelector(".detail-card");
            if (detailCard) detailCard.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }
      });
      track.appendChild(evEl);

      if (!selNode) {
        evEl.classList.add("selected");
        selNode = evEl;
        renderDetail(game, event, color);
      }
    });

    row.appendChild(track);
    rowsEl.appendChild(row);
  });

  if (!anyRow) {
    const nr = document.createElement("div");
    nr.className = "no-results";
    nr.textContent = "🔍 검색 결과가 없습니다.";
    rowsEl.appendChild(nr);
    document.getElementById("detail").innerHTML = '<div class="d-placeholder">카드를 클릭하여<br>상세 정보를 확인하세요</div>';
  }
}

/* ─── RENDER: MINIMAP ─── */
function renderMinimap() {
  const barsEl = document.getElementById("minimapBars");
  barsEl.innerHTML = "";

  const quarters = [];
  YEARS.forEach(yr => {
    for (let q = 1; q <= 4; q++) quarters.push({yr, q});
  });

  const counts = quarters.map(({yr, q}) => {
    let c = 0;
    games.forEach(g => {
      if (!activeGames.has(g.name)) return;
      g.events.forEach(ev => {
        if (activeType !== "all" && ev.type !== activeType) return;
        if (ev.type !== "release" && activeImpacts && !activeImpacts.has(ev.impact)) return;
        if (ev.year !== yr || ev.quarter !== q) return;
        if (searchQ && !(ev.title.toLowerCase().includes(searchQ.toLowerCase()) || ev.date_display.includes(searchQ))) return;
        c++;
      });
    });
    return c;
  });

  const maxC = Math.max(...counts, 1);

  quarters.forEach(({yr, q}, i) => {
    const bar = document.createElement("div");
    bar.className = "mbar" + (q === 1 ? " yr-start" : "");
    const hPct = Math.max(3, (counts[i] / maxC) * 100);
    bar.style.height = hPct + "%";
    const intensity = counts[i] / maxC;
    // Gradient from slate-blue (low) to indigo (medium) to violet (high)
    const h = Math.round(240 - intensity * 50);
    const s = Math.round(40 + intensity * 50);
    const l = Math.round(72 - intensity * 32);
    bar.style.background = `hsl(${h},${s}%,${l}%)`;
    bar.title = `${yr} Q${q}: ${counts[i]}건`;
    bar.addEventListener("click", () => {
      const month = String((q - 1) * 3 + 1).padStart(2, "0");
      const targetX = dx(`${yr}-${month}-01`);
      document.getElementById("viewport").scrollTo({left: Math.max(0, targetX - 40), behavior: "smooth"});
    });
    barsEl.appendChild(bar);
  });

  // Today marker
  const todayFrac = (TODAY - START) / TOTAL;
  document.getElementById("minimapTodayLine").style.left = (todayFrac * 100) + "%";
  document.getElementById("minimapTodayLbl").style.left  = (todayFrac * 100) + "%";
}

/* ─── UPDATE LAYOUT ─── */
function updateLayout() {
  document.documentElement.style.setProperty("--timeline-w", timelineW + "px");
  document.getElementById("timelineInner").style.width = `calc(var(--label-w) + ${timelineW}px)`;
}

function renderAll() {
  updateLayout();
  renderYearHeader();
  renderRows();
  renderMinimap();
}

/* ─── SETUP: GAME CHIPS ─── */
function setupGameChips() {
  const container = document.getElementById("gameFilters");
  games.forEach(game => {
    const color = GAME_COLORS[game.name] || "#475569";
    const chip = document.createElement("button");
    chip.className = "gchip";
    chip.dataset.game = game.name;
    chip.innerHTML = `<span class="cdot" style="background:white"></span>${esc(game.name)}`;
    chip.style.cssText = `background:${color};color:white;border-color:${color};opacity:1`;

    chip.addEventListener("click", () => {
      const isOn = activeGames.has(game.name);
      if (isOn && activeGames.size <= 1) return;
      if (isOn) {
        activeGames.delete(game.name);
        chip.style.background = "white"; chip.style.color = color; chip.style.opacity = "0.5";
      } else {
        activeGames.add(game.name);
        chip.style.background = color; chip.style.color = "white"; chip.style.opacity = "1";
      }
      document.getElementById("allChip").classList.toggle("active", activeGames.size === games.length);
      renderRows(); renderMinimap();
    });
    container.appendChild(chip);
  });

  document.getElementById("allChip").addEventListener("click", () => {
    games.forEach(g => activeGames.add(g.name));
    document.querySelectorAll(".gchip").forEach(ch => {
      const c = GAME_COLORS[ch.dataset.game] || "#475569";
      ch.style.background = c; ch.style.color = "white"; ch.style.opacity = "1";
    });
    document.getElementById("allChip").classList.add("active");
    renderRows(); renderMinimap();
  });
}

/* ─── SETUP: YEAR JUMPS ─── */
function setupYearJumps() {
  const container = document.getElementById("yrJumps");
  YEARS.forEach(yr => {
    const btn = document.createElement("button");
    btn.className = "yjbtn"; btn.textContent = yr;
    btn.addEventListener("click", () => {
      document.getElementById("viewport").scrollTo({left: dx(`${yr}-01-01`) - 12, behavior: "smooth"});
    });
    container.appendChild(btn);
  });
}

/* ─── SETUP: TYPE FILTER ─── */
document.querySelectorAll(".type-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeType = btn.dataset.type;
    renderRows(); renderMinimap();
  });
});

/* ─── SETUP: IMPACT MULTI FILTER ─── */
function updateImpactButtons() {
  const allBtn = document.querySelector('.impact-btn[data-impact="all"]');
  if (allBtn) allBtn.classList.toggle("active", activeImpacts === null);

  document.querySelectorAll('.impact-btn:not([data-impact="all"])').forEach(btn => {
    btn.classList.toggle("active", !!activeImpacts && activeImpacts.has(btn.dataset.impact));
  });
}

document.querySelectorAll(".impact-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const impact = btn.dataset.impact;

    if (impact === "all") {
      activeImpacts = null;
    } else {
      if (activeImpacts === null) activeImpacts = new Set();
      if (activeImpacts.has(impact)) activeImpacts.delete(impact);
      else activeImpacts.add(impact);

      // 모든 개별 필터가 해제되면 전체 모드로 복귀
      if (activeImpacts.size === 0) activeImpacts = null;
    }

    updateImpactButtons();
    renderRows();
    renderMinimap();
  });
});
updateImpactButtons();

/* ─── SETUP: SEARCH ─── */
const searchInput = document.getElementById("searchInput");
const clrBtn = document.getElementById("clrBtn");
searchInput.addEventListener("input", e => {
  searchQ = e.target.value.trim();
  clrBtn.style.display = searchQ ? "block" : "none";
  renderRows(); renderMinimap();
});
clrBtn.addEventListener("click", () => {
  searchInput.value = ""; searchQ = "";
  clrBtn.style.display = "none";
  renderRows(); renderMinimap();
});

/* ─── SETUP: ZOOM ─── */
document.getElementById("zoomSlider").addEventListener("input", e => {
  const vp = document.getElementById("viewport");
  const labelW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--label-w")) || 196;
  const visibleTimelineW = Math.max(1, vp.clientWidth - labelW);
  const centerXBefore = vp.scrollLeft + visibleTimelineW / 2;
  const centerFrac = timelineW > 0 ? centerXBefore / timelineW : 0;

  const zoom = parseInt(e.target.value);
  document.getElementById("zoomVal").textContent = zoom + "%";
  timelineW = Math.round(BASE_W * zoom / 100);
  renderAll();

  requestAnimationFrame(() => {
    const target = centerFrac * timelineW - visibleTimelineW / 2;
    vp.scrollLeft = Math.max(0, target);
  });
});

/* ─── INIT ─── */
setupGameChips();
setupYearJumps();
renderAll();
</script>
