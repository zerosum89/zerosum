name: Patchnote Update Workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = preview only. false = allow patch_view_model.json commit when run_git_push is true."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_notion_write:
        description: "true = create new Patch View Model pages when dry_run=false and payload quality passes."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_git_push:
        description: "Commit/push patch_view_model.json only when dry_run=false."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      target_games:
        description: "ALL or comma-separated game keys, e.g. MIR4_Global,Odin_KR"
        required: false
        default: "ALL"
      max_new_urls_per_game:
        description: "Safety cap for newer-than-anchor URL candidates per game."
        required: false
        default: "20"
      strict_detail_url_guard:
        description: "true = fail run if any board/list URL survives as a new candidate."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      fetch_detail_pages:
        description: "true = fetch raw detail HTML/text for new URL candidates and create rule-based summary preview."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_detail_fetches:
        description: "Safety cap for detail page fetches per workflow run."
        required: false
        default: "20"
      run_title_repair:
        description: "true = normalize recent Notion item names to YY.MM.DD | 패치노트 when dry_run=false."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      title_repair_window_days:
        description: "Only repair item titles whose actual_date is within this many days."
        required: false
        default: "14"
  schedule:
    # 21:00 UTC = 06:00 KST. Schedule runs are preview-only in v015.
    - cron: "0 21 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: patchnote-update
  cancel-in-progress: false

jobs:
  patch-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'true' }}
      RUN_NOTION_WRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_notion_write || 'false' }}
      RUN_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_git_push || 'false' }}
      TARGET_GAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.target_games || 'ALL' }}
      MAX_NEW_URLS_PER_GAME: ${{ github.event_name == 'workflow_dispatch' && inputs.max_new_urls_per_game || '20' }}
      STRICT_DETAIL_URL_GUARD: ${{ github.event_name == 'workflow_dispatch' && inputs.strict_detail_url_guard || 'true' }}
      FETCH_DETAIL_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.fetch_detail_pages || 'true' }}
      MAX_DETAIL_FETCHES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_detail_fetches || '20' }}
      RUN_TITLE_REPAIR: ${{ github.event_name == 'workflow_dispatch' && inputs.run_title_repair || 'false' }}
      TITLE_REPAIR_WINDOW_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.title_repair_window_days || '14' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Prepare artifact directory
        run: |
          echo "PATCH_WORKFLOW_ARTIFACT_DIR=$RUNNER_TEMP/patch_workflow_artifacts" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/patch_workflow_artifacts"

      - name: Run patchnote workflow
        run: |
          python scripts/patch_update_workflow.py

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patch-update-artifacts
          path: ${{ env.PATCH_WORKFLOW_ARTIFACT_DIR }}/
          if-no-files-found: warn

      - name: Commit patch_view_model.json only
        if: ${{ env.DRY_RUN == 'false' && env.RUN_GIT_PUSH == 'true' }}
        run: |
          if [ ! -f patch_view_model.json ]; then
            echo "[ERROR] patch_view_model.json was not generated."
            exit 1
          fi

          changed_files="$(git status --porcelain | awk '{print $2}')"
          echo "Changed files:"
          echo "$changed_files"

          bad_files="$(echo "$changed_files" | grep -v '^patch_view_model.json$' || true)"
          if [ -n "$bad_files" ]; then
            echo "[ERROR] Data-only deploy guard failed. Unexpected changed files:"
            echo "$bad_files"
            exit 1
          fi

          git add patch_view_model.json
          if git diff --cached --quiet; then
            echo "[INFO] No patch_view_model.json changes to commit."
            exit 0
          fi

          git config user.name "patch-update-actions"
          git config user.email "patch-update-actions@users.noreply.github.com"
          git commit -m "Update patch view model JSON"
          git push
