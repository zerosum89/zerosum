name: Patchnote Update Workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "[dry_run] ?ㅽ뻾 紐⑤뱶 ??true=誘몃━蹂닿린留??ㅽ뻾, false=Notion write? JSON 諛고룷瑜??ㅻⅨ ?ㅼ쐞移?湲곗??쇰줈 ?덉슜"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      run_notion_write:
        description: "[run_notion_write] Notion ?좉퇋 ?곸옱 ??true=dry_run=false?닿퀬 ?덉쭏 PASS???좉퇋 ?⑥튂?명듃瑜?Patch View Model DB???앹꽦"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      run_git_push:
        description: "[run_git_push] GitHub Pages ?곗씠??諛고룷 ??true=dry_run=false????patch_view_model.json 蹂寃쎈텇 commit/push"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      target_games:
        description: "[target_games] ???寃뚯엫 ??ALL ?먮뒗 ?쇳몴 援щ텇 寃뚯엫 ???? MIR4_Global,Odin_KR"
        required: false
        default: "ALL"
      max_new_urls_per_game:
        description: "[max_new_urls_per_game] 寃뚯엫蹂??좉퇋 URL 理쒕? 泥섎━ ????anchor ?댄썑 ?꾨낫 URL ?덉쟾 ?곹븳"
        required: false
        default: "20"
      strict_detail_url_guard:
        description: "[strict_detail_url_guard] ?곸꽭 URL ?덉쟾 寃????true=紐⑸줉/寃뚯떆??URL???좉퇋 ?꾨낫濡??⑥쑝硫??ㅽ뙣 泥섎━"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      fetch_detail_pages:
        description: "[fetch_detail_pages] ?곸꽭 蹂몃Ц ?섏쭛 ??true=?좉퇋 ?꾨낫???곸꽭 HTML/text瑜??섏쭛?섍퀬 ?붿빟 preview ?앹꽦"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      max_detail_fetches:
        description: "[max_detail_fetches] ?곸꽭 ?섏씠吏 fetch 理쒕? ????workflow 1???ㅽ뻾???덉쟾 ?곹븳"
        required: false
        default: "20"
      run_title_repair:
        description: "[run_title_repair] ?쒕ぉ 蹂댁젙 ?ㅽ뻾 ?щ? ??true=dry_run=false????理쒓렐 Notion ??ぉ紐낆쓣 YY.MM.DD | ?⑥튂?명듃濡?蹂댁젙"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      title_repair_window_days:
        description: "[title_repair_window_days] ?쒕ぉ 蹂댁젙 湲곌컙 ??actual_date 湲곗? 理쒓렐 N?쇰쭔 蹂댁젙"
        required: false
        default: "14"
  schedule:
    # 21:17 UTC = 06:17 KST. Scheduled runs are preview by default.
    # Set repository variable PATCH_UPDATE_SCHEDULE_MODE=write_deploy to enable automatic write/deploy.
    - cron: "17 21 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: patchnote-update
  cancel-in-progress: false

jobs:
  patch-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SCHEDULE_OPERATION_MODE: ${{ vars.PATCH_UPDATE_SCHEDULE_MODE || 'preview' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || (vars.PATCH_UPDATE_SCHEDULE_MODE == 'write_deploy' && 'false' || 'true') }}
      RUN_NOTION_WRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_notion_write || (vars.PATCH_UPDATE_SCHEDULE_MODE == 'write_deploy' && 'true' || 'false') }}
      RUN_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_git_push || (vars.PATCH_UPDATE_SCHEDULE_MODE == 'write_deploy' && 'true' || 'false') }}
      TARGET_GAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.target_games || (vars.PATCH_UPDATE_TARGET_GAMES || 'ALL') }}
      MAX_NEW_URLS_PER_GAME: ${{ github.event_name == 'workflow_dispatch' && inputs.max_new_urls_per_game || (vars.PATCH_UPDATE_MAX_NEW_URLS_PER_GAME || '20') }}
      STRICT_DETAIL_URL_GUARD: ${{ github.event_name == 'workflow_dispatch' && inputs.strict_detail_url_guard || (vars.PATCH_UPDATE_STRICT_DETAIL_URL_GUARD || 'true') }}
      FETCH_DETAIL_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.fetch_detail_pages || (vars.PATCH_UPDATE_FETCH_DETAIL_PAGES || 'true') }}
      MAX_DETAIL_FETCHES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_detail_fetches || (vars.PATCH_UPDATE_MAX_DETAIL_FETCHES || '20') }}
      RUN_TITLE_REPAIR: ${{ github.event_name == 'workflow_dispatch' && inputs.run_title_repair || (vars.PATCH_UPDATE_RUN_TITLE_REPAIR || 'false') }}
      TITLE_REPAIR_WINDOW_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.title_repair_window_days || (vars.PATCH_UPDATE_TITLE_REPAIR_WINDOW_DAYS || '14') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Prepare artifact directory
        run: |
          echo "PATCH_WORKFLOW_ARTIFACT_DIR=$RUNNER_TEMP/patch_workflow_artifacts" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/patch_workflow_artifacts"

      - name: Print effective operation mode
        run: |
          echo "event=$GITHUB_EVENT_NAME"
          echo "schedule_operation_mode=$SCHEDULE_OPERATION_MODE"
          echo "DRY_RUN=$DRY_RUN"
          echo "RUN_NOTION_WRITE=$RUN_NOTION_WRITE"
          echo "RUN_GIT_PUSH=$RUN_GIT_PUSH"
          echo "TARGET_GAMES=$TARGET_GAMES"

      - name: Apply v106 auto importance runtime patch
        run: |
          python scripts/apply_v106_auto_importance_runtime_patch.py

      - name: Run patchnote workflow
        env:
          WORKFLOW_VERSION: github_actions_v093
        run: |
          python scripts/policy_gate_v093_runner.py -- python scripts/patch_update_workflow.py

      - name: Align public summaries with source text
        env:
          SOURCE_ALIGN_AUDIT_PATH: ${{ env.PATCH_WORKFLOW_ARTIFACT_DIR }}/source_alignment_audit.csv
        run: |
          python scripts/source_align_patch_view_model.py

      - name: Enrich schedule identity
        if: always()
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
        run: |
          python scripts/enrich_schedule_identity.py

      - name: Run v069 display / decision audit
        if: always()
        run: |
          python scripts/policy_gate_v093.py --artifact-dir "$PATCH_WORKFLOW_ARTIFACT_DIR" --mode post-run --strict

      - name: Run v069 deploy gate
        run: |
          python scripts/policy_gate_v093.py --artifact-dir "$PATCH_WORKFLOW_ARTIFACT_DIR" --mode deploy --strict
      - name: Restore runtime patched scripts before data deploy
        if: ${{ env.DRY_RUN == 'false' && env.RUN_GIT_PUSH == 'true' }}
        run: |
          git checkout -- scripts/patch_update_workflow.py scripts/policy_gate_v093.py
      - name: Commit patch_view_model.json only
        if: ${{ env.DRY_RUN == 'false' && env.RUN_GIT_PUSH == 'true' }}
        run: |
          mkdir -p "$PATCH_WORKFLOW_ARTIFACT_DIR"
          result_file="$PATCH_WORKFLOW_ARTIFACT_DIR/git_deploy_result.json"

          if [ ! -f patch_view_model.json ]; then
            echo "[ERROR] patch_view_model.json was not generated."
            python - <<'PY'
          import json, os, pathlib
          pathlib.Path(os.environ['PATCH_WORKFLOW_ARTIFACT_DIR'], 'git_deploy_result.json').write_text(json.dumps({
            'status': 'FAILED',
            'reason': 'patch_view_model_json_missing',
            'committed': False,
            'pushed': False,
            'github_sha': os.environ.get('GITHUB_SHA', ''),
            'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
            exit 1
          fi

          set +e
          python - <<'PY'
          import json, os, pathlib, subprocess, sys
          art = pathlib.Path(os.environ['PATCH_WORKFLOW_ARTIFACT_DIR'])
          raw_text = subprocess.run(['git', 'status', '--porcelain'], text=True, capture_output=True, check=False).stdout or ''
          raw = raw_text.splitlines()
          changed = []
          for line in raw:
              path = line[3:].strip() if len(line) >= 3 else line.strip()
              if ' -> ' in path:
                  path = path.split(' -> ', 1)[1].strip()
              if path:
                  changed.append(path)
          bad = [p for p in changed if p != 'patch_view_model.json']
          art.joinpath('git_status_before_deploy.txt').write_text('\n'.join(raw), encoding='utf-8')
          if bad:
              art.joinpath('git_deploy_result.json').write_text(json.dumps({
                'status': 'FAILED',
                'reason': 'data_only_guard_failed',
                'changed_files': changed,
                'unexpected_files': bad,
                'committed': False,
                'pushed': False,
                'github_sha': os.environ.get('GITHUB_SHA', ''),
                'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
              }, ensure_ascii=False, indent=2), encoding='utf-8')
              sys.exit(1)
          if 'patch_view_model.json' not in changed:
              art.joinpath('git_deploy_result.json').write_text(json.dumps({
                'status': 'NO_CHANGES',
                'reason': 'patch_view_model_json_unchanged',
                'changed_files': changed,
                'committed': False,
                'pushed': False,
                'github_sha': os.environ.get('GITHUB_SHA', ''),
                'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
              }, ensure_ascii=False, indent=2), encoding='utf-8')
              sys.exit(2)
          PY
          guard_exit=$?
          set -e
          if [ "$guard_exit" = "1" ]; then
            echo "[ERROR] Data-only deploy guard failed."
            cat "$result_file" || true
            exit 1
          fi
          if [ "$guard_exit" = "2" ]; then
            echo "[INFO] patch_view_model.json unchanged; no commit."
            exit 0
          fi

          git add patch_view_model.json
          if git diff --cached --quiet -- patch_view_model.json; then
            echo "[INFO] No staged patch_view_model.json changes to commit."
            python - <<'PY'
          import json, os, pathlib
          pathlib.Path(os.environ['PATCH_WORKFLOW_ARTIFACT_DIR'], 'git_deploy_result.json').write_text(json.dumps({
            'status': 'NO_CHANGES',
            'reason': 'no_staged_patch_view_model_json_changes',
            'committed': False,
            'pushed': False,
            'github_sha': os.environ.get('GITHUB_SHA', ''),
            'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
            exit 0
          fi

          git config user.name "patch-update-actions"
          git config user.email "patch-update-actions@users.noreply.github.com"
          git commit -m "Update patch view model JSON"
          git push
          python - <<'PY'
          import json, os, pathlib, subprocess
          commit_hash = subprocess.run(['git','rev-parse','--short','HEAD'], text=True, capture_output=True).stdout.strip()
          full_hash = subprocess.run(['git','rev-parse','HEAD'], text=True, capture_output=True).stdout.strip()
          pathlib.Path(os.environ['PATCH_WORKFLOW_ARTIFACT_DIR'], 'git_deploy_result.json').write_text(json.dumps({
            'status': 'PUSHED',
            'reason': 'patch_view_model_json_committed',
            'changed_files': ['patch_view_model.json'],
            'committed': True,
            'pushed': True,
            'commit_hash': commit_hash,
            'commit_full_hash': full_hash,
            'github_sha': os.environ.get('GITHUB_SHA', ''),
            'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
      - name: Run v069 report consistency gate
        if: always()
        run: |
          python scripts/report_consistency_v093.py --artifact-dir "$PATCH_WORKFLOW_ARTIFACT_DIR" --repo-root "$GITHUB_WORKSPACE" --strict


      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patch-update-artifacts
          path: ${{ env.PATCH_WORKFLOW_ARTIFACT_DIR }}/
          if-no-files-found: warn
          retention-days: 14
